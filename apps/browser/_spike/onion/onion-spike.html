<!doctype html><meta charset="utf-8"><title>onion transport spike (S0 Part B)</title>
<body style="font:14px/1.6 system-ui;background:#0b141a;color:#e8eef5;padding:1.5rem;max-width:52rem">
<h1 style="font-size:1.05rem">HOLO-BROWSER-TOR-ONION · S0 Part B — transport spike</h1>
<p style="opacity:.8">Throwaway. Measures how fast ONE known-stable <code>.onion</code> resolves, off the
main thread, through the Seam-B contract. Fills in the number the VERDICT needs. Open in a real browser.</p>
<label>onion url <input id="url" size="70"
  value="2gzyxa5ihm7nsggfxnu52rck2vv4rvmdlkiu3zzui5du4xyclen53wid.onion"></label><br>
<label>transport
  <select id="t"><option value="arti-wasm">arti-wasm (real onion routing — S2 build)</option>
  <option value="gateway">gateway (non-private lower bound — needs a gateway)</option></select></label>
<button id="go" style="margin-left:.5rem">probe</button>
<pre id="out" style="background:#0e1a22;padding:1rem;border-radius:8px;margin-top:1rem">idle</pre>
<script type="module">
const out = document.getElementById("out"); const log = (m) => { out.textContent += "\n" + m; };
// Optional gateway for the gateway probe only (spike, non-private). Leave blank to keep it disabled.
self.__ONION_GATEWAY__ = new URLSearchParams(location.search).get("gw") || "";
document.getElementById("go").onclick = () => {
  out.textContent = "probing…";
  const url = document.getElementById("url").value.trim();
  const transport = document.getElementById("t").value;
  const w = new Worker(new URL("./onion-probe.worker.mjs", import.meta.url), { type: "module" });
  const marks = {}; let bytes = 0, chunks = 0;
  const at = (n) => (marks[n] != null ? (marks[n] - (marks.start || 0)).toFixed(0) + " ms" : "—");
  w.onmessage = (e) => {
    const m = e.data;
    if (m.type === "mark") { marks[m.name] = m.t; log("• " + m.name + " @ " + at(m.name)); }
    else if (m.type === "head") log("head: " + m.status + " " + m.contentType);
    else if (m.type === "chunk") { chunks++; bytes += m.n; }
    else if (m.type === "end") {
      log("\nMEASURED (wall-clock from probe start):");
      log("  transport-ready : " + at("transport-ready"));
      log("  first-byte      : " + at("first-byte") + "   ← TTFB");
      log("  end             : " + at("end"));
      log("  bytes / chunks  : " + bytes + " / " + chunks);
      log("  key-verified    : " + m.verified + (m.verified ? "" : "  (gateway terminates TLS — no e2e verify)"));
      log("\n→ paste these numbers into VERDICT.md");
      // signal for a headless runner
      window.__spike = { marks, bytes, chunks, verified: m.verified, ok: m.ok,
        ttfb: marks["first-byte"] != null ? marks["first-byte"] - marks.start : null,
        total: marks.end != null ? marks.end - marks.start : null };
      w.terminate();
    }
    else if (m.type === "error") { log("\nERROR: " + m.error); window.__spike = { error: m.error }; w.terminate(); }
  };
  w.postMessage({ type: "probe", url, transport });
};
</script>
</body>
