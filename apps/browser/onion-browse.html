<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holo · onion browsing</title>
<style>
  :root{color-scheme:dark;--bg:#0a0e14;--panel:#0e1620;--line:#1d2a36;--ink:#e8eef5;--dim:#8ba0b2;--accent:#7c5cff;--ok:#4bd88a}
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto;background:var(--bg);color:var(--ink)}
  .top{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(10,14,20,.92));backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:.7rem 1rem}
  .brand{display:flex;align-items:center;gap:.55rem;font-weight:650;letter-spacing:.2px;margin-bottom:.6rem}
  .brand .dot{width:22px;height:22px;border-radius:7px;background:conic-gradient(from 210deg,#7c5cff,#4bd8ff,#4bd88a,#7c5cff);box-shadow:0 0 18px rgba(124,92,255,.5)}
  .brand small{font-weight:400;color:var(--dim)}
  .bar{display:flex;gap:.5rem;align-items:center}
  .omni{flex:1;display:flex;align-items:center;gap:.5rem;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:.55rem .8rem}
  .omni svg{flex:0 0 auto;opacity:.7}
  .omni input{flex:1;background:transparent;border:0;outline:0;color:var(--ink);font:14px ui-monospace,SFMono-Regular,Menlo,monospace}
  button{background:var(--accent);border:0;color:#fff;border-radius:10px;padding:.6rem 1.05rem;font-weight:600;cursor:pointer;white-space:nowrap}
  button:disabled{opacity:.55;cursor:default}
  .pill{display:inline-flex;align-items:center;gap:.4rem;font-size:12px;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:.22rem .6rem}
  .pill .g{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .chips{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.6rem}
  .chip{display:flex;align-items:center;gap:.4rem;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:.3rem .7rem;font-size:12.5px;cursor:pointer;color:var(--dim)}
  .chip:hover{border-color:var(--accent);color:var(--ink)}
  .chip b{color:var(--ink);font-weight:600}
  .status{display:flex;align-items:center;gap:.7rem;padding:.4rem 1rem;font-size:12.5px;color:var(--dim);min-height:1.9rem}
  .status .sig{display:inline-flex;align-items:center;gap:.4rem}
  .status .sig.on{color:var(--ok)} .status .sig .g{width:7px;height:7px;border-radius:50%;background:currentColor}
  .wrap{position:relative;height:calc(100vh - 168px);margin:0 1rem 1rem;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  iframe{width:100%;height:100%;border:0;background:#fff}
  .load{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;background:var(--bg);color:var(--dim);transition:opacity .3s;pointer-events:none}
  .load.hide{opacity:0}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style></head>
<body>
<div class="top">
  <div class="brand"><span class="dot"></span> Holo Browser <small>— the onion web, rendered like the open web</small>
    <span class="pill" id="tor" style="margin-left:auto"><span class="g"></span> Tor bridge</span></div>
  <div class="bar">
    <div class="omni"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/><circle cx="12" cy="12" r="4"/></svg>
      <input id="url" spellcheck="false" placeholder="paste any .onion address…" value="http://2gzyxa5ihm7nsggfxnu52rck2vv4rvmdlkiu3zzui5du4xyclen53wid.onion/"></div>
    <button id="go">Open</button></div>
  <div class="chips" id="chips"></div>
</div>
<div class="status"><span id="sig" class="sig on"><span class="g"></span> real onion routing · key-verified</span><span id="tim"></span></div>
<div class="wrap"><iframe id="view"></iframe><div class="load" id="load"><div class="spin"></div><div id="loadtxt">building a Tor circuit…</div></div></div>
<script type="module">
import { classify } from "/apps/browser/_shared/holo-dweb.js";
const $ = (id) => document.getElementById(id);
const VIEW = "/apps/browser/webview/";
const enc = (s) => btoa(unescape(encodeURIComponent(s))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
// curated, safe, well-known v3 onions — the "original Tor network websites" for testing the experience
const SITES = [
  ["Tor Project", "http://2gzyxa5ihm7nsggfxnu52rck2vv4rvmdlkiu3zzui5du4xyclen53wid.onion/"],
  ["DuckDuckGo", "https://duckduckgogg42xjoc72x3sjasowoarfbgcmvfimaftt6twagswzczad.onion/"],
  ["BBC News", "https://bbcnewsd73hkzno2ini43t4gblxvycyac5aw4gnv7t2rccijh7745uqd.onion/"],
  ["ProPublica", "https://p53lf57qovyuvwsc6xnrppyply3vtqm7l6pcobkmyqsiofyeznfu5uqd.onion/"],
  ["NY Times", "https://www.nytimesn7cgmftshazwhfgzm37qxb44r64ytbb2dj3x62d2lljsciiyd.onion/"],
  ["Facebook", "https://facebookwkhpilnemxj7asaniu7vnjjbiltxjqhye3mhbshg7kx5tfyd.onion/"],
];
$("chips").innerHTML = SITES.map(([n, u]) => `<span class="chip" data-u="${u}"><b>${n}</b></span>`).join("");
$("chips").onclick = (e) => { const c = e.target.closest(".chip"); if (c) { $("url").value = c.dataset.u; open($("url").value); } };

let t0 = 0, current = "";
function setLoad(on, txt) { const l = $("load"); if (txt) $("loadtxt").textContent = txt; l.classList.toggle("hide", !on); }
function open(raw) {
  const u = raw.trim(); const c = classify(u);
  if (c.kind !== "onion") { $("sig").innerHTML = "⚠︎ not a .onion address"; $("sig").className = "sig"; return; }
  current = u; t0 = performance.now(); setLoad(true, "building a Tor circuit…");
  $("sig").className = "sig on"; $("sig").innerHTML = '<span class="g"></span> real onion routing · key-verified'; $("tim").textContent = "";
  $("view").src = VIEW + "w/" + enc(u);
}
$("go").onclick = () => open($("url").value);
$("url").addEventListener("keydown", (e) => { if (e.key === "Enter") open($("url").value); });
$("view").addEventListener("load", () => { if (!t0) return; const ms = performance.now() - t0; setLoad(false); $("tim").textContent = "· painted in " + (ms / 1000).toFixed(1) + "s";
  try { const loc = $("view").contentWindow.location.href; const m = /\/w\/([^/?#]+)/.exec(loc); if (m) { const real = decodeURIComponent(escape(atob(m[1].replace(/-/g, "+").replace(/_/g, "/")))); if (/\.onion/i.test(real)) { $("url").value = real; current = real; } } } catch {} });
// reflect κ-store vs live in the pill
navigator.serviceWorker.addEventListener("message", (e) => { const m = e.data || {}; if (m.type === "committed" && m.source === current) {
  const cached = m.egress === "kappa-store"; const ms = t0 ? (performance.now() - t0) : 0;
  $("sig").innerHTML = '<span class="g"></span> ' + (cached ? "from κ-store · instant, offline-capable" : "real onion routing · key-verified end-to-end"); } });

(async () => {
  try { const r = await fetch("/apps/browser/onion?url=data:probe"); const ok = r.headers.get("x-holo-onion") === "ready"; $("tor").innerHTML = ok ? '<span class="g"></span> Tor bridge ready' : '⚠︎ no Tor bridge'; if (!ok) $("tor").querySelector(".g")?.remove(); } catch { $("tor").textContent = "⚠︎ no Tor bridge"; }
  await navigator.serviceWorker.register("/apps/browser/browser-sw.js", { type: "module", scope: VIEW });
  setTimeout(() => open($("url").value), 400);
})();
</script>
</body></html>
