<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo Browser Hologram OS</title>
    <meta name="description" content="Holo Browser Chromium, hologram-native: a content-addressed web browser for Hologram OS. It mirrors Chromium's browser process (tabs/WebContents, the NavigationController, the omnibox AutocompleteController, the SchemeRegistry) and routes every load through a URLLoaderFactory→ResourceHandler→KappaStore seam each byte the renderer sees is re-derived against its content address first (Law L5). Browse any internet, local or holo://κ page as UOR content-addressable substrate. Humans drive the tabs; AI agents drive window.HoloBrowser. The renderer is the host engine, reached through a sandboxed iframe, so a live page is fetched once and MINTED into a κ first sighting mints the address, every replay re-derives it." />
    <meta name="holo-app" content="Holo Browser" />
    <!-- PWA: one link installs Hologram as its own Chrome-less window (manifest display:fullscreen →
         the OS's own chrome takes over) and registers web+hologram:// so any link opens it. The
         one-tap install affordance is _shared/holo-install.js (loaded below). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#07041a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hologram" />
    <meta name="application-name" content="Hologram" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Shared mobile-conformance layer every shipped holospace adopts (enforce-witnesses gate). -->
    <link rel="stylesheet" href="../../_shared/holo-mobile.css" data-holo-shared="holo-mobile.css" />
    <link rel="stylesheet" href="../../_shared/holo-phi.css" data-holo-shared="holo-phi.css" />
    <script type="module" src="../../_shared/holo-ux.js" data-holo-shared="holo-ux.js"></script>
    <link rel="stylesheet" href="../../_shared/holo-dock.css" data-holo-shared="holo-dock.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg: var(--holo-bg, #0a0e14); --panel: var(--holo-surface, #11151c); --panel2: var(--holo-surface-2, #0c0f15);
        --line: var(--holo-border, #1e2630); --ink: var(--holo-ink, #e8eef5); --dim: var(--holo-ink-dim, #8a96a4);
        --acc: var(--holo-accent, #4285f4); --acc2: color-mix(in srgb, var(--acc) 72%, var(--ink));
        --ok: var(--holo-ok, #34a853); --bad: var(--holo-danger, #ea4335); --warn: var(--holo-warn, #fbbc05);
        /* proportion: --holo-size-* from _shared/holo-phi.css (ADR-028, ADR-030) */
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--ink); display: flex; flex-direction: column; overflow: hidden;
        font: var(--holo-text-sm, 1rem)/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      button, input { font: inherit; }
      button { cursor: pointer; }
      .mono { font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; }

      /* ── tab strip — the top-level bar, Chromium metrics: a thin 34px strip, tabs sit flex-end and the
             active tab MERGES into the toolbar below (same surface, no divider) ── */
      #tabstrip { flex: 0 0 auto; display: flex; align-items: flex-end; gap: 1px; height: 34px; padding: 3px 6px 0;
        background: var(--panel2); overflow-x: auto; scrollbar-width: none; }
      #tabstrip::-webkit-scrollbar { display: none; }
      .tab { display: flex; align-items: center; gap: 0.4rem; height: 28px; max-width: 200px; min-width: 96px;
        flex: 0 1 200px; padding: 0 4px 0 10px; background: transparent; color: var(--dim); border: 0;
        border-radius: 8px 8px 0 0; cursor: pointer; white-space: nowrap; font-size: 12.5px; position: relative; }
      .tab:not(.active):hover { background: #ffffff0d; color: var(--ink); }
      .tab.active { background: var(--panel); color: var(--ink); }
      /* Chromium's curve where the active tab meets the toolbar */
      .tab.active::before, .tab.active::after { content: ""; position: absolute; bottom: 0; width: 8px; height: 8px;
        background: var(--panel); pointer-events: none; }
      .tab.active::before { left: -8px; -webkit-mask: radial-gradient(circle 8px at 0 0, transparent 7.5px, #000 8px); mask: radial-gradient(circle 8px at 0 0, transparent 7.5px, #000 8px); }
      .tab.active::after { right: -8px; -webkit-mask: radial-gradient(circle 8px at 100% 0, transparent 7.5px, #000 8px); mask: radial-gradient(circle 8px at 100% 0, transparent 7.5px, #000 8px); }
      .tab .fav { width: 14px; height: 14px; flex: 0 0 auto; color: var(--acc); display: flex; }
      .tab .ttl { overflow: hidden; text-overflow: ellipsis; flex: 1 1 auto; min-width: 0; }
      .tab .x { flex: 0 0 auto; border: 0; background: transparent; color: var(--dim); border-radius: 50%;
        width: 18px; height: 18px; display: grid; place-items: center; padding: 0; line-height: 1; opacity: 0; transition: opacity 0.1s; }
      .tab:hover .x, .tab.active .x { opacity: 0.6; }
      .tab .x:hover { background: #ffffff22; color: var(--ink); opacity: 1; }
      #newtab { flex: 0 0 auto; align-self: center; border: 0; background: transparent; color: var(--dim); font-size: 16px;
        border-radius: 50%; width: 26px; height: 26px; margin-bottom: 1px; }
      #newtab:hover { background: #ffffff14; color: var(--ink); }
      /* embedded in a host canvas (the messenger holospace): the host floats its own control cluster
         over the strip's right edge — keep tabs clear of it, Chromium window-controls style */
      body.embedded #tabstrip { padding-right: 140px; }

      /* ── nav bar + omnibox — thin Chromium toolbar: 40px, shares the active tab's surface ── */
      #navbar { flex: 0 0 auto; display: flex; align-items: center; gap: 4px; height: 40px; padding: 0 8px;
        background: var(--panel); border-bottom: 1px solid var(--line); position: relative; z-index: 50; }
      .navbtn { border: 0; background: transparent; color: var(--dim); border-radius: 50%; width: 30px; height: 30px;
        flex: 0 0 auto; display: grid; place-items: center; }
      .navbtn:hover:not(:disabled) { background: #ffffff14; color: var(--ink); }
      .navbtn:disabled { opacity: 0.35; cursor: default; }
      .navbtn svg { width: 17px; height: 17px; }
      #omni { flex: 1 1 auto; display: flex; align-items: center; gap: 0; height: 30px; background: var(--panel2); border: 1px solid transparent;
        border-radius: 999px; padding: 0 0.5rem; min-width: 0; position: relative; }
      #omni:focus-within { border-color: var(--acc); box-shadow: 0 0 0 3px color-mix(in srgb, var(--acc) 22%, transparent); }
      /* the security chip: icon-only, Chromium-style. One quiet signal — neutral by default, green when
         the page passed its check, red when something is wrong. The tooltip says it in plain words. */
      #secchip { display: flex; align-items: center; color: var(--dim); padding: 0 0.35rem 0 0.2rem; }
      #secchip svg { width: 14px; height: 14px; }
      #secchip.secure { color: var(--dim); } #secchip.warning { color: var(--warn); } #secchip.dangerous { color: var(--bad); }
      #secchip.ok { color: var(--ok); } #secchip.bad { color: var(--bad); }
      #addr { flex: 1 1 auto; background: transparent; border: 0; outline: 0; color: var(--ink); padding: 0 0.3rem; min-width: 0; font-size: 13px; height: 100%; }
      #addr::placeholder { color: #5b6673; }
      #star.on { color: var(--warn); }

      /* ── window controls (native tier only) — frameless host: Hologram owns the chrome ── */
      #winctl { position: fixed; top: 0; right: 0; height: 34px; display: none; align-items: center; gap: 2px;
        padding: 0 6px 0 10px; z-index: 300; -webkit-app-region: no-drag; }
      body.native #winctl { display: flex; }
      body.native #tabstrip { padding-right: 132px; }   /* keep tabs clear of the controls */
      .wc { width: 40px; height: 30px; border: 0; background: transparent; color: var(--dim); border-radius: var(--holo-radius-sm, 8px);
        display: grid; place-items: center; cursor: pointer; transition: background 0.12s, color 0.12s; }
      .wc:hover { background: #ffffff16; color: var(--ink); }
      .wc:active { transform: translateY(0.5px); }
      .wc svg { width: 15px; height: 15px; }
      .wc-close:hover { background: var(--bad); color: #fff; }
      #wc-max .ic-restore { display: none; }
      body.maximized #wc-max .ic-max { display: none; }
      body.maximized #wc-max .ic-restore { display: block; }
      /* native tier: strip the OS dock — this IS the native Chromium window, so it should feel
         like Chrome, not carry pointers back to itself. */
      body.native #holo-dock { display: none !important; }

      /* ── omnibox suggestions ── */
      #sugg { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--panel); border: 1px solid var(--line);
        border-radius: var(--holo-radius, 12px); box-shadow: 0 18px 50px #0009; overflow: hidden; display: none; z-index: 80; }
      #sugg.on { display: block; }
      .sg { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.8rem; cursor: pointer; font-size: 13px; }
      .sg:hover, .sg.sel { background: #ffffff10; }
      .sg .k { flex: 0 0 auto; width: 16px; height: 16px; color: var(--dim); display: flex; }
      .sg .k svg { width: 16px; height: 16px; }
      .sg .t { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .sg .u { color: var(--dim); font-size: var(--holo-text-sm, 1rem); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40%; }

      /* ── stage: NTP or renderer ── */
      #stage { flex: 1 1 auto; min-height: 0; position: relative; background: var(--bg); }
      #renderer { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; display: none; }
      #renderer.on { display: block; }
      #ntp { position: absolute; inset: 0; overflow: auto; padding: var(--holo-size-m); display: none; }
      #ntp.on { display: block; }
      .ntp-wrap { max-width: 980px; margin: 0 auto; }
      .ntp-hero { text-align: center; padding: var(--holo-size-m) 0 var(--holo-size-s); }
      .ntp-hero .logo { width: 56px; height: 56px; color: var(--acc); margin: 0 auto 0.6rem; display: block; }
      .ntp-hero h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.01em; }
      .ntp-hero p { color: var(--dim); margin: 0.3rem 0 0; }
      .ntp-omni { max-width: 620px; margin: var(--holo-size-s) auto 0; }
      .ntp-omni input { width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; color: var(--ink); padding: 0.75rem 1.1rem; font-size: var(--holo-text-sm, 1rem); outline: 0; }
      .ntp-omni input:focus { border-color: var(--acc); }
      .sect { margin-top: var(--holo-size-m); }
      .sect h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin: 0 0 0.6rem; font-weight: 700; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.6rem; }
      .card { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 0.8rem; background: var(--panel); border: 1px solid var(--line);
        border-radius: var(--holo-radius, 12px); cursor: pointer; min-width: 0; text-align: left; color: inherit; }
      .card:hover { border-color: var(--acc); background: #ffffff08; }
      .card .dot { width: 30px; height: 30px; border-radius: var(--holo-radius-sm, 8px); flex: 0 0 auto; display: grid; place-items: center; font-weight: 700; color: #0a0e14; }
      .card .nm { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .card .ds { color: var(--dim); font-size: var(--holo-text-sm, 1rem); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .crumbnote { color: var(--dim); font-size: var(--holo-text-sm, 1rem); margin: -0.3rem 0 0.6rem; }

      /* ── toast ── */
      #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: #000c; color: #fff;
        padding: 0.6rem 1rem; border-radius: 10px; border: 1px solid var(--line); opacity: 0; pointer-events: none; transition: 0.25s; z-index: 200; max-width: 80vw; }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      @media (max-width: 640px) { #native { display: none; } .tab { min-width: 92px; } }
    </style>
  </head>
  <body>
    <!-- Entry splash: the shared Hologram "streaming" boot screen. ONE source of truth
         for every Holo app — only the app="…" name differs. Self-contained, offline,
         Shadow DOM; the bar auto-tracks this app's real boot time. -->
    <script src="./holo-splash.js"></script>
    <holo-splash app="Holo Browser"></holo-splash>

    <!-- ?embed=… → the host canvas floats its controls over the tab strip; reserve the right edge for them -->
    <script>if (new URLSearchParams(location.search).has("embed")) document.body.classList.add("embedded");</script>

    <!-- ── tab strip (the WebContents list) — also the window drag handle in the native tier ── -->
    <div id="tabstrip" role="tablist" aria-label="Browser tabs" data-tauri-drag-region>
      <button id="newtab" title="New tab (the New Tab Page)" aria-label="New tab">+</button>
    </div>

    <!-- ── window controls — shown only in the native (frameless) host; wired to Tauri's window API ── -->
    <div id="winctl" role="group" aria-label="Window controls">
      <button class="wc" id="wc-min" title="Collapse" aria-label="Minimize"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg></button>
      <button class="wc" id="wc-max" title="Expand" aria-label="Maximize">
        <svg class="ic-max" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
        <svg class="ic-restore" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 16V7a2 2 0 0 1 2-2h9"/></svg>
      </button>
      <button class="wc wc-close" id="wc-close" title="Close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <!-- ── nav bar + omnibox (the toolbar + AutocompleteController) ── -->
    <div id="navbar">
      <button class="navbtn" id="back" title="Back" aria-label="Back" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="navbtn" id="fwd" title="Forward" aria-label="Forward" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
      <button class="navbtn" id="reload" title="Reload" aria-label="Reload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg></button>
      <button class="navbtn" id="home" title="New Tab Page" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg></button>
      <div id="omni">
        <span id="secchip" title="This connection is private"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <input id="addr" type="text" spellcheck="false" autocomplete="off" aria-label="Address and search bar"
          placeholder="Search Google or type a URL" />
      </div>
      <button class="navbtn" id="star" title="Bookmark" aria-label="Bookmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.3l-6.18 3.7 1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73L18.18 21z"/></svg></button>
      <!-- The OS overlay actions (capture · live · theme · manage) dock HERE into the toolbar instead
           of floating top-right (holo-manage.js resolveMount → [data-holo-manage-slot]). -->
      <span id="holo-manage-slot" data-holo-manage-slot style="display:inline-flex;align-items:center;gap:2px;margin-left:2px"></span>
      <div id="sugg" role="listbox" aria-label="Suggestions"></div>
    </div>

    <!-- ── stage: the New Tab Page, or the renderer (the host engine, sandboxed) ── -->
    <div id="stage">
      <div id="ntp" class="on">
        <div class="ntp-wrap">
          <div class="ntp-hero">
            <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2a10 10 0 0 0-8.66 5M12 22a10 10 0 0 0 8.66-5M22 12a10 10 0 0 0-5-8.66"/></svg>
            <h1>Hologram</h1>
            <div class="ntp-omni"><input id="ntpAddr" type="text" spellcheck="false" autocomplete="off" aria-label="Search or enter address" placeholder="Search Google or type a URL" /></div>
          </div>
          <div class="sect"><h2>Apps</h2><div class="grid" id="fleet"></div></div>
          <div id="dirSections"></div>
        </div>
      </div>
      <iframe id="renderer" title="Page renderer" referrerpolicy="no-referrer-when-downgrade"
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-downloads"></iframe>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script src="../../_shared/teleport.js" data-holo-shared="teleport.js" defer></script>
    <script type="module">
      import * as B from "../../_shared/holo-browser.js";
      import { blake3, toHex, toBytes } from "../../_shared/holo-ipfs.js";

      const $ = (id) => document.getElementById(id);
      const BASE = location.pathname.replace(/[^/]*$/, "");          // e.g. "/" or "/repo/"
      const VIEW = BASE + "webview/";

      // ── native multiwebview tier: each tab renders in its OWN real Chromium webview (no iframe) ──
      // Content webviews are same-origin (holo://os), so the same service worker (browser-sw.js — the
      // Law-L5 κ seam) controls them and serves/verifies/mints just as it did for the iframe. We point
      // each tab at the same VIEW urls and report where the page area begins so they align to the pixel.
      const TAURI = window.__TAURI__;
      const NATIVE_MW = !!(TAURI && TAURI.core && TAURI.window);
      const invoke = NATIVE_MW ? TAURI.core.invoke : null;
      function reportContentTop() {
        if (!NATIVE_MW) return;
        const s = $("stage"); if (!s) return;
        invoke("holo_set_content_top", { top: Math.round(s.getBoundingClientRect().top) });
      }
      if (NATIVE_MW) {
        document.body.classList.add("native");
        addEventListener("resize", reportContentTop);
        requestAnimationFrame(reportContentTop);
        setTimeout(reportContentTop, 250);
        // a tab's native webview committed a navigation → if it's the active tab, sync the omnibox.
        // A webview-initiated load (a clicked link) that lands on a recognized watch page is projected
        // through Holo Video, same as an omnibox nav. The projector page is holo:// and never
        // re-matches, so there is no loop. (In-page SPA clicks that don't commit a navigation are not
        // caught here — that needs host-side injection, Phase 2.) Fail-open throughout.
        TAURI.event.listen("holo://navigated", async (e) => {
          try {
            const [id, u] = e.payload;
            const url = unwrap(String(u));
            const at = browser.activeTab;
            if (at && at.id === id) setOmni(url);
            if (invoke && /^https?:\/\//i.test(url)) {
              const mr = await mediaRouteFor(url);
              if (mr) {
                const abs = new URL(mr.route, location.href).href;
                invoke("tab_navigate", { id, url: abs }).catch(() => {});
                const tab = browser.tabs.find((t) => t.id === id);
                if (tab) { tab.title = "▶ " + mr.platform; renderTabs(); }
              }
            }
          } catch {}
        });
      }
      const browser = new B.Browser();

      let toastT; const toast = (m) => { const el = $("toast"); el.textContent = m; el.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 2600); };
      const short = (s, n = 10) => { s = String(s || ""); return s.length > 2 * n + 1 ? s.slice(0, n) + "…" + s.slice(-n) : s; };

      // ── the loading seam's service worker (scope <base>webview/) ───────────────────
      let swReady = false;
      async function registerSW() {
        if (!("serviceWorker" in navigator)) return;
        try {
          const reg = await navigator.serviceWorker.register(BASE + "browser-sw.js", { type: "module", scope: VIEW });
          // navigator.serviceWorker.ready would hang — this page is OUTSIDE the /webview/ scope,
          // so it is never controlled. Wait on the registration activating instead (ipfs-sw pattern).
          if (!reg.active) { const w = reg.installing || reg.waiting; if (w) await new Promise((res) => { w.addEventListener("statechange", () => w.state === "activated" && res()); setTimeout(res, 4000); }); }
          swReady = !!reg.active;
        } catch (e) { swReady = false; }
        navigator.serviceWorker.addEventListener("message", onSwMessage);
        pushOperator();   // tell the seam who is signed in → per-identity egress Chrome
      }
      // Read the signed-in operator κ (TEE presence, written by holo-sso) and push it to the SW,
      // so the live-web egress runs in a Chrome profile bound to THIS identity — logins persist
      // per person, never cross operators. A SW can't read localStorage; the page must relay it.
      function readOperator() {
        try { const p = JSON.parse(localStorage.getItem("holo.identity.presentation") || "null"); return (p && !p.guest && p.operator) ? String(p.operator) : ""; } catch { return ""; }
      }
      async function pushOperator() {
        try { const reg = await navigator.serviceWorker.getRegistration(VIEW); const w = reg && (reg.active || reg.waiting); if (w) w.postMessage({ type: "setop", operator: readOperator() }); } catch {}
      }
      // presence can change mid-session (sign in/out in another tab) — keep the seam in sync.
      try { if (typeof BroadcastChannel !== "undefined") { const bc = new BroadcastChannel("holo-identity"); bc.addEventListener("message", () => pushOperator()); } } catch {}
      // best-effort reuse of the Holo IPFS gateway for ipfs:// / ipns:// (no reimplementation).
      async function registerIpfsSW() {
        try { await navigator.serviceWorker.register(BASE + "ipfs-sw.js", { type: "module", scope: BASE + "ipfsview/" }); } catch {}
      }
      // hand bytes we OWN (a minted page, the demo, a holo://κ we hold) to the loader's κ-store.
      function kput(kappa, bytes, meta) {
        return new Promise((res) => {
          navigator.serviceWorker.getRegistration(VIEW).then((reg) => {
            const w = reg && (reg.active || reg.waiting); if (!w) return res(false);
            const ch = new MessageChannel(); ch.port1.onmessage = () => res(true); setTimeout(() => res(false), 1500);
            w.postMessage({ type: "kput", kappa, bytes, meta }, [ch.port2]);
          }).catch(() => res(false));
        });
      }

      // the SW tells us what committed (κ + mint/verify) → update the HUD + history.
      let pendingByView = new Map();   // view-url → { tab, t0, input }
      function onSwMessage(e) {
        const m = e.data || {}; if (m.type !== "committed") return;
