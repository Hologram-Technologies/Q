<!doctype html><meta charset="utf-8"><title>Holo Whisper — GPU GEMM witness</title>
<body style="font:14px monospace;background:#111;color:#ddd;padding:12px"><pre id="out">starting…</pre></body>
<script type="module">
// The whisper bottleneck is the per-layer linears: Y[M,N] = X[M,K] · Wᵀ[N,K] (+bias),
// M=1500 audio positions. The LLM runtime does per-token matvec; the encoder needs a
// batched GEMM. This is that kernel (tiled, f32) + a self-witness vs CPU and a timed
// run at whisper-large dims (n_state=1280, ff=5120).
const log = (s) => { document.getElementById("out").textContent += "\n" + s; };
const set = (s) => { document.getElementById("out").textContent = s; };

const TS = 16;
const WGSL = `
const TS = 16u;
@group(0) @binding(0) var<storage, read>       X : array<f32>;   // [M,K]
@group(0) @binding(1) var<storage, read>       W : array<f32>;   // [N,K]  (row n = output n)
@group(0) @binding(2) var<storage, read>       B : array<f32>;   // [N] bias
@group(0) @binding(3) var<storage, read_write> Y : array<f32>;   // [M,N]
@group(0) @binding(4) var<uniform>             d : vec4<u32>;    // M, N, K, hasBias
var<workgroup> Xs : array<f32, 256>;
var<workgroup> Ws : array<f32, 256>;
@compute @workgroup_size(16, 16)
fn main(@builtin(workgroup_id) wid : vec3<u32>, @builtin(local_invocation_id) lid : vec3<u32>) {
  let M = d.x; let N = d.y; let K = d.z;
  let row = wid.y * TS + lid.y;   // m (position)
  let col = wid.x * TS + lid.x;   // n (output channel)
  var acc = 0.0;
  let nt = (K + TS - 1u) / TS;
  for (var t = 0u; t < nt; t = t + 1u) {
    let kx = t * TS + lid.x;
    Xs[lid.y * TS + lid.x] = select(0.0, X[row * K + kx], row < M && kx < K);
    let kw = t * TS + lid.y;
    Ws[lid.y * TS + lid.x] = select(0.0, W[col * K + kw], col < N && kw < K);   // Wᵀ tile
    workgroupBarrier();
    for (var kk = 0u; kk < TS; kk = kk + 1u) { acc = acc + Xs[lid.y * TS + kk] * Ws[kk * TS + lid.x]; }
    workgroupBarrier();
  }
  if (row < M && col < N) { if (d.w == 1u) { acc = acc + B[col]; } Y[row * N + col] = acc; }
}`;

function cpuGemm(X, W, B, M, N, K) {
  const Y = new Float32Array(M * N);
  for (let m = 0; m < M; m++) for (let n = 0; n < N; n++) { let s = B ? B[n] : 0; const xb = m * K, wb = n * K; for (let k = 0; k < K; k++) s += X[xb + k] * W[wb + k]; Y[m * N + n] = s; }
  return Y;
}

async function main() {
  if (!navigator.gpu) { set("NO WebGPU"); return; }
  const adapter = await navigator.gpu.requestAdapter();
  const device = await adapter.requestDevice();
  set("WebGPU: " + (adapter.info?.description || adapter.info?.vendor || "ok"));
  const module = device.createShaderModule({ code: WGSL });
  const pipeline = device.createComputePipeline({ layout: "auto", compute: { module, entryPoint: "main" } });

  async function gpuGemm(X, W, B, M, N, K) {
    const mk = (arr, usage) => { const b = device.createBuffer({ size: Math.max(4, arr.byteLength), usage }); device.queue.writeBuffer(b, 0, arr); return b; };
    const xb = mk(X, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST);
    const wb = mk(W, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST);
    const bb = mk(B || new Float32Array(1), GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST);
    const yb = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
    const db = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
    device.queue.writeBuffer(db, 0, new Uint32Array([M, N, K, B ? 1 : 0]));
    const bind = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: [xb, wb, bb, yb, db].map((buffer, i) => ({ binding: i, resource: { buffer } })) });
    const enc = device.createCommandEncoder();
    const pass = enc.beginComputePass();
    pass.setPipeline(pipeline); pass.setBindGroup(0, bind);
    pass.dispatchWorkgroups(Math.ceil(N / TS), Math.ceil(M / TS)); pass.end();
    const read = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
    enc.copyBufferToBuffer(yb, 0, read, 0, M * N * 4);
    device.queue.submit([enc.finish()]);
    await read.mapAsync(GPUMapMode.READ);
    const out = new Float32Array(read.getMappedRange().slice(0)); read.unmap();
    [xb, wb, bb, yb, db, read].forEach((b) => b.destroy());
    return out;
  }

  const rnd = (() => { let s = 7; return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296 * 2 - 1; }; })();
  const rf = (n) => { const a = new Float32Array(n); for (let i = 0; i < n; i++) a[i] = rnd() * 0.3; return a; };

  // 1) correctness on a small block vs CPU
  { const M = 64, N = 96, K = 80; const X = rf(M * K), W = rf(N * K), B = rf(N);
    const g = await gpuGemm(X, W, B, M, N, K), c = cpuGemm(X, W, B, M, N, K);
    let worst = 0; for (let i = 0; i < g.length; i++) worst = Math.max(worst, Math.abs(g[i] - c[i]) / (Math.abs(c[i]) + 1e-4));
    log(`correctness [${M}x${K}]·[${N}x${K}]ᵀ vs CPU: worst relErr ${worst.toExponential(2)} ${worst < 1e-3 ? "✓" : "✗"}`);
    window.__corr = worst;
  }

  // 2) timed runs at whisper-large dims (M=1500 positions, n_state=1280, ff=5120)
  async function bench(label, M, N, K) {
    const X = rf(M * K), W = rf(N * K), B = rf(N);
    await gpuGemm(X, W, B, M, N, K);                 // warm
    const t = performance.now(); const R = 4;
    for (let r = 0; r < R; r++) await gpuGemm(X, W, B, M, N, K);
    const ms = (performance.now() - t) / R, macs = M * N * K, gflops = (2 * macs / 1e9) / (ms / 1000);
    log(`${label}: [${M}×${K}]·[${N}×${K}]ᵀ  ${ms.toFixed(1)} ms/call  ${gflops.toFixed(0)} GFLOP/s`);
    return { ms, macs };
  }
  const proj = await bench("attn/out proj", 1500, 1280, 1280);
  const fc1 = await bench("mlp fc1     ", 1500, 5120, 1280);
  const fc2 = await bench("mlp fc2     ", 1500, 1280, 5120);
  // whisper-large encoder ≈ 32 layers × (4 proj + fc1 + fc2) GEMMs (attn extra, ~+15%)
  const perLayerMs = 4 * proj.ms + fc1.ms + fc2.ms;
  const encMs = 32 * perLayerMs * 1.15;
  log(`\nest. large-v3 encoder GEMMs: ${(encMs / 1000).toFixed(1)} s  (CPU pure-JS was ~3000+ s)`);
  window.__done = true; window.__encMs = encMs;
}
main().catch((e) => set("ERR: " + e.message + "\n" + e.stack));
</script>
