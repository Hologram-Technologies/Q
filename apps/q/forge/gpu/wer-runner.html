<!doctype html><meta charset="utf-8"><title>Holo Moonshine — in-browser WER (int8 gate)</title>
<body style="font:13px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init… add ?model=/.models/moonshine-tiny-int8.holo</pre></body>
<script type="module">
// Score the κ-engine at a given quant precision over the held-out WER set (gpu/wer/*.wav + wer-refs.json).
// Same word-level WER as wer-bench.py. Used to GATE int8 (must not regress vs f16/f32) before defaulting it.
import { createMoonshineASR } from "./holo-moonshine-asr.mjs";
const out = document.getElementById("out"); const log = (s) => out.textContent += "\n" + s;
const model = new URLSearchParams(location.search).get("model") || "/.models/moonshine-tiny-int8.holo";
const norm = (s) => (s.toLowerCase().replace(/[^a-z0-9' ]/g, " ").split(/\s+/).filter(Boolean));
function werCounts(ref, hyp) { const r = norm(ref), h = norm(hyp), n = r.length, m = h.length; let dp = Array.from({ length: m + 1 }, (_, j) => j);
  for (let i = 1; i <= n; i++) { let prev = dp[0]; dp[0] = i; for (let j = 1; j <= m; j++) { const cur = dp[j]; dp[j] = Math.min(dp[j] + 1, dp[j - 1] + 1, prev + (r[i - 1] !== h[j - 1] ? 1 : 0)); prev = cur; } } return [dp[m], n]; }
function readWav16(b) { const dv = new DataView(b.buffer, b.byteOffset, b.byteLength); let o = 12; while (o + 8 <= b.byteLength) { const id = String.fromCharCode(b[o], b[o+1], b[o+2], b[o+3]), sz = dv.getUint32(o+4, true); if (id === "data") { const n = sz >> 1, x = new Float32Array(n); for (let i = 0; i < n; i++) x[i] = dv.getInt16(o+8+i*2, true) / 32768; return x; } o += 8 + sz + (sz & 1); } }
window.__wer = { stage: "start", model };
(async () => {
  try {
    log("model " + model + " — streaming…");
    const refs = await (await fetch("wer-refs.json")).json();
    const asr = await createMoonshineASR(model, { onProgress: (s) => { out.textContent = out.textContent.replace(/\n[^\n]*$/, "\n" + s); } });
    log(`loaded · ${refs.length} clips`);
    let te = 0, tw = 0; const t0 = performance.now(); const hyps = [];
    for (let i = 0; i < refs.length; i++) {
      const b = new Uint8Array(await (await fetch("wer/" + refs[i].file)).arrayBuffer());
      const r = await asr.transcribe(readWav16(b), {});
      const [e, w] = werCounts(refs[i].text, r.text || ""); te += e; tw += w; hyps.push({ file: refs[i].file, hyp: r.text || "", edits: e });
      window.__hyps = hyps;
      if (i % 15 === 0) { window.__wer = { stage: "run", done: i + 1, n: refs.length, wer: +(100 * te / Math.max(1, tw)).toFixed(2) }; log(`  ${i + 1}/${refs.length} · WER ${(100 * te / tw).toFixed(2)}%`); }
    }
    const wer = +(100 * te / tw).toFixed(2), sec = Math.round((performance.now() - t0) / 1000);
    window.__wer = { stage: "done", model, wer, edits: te, words: tw, n: refs.length, sec };
    log(`\nDONE · WER ${wer}% (${te}/${tw} words) · ${sec}s · ${model.split("/").pop()}`);
  } catch (e) { window.__wer = { stage: "error", error: String(e) }; log("ERROR: " + e + "\n" + (e.stack || "")); }
})();
</script>
