<!doctype html><meta charset=utf8><title>qwen35 kernels GPU parity</title>
<style>body{font:14px monospace;background:#111;color:#ddd;padding:20px}.ok{color:#5f5}.fail{color:#f55}</style>
<h3>qwen35 small kernels — WGSL vs CPU oracle</h3>
<pre id=out>running… (needs a WebGPU browser)</pre>
<script type=module>
import { gatedRMSNormGated } from "../gguf-forge-gated-delta.mjs";
import { rmsNorm1pGPU, gatedRMSNormGPU, conv1dStepGPU } from "./holo-qwen35-kernels.mjs";
const out = document.getElementById("out");
const log = (s, cls) => { out.innerHTML += `\n${cls ? `<span class=${cls}>${s}</span>` : s}`; };
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) + 1e-30); };
let seed = 11; const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff * 2 - 1; };
const arr = (n, s = 1) => { const a = new Float32Array(n); for (let i = 0; i < n; i++) a[i] = rnd() * s; return a; };
try {
  if (!navigator.gpu) throw new Error("no navigator.gpu");
  const device = await (await navigator.gpu.requestAdapter()).requestDevice();
  const checks = {};

  // 1 · (1+w) RMSNorm  (real d_model 4096)
  { const N = 4096, eps = 1e-6, x = arr(N), w = arr(N).map(v => 0.1 * v);
    let ss = 0; for (const v of x) ss += v * v; const sc = 1 / Math.sqrt(ss / N + eps);
    const cpu = new Float32Array(N); for (let i = 0; i < N; i++) cpu[i] = x[i] * sc * (1 + w[i]);
    const gpu = await rmsNorm1pGPU(device, x, w, eps);
    checks.rmsnorm1p = cos(cpu, gpu); }

  // 2 · gated RMSNorm  (32 heads × 128)
  { const H = 32, V = 128, eps = 1e-6, o = arr(H * V), w = arr(V).map(v => 1 + 0.1 * v), z = arr(H * V);
    const cpu = Float32Array.from(o); gatedRMSNormGated(cpu, w, z, H, V, eps);
    const gpu = await gatedRMSNormGPU(device, o, w, z, H, V, eps);
    checks.gatedRMSNorm = cos(cpu, gpu); }

  // 3 · conv1d step + SiLU  (real conv_dim 8192, kernel 4)
  { const C = 8192, K = 4, tail = arr((K - 1) * C, 0.3), cur = arr(C, 0.3), cw = arr(K * C, 0.3);
    const cpu = new Float32Array(C);
    for (let c = 0; c < C; c++) { let acc = 0; for (let j = 0; j < K - 1; j++) acc += cw[j * C + c] * tail[j * C + c]; acc += cw[(K - 1) * C + c] * cur[c]; cpu[c] = acc / (1 + Math.exp(-acc)); }
    const gpu = await conv1dStepGPU(device, tail, cur, cw, C, K);
    checks.conv1dStep = cos(cpu, gpu); }

  let allOk = true;
  for (const [k, v] of Object.entries(checks)) { const ok = v > 0.9999; allOk = allOk && ok; log(`  ${ok ? "ok  " : "FAIL"} ${k}  cos=${v.toFixed(6)}`, ok ? "ok" : "fail"); }
  log(allOk ? "\nALL KERNELS PARITY ✓" : "\nPARITY ✗", allOk ? "ok" : "fail");
} catch (e) { log("ERROR: " + e.message + "\n" + e.stack, "fail"); }
</script>
