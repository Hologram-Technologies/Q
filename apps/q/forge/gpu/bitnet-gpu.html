<!doctype html><meta charset=utf-8><title>BitNet TQ2_0 GPU dequant witness</title>
<body><pre id=log>loading…</pre><script type=module>
// WGSL TQ2_0 in-shader dequant (BitNet ternary weights), witnessed vs the CPU oracle
// (gguf-forge-dequant dequantTq2_0, itself BIT-EXACT vs ggml). Block = 66 bytes:
// qs[64] (2 bits/elem, 4/byte) + f16 d at offset 64. Output element o ∈ [0,256):
//   jb=o>>7, l=(o&127)>>5, m=o&31 → byte = jb*32+m; q=(qs[byte]>>(l*2))&3; val=(q-1)*d.
const log = (m) => document.getElementById("log").textContent = m;
(async () => {
  const data = await (await fetch("./_bitnet_data.json")).json();
  const { nb, n, bytes, expected } = data;
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();

  // upload block bytes as a u32 array (pad to multiple of 4); byte i = (w[i>>2]>>((i&3)*8))&0xff
  const padded = new Uint8Array(Math.ceil(bytes.length / 4) * 4); padded.set(bytes);
  const u32 = new Uint32Array(padded.buffer);
  const bIn = dev.createBuffer({ size: u32.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  dev.queue.writeBuffer(bIn, 0, u32);
  const outBytes = n * 4;
  const bOut = dev.createBuffer({ size: outBytes, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
  const bRead = dev.createBuffer({ size: outBytes, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

  const WGSL = `
@group(0) @binding(0) var<storage, read> blk : array<u32>;
@group(0) @binding(1) var<storage, read_write> outp : array<f32>;
const STRIDE : u32 = 66u;          // block byte stride
fn gb(byteIdx : u32) -> u32 { let w = blk[byteIdx >> 2u]; return (w >> ((byteIdx & 3u) * 8u)) & 0xffu; }
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid : vec3<u32>) {
  let o = gid.x;
  if (o >= ${n}u) { return; }
  let blkIdx = o / 256u;
  let oo = o % 256u;
  let base = blkIdx * STRIDE;
  // f16 d at block offset 64 (2 bytes LE) → unpack2x16float
  let dbits = gb(base + 64u) | (gb(base + 65u) << 8u);
  let d = unpack2x16float(dbits).x;
  let jb = oo >> 7u;               // 0 or 1 (which 32-byte half)
  let l  = (oo >> 5u) & 3u;        // bit-plane 0..3
  let m  = oo & 31u;               // 0..31
  let q  = (gb(base + jb * 32u + m) >> (l * 2u)) & 3u;
  outp[o] = (f32(q) - 1.0) * d;
}`;
  const mod = dev.createShaderModule({ code: WGSL });
  const pipe = dev.createComputePipeline({ layout: "auto", compute: { module: mod, entryPoint: "main" } });
  const bg = dev.createBindGroup({ layout: pipe.getBindGroupLayout(0), entries: [
    { binding: 0, resource: { buffer: bIn } }, { binding: 1, resource: { buffer: bOut } }] });
  const enc = dev.createCommandEncoder(); const pass = enc.beginComputePass();
  pass.setPipeline(pipe); pass.setBindGroup(0, bg); pass.dispatchWorkgroups(Math.ceil(n / 64)); pass.end();
  enc.copyBufferToBuffer(bOut, 0, bRead, 0, outBytes); dev.queue.submit([enc.finish()]);
  await bRead.mapAsync(GPUMapMode.READ);
  const got = new Float32Array(bRead.getMappedRange().slice(0));

  let dot = 0, na = 0, nb2 = 0, maxAbs = 0, bad = -1;
  for (let i = 0; i < n; i++) { const a = got[i], b = expected[i]; dot += a * b; na += a * a; nb2 += b * b; const e = Math.abs(a - b); if (e > maxAbs) maxAbs = e; if (e > 1e-6 && bad < 0) bad = i; }
  const cosine = dot / (Math.sqrt(na) * Math.sqrt(nb2) || 1);
  const ok = maxAbs < 1e-6;
  window.__bitnet = { ok, cosine, maxAbs, n, nb, bad, sample: { got: got[0], exp: expected[0] } };
  log(`TQ2_0 GPU dequant: ${ok ? "PASS" : "FAIL"}  cosine=${cosine.toFixed(8)} maxAbs=${maxAbs.toExponential(2)} (${n} vals, ${nb} blocks)`);
})().catch((e) => { window.__bitnet = { ok: false, err: String(e) }; log("ERR " + e); });
</script>
