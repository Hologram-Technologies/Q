<!doctype html>
<meta charset="utf-8">
<title>holo-brain — .holo WebGPU chat (Stage 2)</title>
<body><pre id="out">loading…</pre></body>
<script type="module">
// Stage-2 harness: load the precompiled .holo via the reusable holo-brain-engine (openHoloStream +
// per-block WebCrypto L5, no full-archive hash) and run a real chat turn through the brain-provider
// interface (generate() → text deltas). Proves: production loader works, streams tokens, ChatML chat.
import { createHoloBrain } from "./holo-brain-engine.mjs";

const out = document.getElementById("out");
const t0 = performance.now();
const T = () => ((performance.now() - t0) / 1000).toFixed(1);
const PROMPT = new URLSearchParams(location.search).get("p") || "What is the capital of France? Answer in one short sentence.";
window.__chat = { ready: false, timeline: [] };
const mark = (m) => { window.__chat.timeline.push(T() + "s " + m); out.textContent = `[${T()}s] ${m}`; };

(async () => {
  const brain = createHoloBrain({ holoUrl: "../.models/qwen2.5-0.5b-instruct.holo", maxTokens: 64 });
  mark("loading .holo brain (openHoloStream + WebCrypto L5)");
  const tLoad0 = performance.now();
  await brain.load((m) => mark(m));
  const loadMs = Math.round(performance.now() - tLoad0);
  window.__chat.info = brain.info();
  window.__chat.loadMs = loadMs;
  mark(`loaded in ${(loadMs / 1000).toFixed(1)}s — generating…`);

  const tGen0 = performance.now();
  let text = "", nTok = 0, firstTokMs = 0;
  for await (const delta of brain.generate([{ role: "user", content: PROMPT }])) {
    if (!nTok) firstTokMs = Math.round(performance.now() - tGen0);
    text += delta; nTok++;
    out.textContent = `[${T()}s] Q: ${text}▌`;
  }
  const genMs = Math.round(performance.now() - tGen0);
  window.__chat = Object.assign(window.__chat, { ready: true, prompt: PROMPT, answer: text, nTok, firstTokMs, genMs, tokPerSec: +(nTok / (genMs / 1000)).toFixed(1) });
  out.textContent = `[${T()}s] prompt: ${PROMPT}\n\nQ: ${text}\n\nload ${(loadMs/1000).toFixed(1)}s · TTFT ${firstTokMs}ms · ${nTok} tok @ ${window.__chat.tokPerSec} tok/s`;
})().catch((e) => { window.__chat = { ready: true, error: String(e), stack: e.stack }; out.textContent = "error: " + e + "\n" + (e.stack || ""); });
</script>
