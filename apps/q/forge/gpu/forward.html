<!doctype html>
<meta charset="utf-8">
<title>forge gpu — full layer orchestration</title>
<body><pre id="out">loading…</pre></body>
<script type="module">
// GPU orchestration of a full real-model transformer layer (Qwen2.5-0.5B blk.0),
// all activations resident on GPU across the op chain, witnessed vs the CPU oracle.
// rmsnorm -> GQA QKV(+bias) -> NEOX rope -> causal attention(+KV-cache) -> wo ->
// residual -> ffn rmsnorm -> SwiGLU -> residual. f32 weights (quant kernels are
// witnessed separately) to isolate the orchestration.

const out = document.getElementById("out");
const log = (s) => { out.textContent = s; };
window.__fwd = { ready: false };

let dev, P = {};
function pipe(code) { const m = dev.createShaderModule({ code }); return dev.createComputePipeline({ layout: "auto", compute: { module: m, entryPoint: "main" } }); }

const MATVEC = `
@group(0) @binding(0) var<storage,read> W: array<f32>;
@group(0) @binding(1) var<storage,read> x: array<f32>;
@group(0) @binding(2) var<storage,read_write> y: array<f32>;
@group(0) @binding(3) var<uniform> p: vec4<u32>; // (N,K)
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g: vec3<u32>) {
  let n = g.x; let N = p.x; let K = p.y; if (n >= N) { return; }
  var acc = 0.0; let b = n*K;
  for (var k=0u;k<K;k++){ acc = acc + W[b+k]*x[k]; }
  y[n] = acc;
}`;
const ADD = `
@group(0) @binding(0) var<storage,read> a: array<f32>;
@group(0) @binding(1) var<storage,read> b: array<f32>;
@group(0) @binding(2) var<storage,read_write> y: array<f32>;
@group(0) @binding(3) var<uniform> p: vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g: vec3<u32>) {
  let i=g.x; if (i>=p.x){return;} y[i]=a[i]+b[i];
}`;
const RMS = `
@group(0) @binding(0) var<storage,read> x: array<f32>;
@group(0) @binding(1) var<storage,read> w: array<f32>;
@group(0) @binding(2) var<storage,read_write> y: array<f32>;
@group(0) @binding(3) var<uniform> p: vec4<f32>; // (N, eps)
@compute @workgroup_size(1) fn main() {
  let N=u32(p.x); var ss=0.0; for(var i=0u;i<N;i++){ ss=ss+x[i]*x[i]; }
  let sc=1.0/sqrt(ss/p.x+p.y); for(var i=0u;i<N;i++){ y[i]=x[i]*sc*w[i]; }
}`;
const ROPE = `
@group(0) @binding(0) var<storage,read> x: array<f32>;
@group(0) @binding(1) var<storage,read_write> y: array<f32>;
@group(0) @binding(2) var<uniform> a: vec4<f32>; // (hd, nRot, nheads, pos)
@group(0) @binding(3) var<uniform> b: vec4<f32>; // (freqBase)
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g: vec3<u32>) {
  let hd=u32(a.x); let nRot=u32(a.y); let nheads=u32(a.z); let pos=a.w; let fb=b.x;
  let half=nRot/2u; let idx=g.x; if (idx>=nheads*half){return;}
  let head=idx/half; let ic=idx%half; let base=head*hd;
  let ts=pow(fb,-2.0/a.y); let theta=pos*pow(ts,f32(ic));
  let c=cos(theta); let s=sin(theta);
  let x0=x[base+ic]; let x1=x[base+ic+half];
  y[base+ic]=x0*c-x1*s; y[base+ic+half]=x0*s+x1*c;
}`;
const ATTN = `
@group(0) @binding(0) var<storage,read> q: array<f32>;
@group(0) @binding(1) var<storage,read> kc: array<f32>;
@group(0) @binding(2) var<storage,read> vc: array<f32>;
@group(0) @binding(3) var<storage,read_write> ctx: array<f32>;
@group(0) @binding(4) var<uniform> a: vec4<u32>; // (nh, hd, curPos, kv)
@group(0) @binding(5) var<uniform> b: vec4<f32>; // (scale, grp)
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g: vec3<u32>) {
  let nh=a.x; let hd=a.y; let curPos=a.z; let kv=a.w; let scale=b.x; let grp=u32(b.y);
  let hh=g.x; if (hh>=nh){return;}
  let kvh=hh/grp; let qoff=hh*hd; let koff=kvh*hd; // integer division (f32 div was imprecise)
  var sc: array<f32, 64>;
  var mx=-3.0e38;
  for (var s=0u;s<=curPos;s++){ var d=0.0; for(var i=0u;i<hd;i++){ d=d+q[qoff+i]*kc[s*kv+koff+i]; } sc[s]=d*scale; if(sc[s]>mx){mx=sc[s];} }
  var sum=0.0; for (var s=0u;s<=curPos;s++){ sc[s]=exp(sc[s]-mx); sum=sum+sc[s]; }
  for (var i=0u;i<hd;i++){ var acc=0.0; for(var s=0u;s<=curPos;s++){ acc=acc+(sc[s]/sum)*vc[s*kv+koff+i]; } ctx[qoff+i]=acc; }
}`;
const SWIGLU = `
@group(0) @binding(0) var<storage,read> gt: array<f32>;
@group(0) @binding(1) var<storage,read> up: array<f32>;
@group(0) @binding(2) var<storage,read_write> y: array<f32>;
@group(0) @binding(3) var<uniform> p: vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g: vec3<u32>) {
  let i=g.x; if(i>=p.x){return;} let v=gt[i]; y[i]=(v/(1.0+exp(-v)))*up[i];
}`;

const u32buf = (vals) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array([...vals, 0, 0, 0, 0].slice(0, 4))); return b; };
const f32buf = (vals) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Float32Array([...vals, 0, 0, 0, 0].slice(0, 4))); return b; };
const storage = (lenFloats) => dev.createBuffer({ size: Math.max(4, lenFloats * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
function dispatch(enc, pipeline, buffers, groups) {
  const bg = dev.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: buffers.map((b, i) => ({ binding: i, resource: { buffer: b } })) });
  const pass = enc.beginComputePass(); pass.setPipeline(pipeline); pass.setBindGroup(0, bg); pass.dispatchWorkgroups(groups); pass.end();
}

async function main() {
  const adapter = await navigator.gpu.requestAdapter(); dev = await adapter.requestDevice();
  P = { matvec: pipe(MATVEC), add: pipe(ADD), rms: pipe(RMS), rope: pipe(ROPE), attn: pipe(ATTN), swiglu: pipe(SWIGLU) };
  const meta = await (await fetch("./layer0.json")).json();
  const raw = new Float32Array(await (await fetch("./layer0.bin")).arrayBuffer());
  const { D, NH, NHKV, HD, FF, KV, QD, EPS, FREQ, T, scale, grp, layout } = meta;
  const slice = (name) => raw.subarray(layout[name].off, layout[name].off + layout[name].len);
  // upload weights
  const wbuf = {};
  for (const n of ["wq", "bq", "wk", "bk", "wv", "bv", "wo", "attn_norm", "ffn_norm", "gate", "up", "down"]) {
    const a = slice(n).slice(); const b = dev.createBuffer({ size: a.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); wbuf[n] = b;
  }
  // scratch + KV cache
  const B = { h: storage(D), xn: storage(D), q: storage(QD), qb: storage(QD), qr: storage(QD), k: storage(KV), kb: storage(KV), kr: storage(KV), v: storage(KV), vb: storage(KV), ctx: storage(QD), ao: storage(D), fi: storage(D), xn2: storage(D), g: storage(FF), u: storage(FF), sw: storage(FF), fo: storage(D), o: storage(D), Kc: storage(T * KV), Vc: storage(T * KV) };
  const G = (n) => Math.ceil(n / 64);
  const results = [];
  for (let pos = 0; pos < T; pos++) {
    dev.queue.writeBuffer(B.h, 0, slice(`emb${pos}`).slice());
    const enc = dev.createCommandEncoder();
    dispatch(enc, P.rms, [B.h, wbuf.attn_norm, B.xn, f32buf([D, EPS])], 1);
    dispatch(enc, P.matvec, [wbuf.wq, B.xn, B.q, u32buf([QD, D])], G(QD));
    dispatch(enc, P.add, [B.q, wbuf.bq, B.qb, u32buf([QD])], G(QD));
    dispatch(enc, P.matvec, [wbuf.wk, B.xn, B.k, u32buf([KV, D])], G(KV));
    dispatch(enc, P.add, [B.k, wbuf.bk, B.kb, u32buf([KV])], G(KV));
    dispatch(enc, P.matvec, [wbuf.wv, B.xn, B.v, u32buf([KV, D])], G(KV));
    dispatch(enc, P.add, [B.v, wbuf.bv, B.vb, u32buf([KV])], G(KV));
    dispatch(enc, P.rope, [B.qb, B.qr, f32buf([HD, HD, NH, pos]), f32buf([FREQ])], G(NH * HD / 2));
    dispatch(enc, P.rope, [B.kb, B.kr, f32buf([HD, HD, NHKV, pos]), f32buf([FREQ])], G(NHKV * HD / 2));
    enc.copyBufferToBuffer(B.kr, 0, B.Kc, pos * KV * 4, KV * 4);
    enc.copyBufferToBuffer(B.vb, 0, B.Vc, pos * KV * 4, KV * 4);
    dispatch(enc, P.attn, [B.qr, B.Kc, B.Vc, B.ctx, u32buf([NH, HD, pos, KV]), f32buf([scale, grp])], G(NH));
    dispatch(enc, P.matvec, [wbuf.wo, B.ctx, B.ao, u32buf([D, QD])], G(D));
    dispatch(enc, P.add, [B.h, B.ao, B.fi, u32buf([D])], G(D));
    dispatch(enc, P.rms, [B.fi, wbuf.ffn_norm, B.xn2, f32buf([D, EPS])], 1);
    dispatch(enc, P.matvec, [wbuf.gate, B.xn2, B.g, u32buf([FF, D])], G(FF));
    dispatch(enc, P.matvec, [wbuf.up, B.xn2, B.u, u32buf([FF, D])], G(FF));
    dispatch(enc, P.swiglu, [B.g, B.u, B.sw, u32buf([FF])], G(FF));
    dispatch(enc, P.matvec, [wbuf.down, B.sw, B.fo, u32buf([D, FF])], G(D));
    dispatch(enc, P.add, [B.fi, B.fo, B.o, u32buf([D])], G(D));
    const rb = dev.createBuffer({ size: D * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
    enc.copyBufferToBuffer(B.o, 0, rb, 0, D * 4);
    dev.queue.submit([enc.finish()]);
    await rb.mapAsync(GPUMapMode.READ);
    results.push(Array.from(new Float32Array(rb.getMappedRange().slice(0)))); rb.unmap(); rb.destroy();
  }
  // compare to expected
  const cmp = results.map((got, i) => { const e = slice(`exp${i}`); let maxAbs = 0, dot = 0, na = 0, nb = 0; for (let j = 0; j < D; j++) { maxAbs = Math.max(maxAbs, Math.abs(got[j] - e[j])); dot += got[j] * e[j]; na += got[j] * got[j]; nb += e[j] * e[j]; } return { pos: i, maxAbs: +maxAbs.toExponential(2), cosine: +(dot / Math.sqrt(na * nb)).toFixed(8) }; });
  window.__fwd = { ready: true, cmp, sampleGot: results[3].slice(0, 3), sampleExp: [...slice("exp3").slice(0, 3)] };
  log("done: " + JSON.stringify(cmp));
}
main().catch((e) => { window.__fwd = { ready: true, error: String(e) }; log("error: " + e + "\n" + (e.stack || "")); });
</script>
