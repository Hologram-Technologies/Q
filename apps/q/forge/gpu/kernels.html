<!doctype html>
<meta charset="utf-8">
<title>forge gpu — kernel witnesses</title>
<body><pre id="out">init…</pre></body>
<script type="module">
// S2 Tier-B: the element-wise / norm / attention WGSL kernels, witnessed against
// the CPU oracle. WGSL is natively f32, so these track the fround oracle closely.
// Exposes window.runRmsNorm / runRope / runSoftmax / runSwiglu.

const out = document.getElementById("out");
let device = null, adapter = null;
async function dev() { if (!device) { adapter = await navigator.gpu.requestAdapter(); device = await adapter.requestDevice(); out.textContent = "GPU: " + (adapter.info?.vendor||"?") + " " + (adapter.info?.architecture||"?"); } return device; }

// run a compute shader: storage inputs (Float32Array[]), one f32 output of length outLen,
// a uniform u32/f32 params buffer, and workgroup count. bindings: inputs 0..k-1, output k, params k+1.
async function run(code, inputs, outLen, params, groups) {
  const d = await dev();
  const mod = d.createShaderModule({ code });
  const pipe = d.createComputePipeline({ layout: "auto", compute: { module: mod, entryPoint: "main" } });
  const bufs = inputs.map((a) => { const b = d.createBuffer({ size: Math.max(4, a.byteLength), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); d.queue.writeBuffer(b, 0, a); return b; });
  const ob = d.createBuffer({ size: Math.max(4, outLen * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
  const pb = d.createBuffer({ size: Math.max(16, params.byteLength), usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); d.queue.writeBuffer(pb, 0, params);
  const entries = bufs.map((b, i) => ({ binding: i, resource: { buffer: b } }));
  entries.push({ binding: inputs.length, resource: { buffer: ob } });
  entries.push({ binding: inputs.length + 1, resource: { buffer: pb } });
  const bg = d.createBindGroup({ layout: pipe.getBindGroupLayout(0), entries });
  const enc = d.createCommandEncoder(); const pass = enc.beginComputePass();
  pass.setPipeline(pipe); pass.setBindGroup(0, bg); pass.dispatchWorkgroups(groups); pass.end();
  const rb = d.createBuffer({ size: outLen * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  enc.copyBufferToBuffer(ob, 0, rb, 0, outLen * 4); d.queue.submit([enc.finish()]);
  await rb.mapAsync(GPUMapMode.READ); const res = Array.from(new Float32Array(rb.getMappedRange().slice(0))); rb.unmap();
  [...bufs, ob, pb, rb].forEach((b) => b.destroy());
  return res;
}

const RMSNORM = `
@group(0) @binding(0) var<storage,read> x: array<f32>;
@group(0) @binding(1) var<storage,read> w: array<f32>;
@group(0) @binding(2) var<storage,read_write> y: array<f32>;
@group(0) @binding(3) var<uniform> p: vec2<f32>; // (N, eps)
@compute @workgroup_size(1) fn main() {
  let N = u32(p.x); let eps = p.y;
  var ss = 0.0; for (var i=0u;i<N;i++){ ss = ss + x[i]*x[i]; }
  let scale = 1.0/sqrt(ss/p.x + eps);
  for (var i=0u;i<N;i++){ y[i] = x[i]*scale*w[i]; }
}`;
window.runRmsNorm = (x, w, eps) => run(RMSNORM, [x, w], x.length, new Float32Array([x.length, eps]), 1);

const ROPE = `
@group(0) @binding(0) var<storage,read> x: array<f32>;
@group(0) @binding(1) var<storage,read_write> y: array<f32>;
@group(0) @binding(2) var<uniform> p: vec4<f32>; // (headDim, nRot, pos, freqBase)
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let hd = u32(p.x); let nRot = u32(p.y); let pos = p.z; let fb = p.w;
  let half = nRot/2u; let ic = gid.x;
  if (ic >= hd) { return; }
  if (ic >= half) {
    // channels [half,nRot) are the upper halves written by invocation (ic-half);
    // only the tail [nRot,hd) passes through. Everything else: do nothing (no race).
    if (ic >= nRot) { y[ic] = x[ic]; }
    return;
  }
  let ts = pow(fb, -2.0/p.y);
  let theta = pos * pow(ts, f32(ic));
  let c = cos(theta); let s = sin(theta);
  let x0 = x[ic]; let x1 = x[ic+half];
  y[ic] = x0*c - x1*s;
  y[ic+half] = x0*s + x1*c;
}`;
window.runRope = (x, pos, nRot, fb) => run(ROPE, [x], x.length, new Float32Array([x.length, nRot, pos, fb]), Math.ceil(x.length/64));

const SOFTMAX = `
@group(0) @binding(0) var<storage,read> s: array<f32>;
@group(0) @binding(1) var<storage,read_write> o: array<f32>;
@group(0) @binding(2) var<uniform> p: vec2<f32>; // (N, scale)
@compute @workgroup_size(1) fn main() {
  let N = u32(p.x); let sc = p.y;
  var mx = -3.4e38; for (var i=0u;i<N;i++){ let v=s[i]*sc; if (v>mx){mx=v;} }
  var sum = 0.0; for (var i=0u;i<N;i++){ let e=exp(s[i]*sc - mx); o[i]=e; sum=sum+e; }
  let inv = 1.0/sum; for (var i=0u;i<N;i++){ o[i]=o[i]*inv; }
}`;
window.runSoftmax = (s, scale) => run(SOFTMAX, [s], s.length, new Float32Array([s.length, scale]), 1);

const SWIGLU = `
@group(0) @binding(0) var<storage,read> g: array<f32>;
@group(0) @binding(1) var<storage,read> u: array<f32>;
@group(0) @binding(2) var<storage,read_write> y: array<f32>;
@group(0) @binding(3) var<uniform> p: vec4<f32>; // (N,_,_,_)
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let i = gid.x; if (i >= u32(p.x)) { return; }
  let gv = g[i]; y[i] = (gv/(1.0+exp(-gv)))*u[i];
}`;
window.runSwiglu = (g, u) => run(SWIGLU, [g, u], g.length, new Float32Array([g.length,0,0,0]), Math.ceil(g.length/64));

dev().catch((e) => out.textContent = "init error: " + e);
</script>
