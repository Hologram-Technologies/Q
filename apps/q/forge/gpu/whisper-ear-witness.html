<!doctype html><meta charset="utf-8"><title>Holo Whisper ear — engine-module witness (W-6)</title>
<body style="font:14px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init…</pre></body>
<script type="module">
// W-6 proof: drive the SAME κ-streamed weights through the EXTRACTED engine module
// (holo-whisper-gpu.mjs) instead of the inline harness. If the 53-token transcript is still
// EXACT, the extraction is faithful and the engine is callable from an ASR provider.
import { streamHolo } from "./holo-whisper-stream.mjs";
import { runWhisperGPU } from "./holo-whisper-gpu.mjs";
const out = document.getElementById("out"); const log = (s) => out.textContent += "\n" + s;
window.__ear = { stage: "start" };
const Q = new URLSearchParams(location.search);
const HOLO_URL = Q.get("holo") || "/.models/whisper-base.holo", GOLD = Q.get("gold") || "whisper-tx-ref.json", AUDIO_SEC = 13.06;
(async () => {
  try {
    if (!navigator.gpu) throw new Error("no WebGPU");
    const gold = (await (await fetch(GOLD)).json()).ids;
    window.__ear.stage = "streaming";
    const H = await streamHolo(HOLO_URL);
    const W = new Map(); await Promise.all(H.meta.order.map(async (o) => W.set(o.name, await H.getF32(o.name))));
    const mel = new Float32Array(await (await fetch("whisper-enc-ref.mel.f32")).arrayBuffer()); // cached front-end (isolates the engine)
    const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
    window.__ear.stage = "forward";
    const t0 = performance.now();
    const { ids, encMs, decMs } = await runWhisperGPU(dev, W, H.meta.hparams, mel);
    const ms = Math.round(performance.now() - t0), rtf = +((ms / 1000) / AUDIO_SEC).toFixed(3);
    let pre = 0; while (pre < ids.length && pre < gold.length && ids[pre] === gold[pre]) pre++;
    const exact = ids.length === gold.length && pre === gold.length;
    window.__ear = { stage: "done", via: "holo-whisper-gpu.mjs engine module", genLen: ids.length, goldLen: gold.length, exact, encMs, decMs, rtf, l5verifies: H.stats.verifies, range206: H.stats.support206, pass: exact && rtf < 1 };
    log(`engine module → ${ids.length} ids · enc ${encMs}ms + dec ${decMs}ms · RTF ${rtf}`);
    log(`exact vs whisper-cli golden: ${exact ? "✓ " + ids.length + "/" + gold.length : `✗ prefix ${pre}/${gold.length}`}`);
    log(`→ ${window.__ear.pass ? "✓ PASS — extracted engine reproduces the exact transcript from κ-streamed weights" : "✗ FAIL"}`);
  } catch (err) { window.__ear = { stage: "error", error: String(err) }; log("ERROR: " + err + "\n" + (err.stack || "")); }
})();
</script>
