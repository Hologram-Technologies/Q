<!doctype html><meta charset="utf-8"><title>Kokoro ORT intermediate capture</title>
<script type="importmap">{"imports":{
  "@huggingface/transformers":"/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/transformers/transformers.js",
  "phonemizer":"/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/phonemizer.js",
  "path":"/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/stub.js",
  "fs":"/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/stub.js",
  "fs/promises":"/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/stub.js"
}}</script>
<body style="font:13px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init…</pre></body>
<script type="module">
// Per-node ORT ORACLE: run model.exposed.onnx (intermediate tensors surfaced as graph outputs by onnx-expose.mjs)
// through the SAME ORT-web that produces the golden, on the SAME captured inputs, and dump the intermediate values
// so onnx-run.mjs can be diffed op-by-op. We reuse kokoro-js only to obtain the ORT InferenceSession + Tensor classes.
import { KokoroTTS, env as kenv } from "/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/kokoro.js";
import { env as TF, Tensor } from "@huggingface/transformers";

const out = document.getElementById("out"); const log = (s) => { out.textContent += "\n" + s; };
const MODELS_BASE = "/holo-os/system/os/usr/lib/holo/voice/vendor/models/";
const MODEL = "onnx-community/Kokoro-82M-v1.0-ONNX";
const EXPOSED = "/holo-apps/apps/q/forge/gpu/kokoro/model.exposed.onnx";
const S = "/decoder/decoder/generator/m_source/l_sin_gen/";
const EXPOSED_NAMES = [S+"Sub_output_0", S+"Resize_output_0", S+"CumSum_output_0", S+"Sin_output_0"];

TF.allowRemoteModels = false; TF.allowLocalModels = true; TF.localModelPath = new URL(MODELS_BASE, location.href).href;
TF.backends.onnx.wasm.wasmPaths = new URL("/holo-os/system/os/usr/lib/holo/voice/vendor/kokoro/transformers/", location.href).href;
TF.backends.onnx.wasm.proxy = false;

// find the ORT InferenceSession instance inside a loaded transformers.js model (property name varies by version).
function findSession(model) {
  const seen = new Set(); const q = [model];
  while (q.length) { const o = q.shift(); if (!o || typeof o !== "object" || seen.has(o)) continue; seen.add(o);
    if (typeof o.run === "function" && (o.inputNames || o.handler || o.inputMetadata)) return o;
    for (const k of Object.keys(o)) { try { const v = o[k]; if (v && typeof v === "object") q.push(v); } catch (e) {} }
    if (seen.size > 500) break;
  }
  return null;
}

const mkFeed = (type, data, dims) => { const t = new Tensor(type, data, dims); return t.ort_tensor || t; };
(async () => {
 try {
  const meta = await (await fetch("/holo-apps/apps/q/forge/gpu/kokoro/golden.json")).json();
  const styleBuf = await (await fetch("/holo-apps/apps/q/forge/gpu/kokoro/golden.style.f32")).arrayBuffer();
  const style = new Float32Array(styleBuf);
  // load a LIGHT (q8) Kokoro only to obtain the ORT InferenceSession class + Tensor, then RELEASE it so the
  // exposed fp32 session doesn't sit next to a second full model (that OOMs the wasm heap → numeric abort).
  log(`loading Kokoro (q8) to get ORT handles …`);
  const tts = await KokoroTTS.from_pretrained(MODEL, { dtype: "q8", device: "wasm" });
  const sessOrig = tts.model.sessions.model;
  const Sess = sessOrig.constructor;
  log(`ORT InferenceSession = ${Sess.name}; inputs ${JSON.stringify(sessOrig.inputNames)} — releasing q8 …`);
  try { if (sessOrig.release) await sessOrig.release(); else if (sessOrig.handler && sessOrig.handler.dispose) sessOrig.handler.dispose(); } catch (e) {}

  log(`creating session on the EXPOSED fp32 model …`);
  const exBuf = new Uint8Array(await (await fetch(EXPOSED)).arrayBuffer());
  const t0c = performance.now();
  const sess = await Sess.create(exBuf, { executionProviders: ["wasm"] });
  log(`created in ${Math.round(performance.now() - t0c)}ms · exposed outputs: ${sess.outputNames.length}`);

  const feeds = {
    input_ids: mkFeed("int64", BigInt64Array.from(meta.ids.map((v) => BigInt(v))), [1, meta.ids.length]),
    style: mkFeed("float32", Float32Array.from(style), [1, 256]),
    speed: mkFeed("float32", Float32Array.from([1]), [1]),
  };
  const t0 = performance.now();
  const res = await sess.run(feeds);
  log(`ran in ${Math.round(performance.now() - t0)}ms`);

  const b64 = (u8) => { let s = ""; for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]); return btoa(s); };
  const cap = {};
  for (const name of EXPOSED_NAMES.concat(["waveform"])) {
    const t = res[name]; if (!t) { log(`(missing ${name})`); continue; }
    const f32 = t.type === "float32" ? new Float32Array(t.data.buffer, t.data.byteOffset, t.data.length) : Float32Array.from(t.data, Number);
    let mx = 0, sum = 0; for (let i = 0; i < f32.length; i++) { mx = Math.max(mx, Math.abs(f32[i])); sum += f32[i]; }
    cap[name] = { dims: t.dims, type: t.type, n: f32.length, maxAbs: +mx.toFixed(5), sum: +sum.toFixed(4), b64: b64(new Uint8Array(f32.buffer, f32.byteOffset, f32.byteLength)) };
    log(`${name}  [${t.dims}] ${t.type}  maxAbs ${cap[name].maxAbs}  sum ${cap[name].sum}`);
  }
  window.__cap = cap;
  log(`\n✅ CAPTURE READY → window.__cap  (${Object.keys(cap).length} tensors)`);
 } catch (e) { window.__cap = { error: String(e), stack: e && e.stack }; log("ERROR: " + e + "\n" + (e && e.stack || "")); }
})();
</script>
