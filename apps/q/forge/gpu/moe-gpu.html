<!doctype html>
<meta charset="utf-8">
<title>MoE (mul_mat_id) GPU — sparse routed experts vs CPU Tier-A oracle</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0b0d; color: #e6e8ea; font: 13px/1.6 ui-monospace, Menlo, monospace; padding: 24px 28px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  #v { border: 1px solid #1c2128; border-radius: 10px; padding: 14px 16px; background: #101318; white-space: pre-wrap; }
  #v.ok { border-color: #1f6f43; background: #0d1712; } #v.bad { border-color: #6f2f2f; background: #170d0d; }
  .big { font-size: 18px; font-weight: 700; }
</style>
<h1>MoE mul_mat_id GPU — only routed experts compute, witnessed vs the CPU oracle</h1>
<div id="v">running…</div>
<script type="module">
import { createGpuRuntime } from "./holo-gguf-gpu.mjs";
const $v = document.getElementById("v");
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) || 1); };
const maxAbs = (a, b) => { let m = 0; for (let i = 0; i < a.length; i++) m = Math.max(m, Math.abs(a[i] - b[i])); return m; };

async function run() {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const { P, disp, u4, f4, sbuf, wF, resetUniforms } = createGpuRuntime(dev);
  const data = await (await fetch("./_qtest/mla.json?cb=" + Date.now())).json();
  const m = data.moe, { D, FF, E } = m;
  const G = (n) => Math.ceil(n / 64);
  const slice = (arr, off, len) => Float32Array.from(arr.slice(off, off + len));

  const readback = async (buf, n) => {
    const stg = dev.createBuffer({ size: n * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
    const enc = dev.createCommandEncoder(); enc.copyBufferToBuffer(buf, 0, stg, 0, n * 4); dev.queue.submit([enc.finish()]);
    await stg.mapAsync(GPUMapMode.READ); const out = Float32Array.from(new Float32Array(stg.getMappedRange().slice(0))); stg.unmap(); stg.destroy(); return out;
  };

  resetUniforms();
  const xb = wF(Float32Array.from(m.x));
  const out = sbuf(D);   // zero-initialized accumulator
  const enc = dev.createCommandEncoder();
  // matvecF(Wslice, N, K, in) → fresh y buffer
  const mv = (Wf32, N, K, inb) => { const wb = wF(Wf32), yb = sbuf(N); disp(enc, P.f, [wb, inb, yb, u4([N, K, 0, 0])], G(N)); return yb; };
  const swiglu = (gb, ub, n) => { const yb = sbuf(n); disp(enc, P.swiglu, [gb, ub, yb, u4([n, 0, 0, 0])], G(n)); return yb; };
  const saxpy = (xb2, yb, scale, n) => disp(enc, P.saxpy, [xb2, yb, f4([scale, n, 0, 0])], G(n));

  // selected experts: gate/up_exps [D,FF,E] expert e at e*D*FF layout [FF][D]; down_exps [FF,D,E] at e*FF*D layout [D][FF]
  m.selected.forEach((e, i) => {
    const g = mv(slice(m.gate_exps, e * D * FF, D * FF), FF, D, xb);
    const u = mv(slice(m.up_exps, e * D * FF, D * FF), FF, D, xb);
    const act = swiglu(g, u, FF);
    const dn = mv(slice(m.down_exps, e * FF * D, FF * D), D, FF, act);
    saxpy(dn, out, m.weights[i], D);            // out += weight·down
  });
  // ungated shared expert (DeepSeek): out += shared
  const sg = mv(Float32Array.from(m.gate_shexp), FF, D, xb);
  const su = mv(Float32Array.from(m.up_shexp), FF, D, xb);
  const sact = swiglu(sg, su, FF);
  const sh = mv(Float32Array.from(m.down_shexp), D, FF, sact);
  saxpy(sh, out, 1.0, D);
  dev.queue.submit([enc.finish()]);

  const gpu = await readback(out, D);
  const c = cos(gpu, m.expected), mx = maxAbs(gpu, m.expected);
  const ok = c > 0.99999 && mx < 1e-4;
  window.__moe = { cos: c, maxAbs: mx, ok, selected: m.selected };
  $v.className = ok ? "ok" : "bad";
  $v.innerHTML =
`<span class="big">${ok ? "MoE mul_mat_id GPU MATCHES the CPU oracle ✓" : "MISMATCH ✗"}</span>

routed ${m.selected.length}/${E} experts [${m.selected}] · weights [${m.weights.map(x => x.toFixed(3))}] · ungated shared
ffn_moe out (dim ${D}) : cosine ${c.toFixed(8)} · maxAbs ${mx.toExponential(2)}

Only the ${m.selected.length} selected experts' κ-slices compute (the other ${E - m.selected.length} never touch the GPU).
Router (topk/sigmoid/selBias/wScale) is scalar → CPU; the per-expert matvec→SwiGLU→combine is the GPU data path.`;
}
run().catch(e => { $v.className = "bad"; $v.textContent = "ERROR: " + (e.stack || e.message); window.__moe = { ok: false, err: String(e.message) }; });
</script>
