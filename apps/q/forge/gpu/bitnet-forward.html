<!doctype html><meta charset=utf-8><title>BitNet full GPU forward witness</title>
<body><pre id=out>loading…</pre><script type=module>
// Full BitNet forward on GPU (resident activations) → last-position logits, witnessed vs
// the CPU executor oracle (gen-bitnet-forward-data.mjs). The BitNet structure = a dense
// block PLUS two RMS sub-norms — attn_sub_norm on the attention output BEFORE wo, and
// ffn_sub_norm on the SwiGLU activation BEFORE ffn_down — then tied lm_head. Kernels are
// the proven set from forward.html; f32 weights isolate the arch (TQ2_0 GEMV witnessed
// separately in bitnet-gemv.html). Per position L→R: rmsnorm → qkv (no bias) → NEOX rope →
// causal attn(+KV) → attn_sub_norm → wo → +res → ffn_norm → SwiGLU → ffn_sub_norm → down →
// +res ; then final out_norm + lm_head on the last position.
const out = document.getElementById("out"); const log = (s) => out.textContent = s;
let dev; const pipe = (code) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code }), entryPoint: "main" } });
const MATVEC = `@group(0)@binding(0)var<storage,read>W:array<f32>;@group(0)@binding(1)var<storage,read>x:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let n=g.x;let N=p.x;let K=p.y;if(n>=N){return;}var acc=0.0;let b=n*K;for(var k=0u;k<K;k++){acc=acc+W[b+k]*x[k];}y[n]=acc;}`;
const ADD = `@group(0)@binding(0)var<storage,read>a:array<f32>;@group(0)@binding(1)var<storage,read>b:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let i=g.x;if(i>=p.x){return;}y[i]=a[i]+b[i];}`;
const RMS = `@group(0)@binding(0)var<storage,read>x:array<f32>;@group(0)@binding(1)var<storage,read>w:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<f32>;
@compute @workgroup_size(1) fn main(){let N=u32(p.x);var ss=0.0;for(var i=0u;i<N;i++){ss=ss+x[i]*x[i];}let sc=1.0/sqrt(ss/p.x+p.y);for(var i=0u;i<N;i++){y[i]=x[i]*sc*w[i];}}`;
const ROPE = `@group(0)@binding(0)var<storage,read>x:array<f32>;@group(0)@binding(1)var<storage,read_write>y:array<f32>;@group(0)@binding(2)var<uniform>a:vec4<f32>;@group(0)@binding(3)var<uniform>b:vec4<f32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let hd=u32(a.x);let nheads=u32(a.z);let pos=a.w;let fb=b.x;let half=u32(a.y)/2u;let idx=g.x;if(idx>=nheads*half){return;}let head=idx/half;let ic=idx%half;let base=head*hd;let ts=pow(fb,-2.0/a.y);let theta=pos*pow(ts,f32(ic));let c=cos(theta);let s=sin(theta);let x0=x[base+ic];let x1=x[base+ic+half];y[base+ic]=x0*c-x1*s;y[base+ic+half]=x0*s+x1*c;}`;
const ATTN = `@group(0)@binding(0)var<storage,read>q:array<f32>;@group(0)@binding(1)var<storage,read>kc:array<f32>;@group(0)@binding(2)var<storage,read>vc:array<f32>;@group(0)@binding(3)var<storage,read_write>ctx:array<f32>;@group(0)@binding(4)var<uniform>a:vec4<u32>;@group(0)@binding(5)var<uniform>b:vec4<f32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let nh=a.x;let hd=a.y;let curPos=a.z;let kv=a.w;let scale=b.x;let grp=u32(b.y);let hh=g.x;if(hh>=nh){return;}let kvh=hh/grp;let qoff=hh*hd;let koff=kvh*hd;var sc:array<f32,64>;var mx=-3.0e38;for(var s=0u;s<=curPos;s++){var d=0.0;for(var i=0u;i<hd;i++){d=d+q[qoff+i]*kc[s*kv+koff+i];}sc[s]=d*scale;if(sc[s]>mx){mx=sc[s];}}var sum=0.0;for(var s=0u;s<=curPos;s++){sc[s]=exp(sc[s]-mx);sum=sum+sc[s];}for(var i=0u;i<hd;i++){var acc=0.0;for(var s=0u;s<=curPos;s++){acc=acc+(sc[s]/sum)*vc[s*kv+koff+i];}ctx[qoff+i]=acc;}}`;
const SWIGLU = `@group(0)@binding(0)var<storage,read>gt:array<f32>;@group(0)@binding(1)var<storage,read>up:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let i=g.x;if(i>=p.x){return;}let v=gt[i];y[i]=(v/(1.0+exp(-v)))*up[i];}`;
const u32buf = (v) => { const b = dev.createBuffer({ size: 16, usage: 72 }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
const f32buf = (v) => { const b = dev.createBuffer({ size: 16, usage: 72 }); dev.queue.writeBuffer(b, 0, new Float32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
const st = (n) => dev.createBuffer({ size: Math.max(4, n * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
function disp(enc, P, bufs, groups) { const bg = dev.createBindGroup({ layout: P.getBindGroupLayout(0), entries: bufs.map((b, i) => ({ binding: i, resource: { buffer: b } })) }); const p = enc.beginComputePass(); p.setPipeline(P); p.setBindGroup(0, bg); p.dispatchWorkgroups(groups); p.end(); }
(async () => {
  dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const meta = await (await fetch("./_bitfwd.json")).json();
  const bin = new Float32Array(await (await fetch("./_bitfwd.bin")).arrayBuffer());
  const { D, NH, NHKV, HD, FF, V, NL, QD, KV, EPS, FREQ, scale, grp } = meta.cfg, { tokens, layout, expected } = meta;
  const P = { mv: pipe(MATVEC), add: pipe(ADD), rms: pipe(RMS), rope: pipe(ROPE), attn: pipe(ATTN), sw: pipe(SWIGLU) };
  const wb = {}; for (const n in layout) { const a = bin.subarray(layout[n].off, layout[n].off + layout[n].len).slice(); const b = dev.createBuffer({ size: a.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); wb[n] = b; }
  const w = (n) => wb[n], lw = (n, il) => wb[`blk.${il}.${n}`];
  const B = { h: st(D), xn: st(D), q: st(QD), k: st(KV), v: st(KV), qr: st(QD), kr: st(KV), ctx: st(QD), ctxn: st(QD), ao: st(D), h1: st(D), xn2: st(D), g: st(FF), u: st(FF), sw: st(FF), swn: st(FF), fo: st(D), h2: st(D), Kc: st(tokens.length * KV), Vc: st(tokens.length * KV), xf: st(D), logits: st(V) };
  const G = (n) => Math.ceil(n / 64), T = tokens.length, te = layout["token_embd.weight"].off;
  let lastH = null;
  for (let pos = 0; pos < T; pos++) {
    dev.queue.writeBuffer(B.h, 0, bin.subarray(te + tokens[pos] * D, te + tokens[pos] * D + D).slice()); // embd lookup
    const e = dev.createCommandEncoder();
    disp(e, P.rms, [B.h, lw("attn_norm.weight", 0), B.xn, f32buf([D, EPS])], 1);
    disp(e, P.mv, [lw("attn_q.weight", 0), B.xn, B.q, u32buf([QD, D])], G(QD));
    disp(e, P.mv, [lw("attn_k.weight", 0), B.xn, B.k, u32buf([KV, D])], G(KV));
    disp(e, P.mv, [lw("attn_v.weight", 0), B.xn, B.v, u32buf([KV, D])], G(KV));
    disp(e, P.rope, [B.q, B.qr, f32buf([HD, HD, NH, pos]), f32buf([FREQ])], G(NH * HD / 2));
    disp(e, P.rope, [B.k, B.kr, f32buf([HD, HD, NHKV, pos]), f32buf([FREQ])], G(NHKV * HD / 2));
    e.copyBufferToBuffer(B.kr, 0, B.Kc, pos * KV * 4, KV * 4);
    e.copyBufferToBuffer(B.v, 0, B.Vc, pos * KV * 4, KV * 4);
    disp(e, P.attn, [B.qr, B.Kc, B.Vc, B.ctx, u32buf([NH, HD, pos, KV]), f32buf([scale, grp])], G(NH));
    disp(e, P.rms, [B.ctx, lw("attn_sub_norm.weight", 0), B.ctxn, f32buf([QD, EPS])], 1);   // ← attn_sub_norm
    disp(e, P.mv, [lw("attn_output.weight", 0), B.ctxn, B.ao, u32buf([D, QD])], G(D));
    disp(e, P.add, [B.h, B.ao, B.h1, u32buf([D])], G(D));
    disp(e, P.rms, [B.h1, lw("ffn_norm.weight", 0), B.xn2, f32buf([D, EPS])], 1);
    disp(e, P.mv, [lw("ffn_gate.weight", 0), B.xn2, B.g, u32buf([FF, D])], G(FF));
    disp(e, P.mv, [lw("ffn_up.weight", 0), B.xn2, B.u, u32buf([FF, D])], G(FF));
    disp(e, P.sw, [B.g, B.u, B.sw, u32buf([FF])], G(FF));
    disp(e, P.rms, [B.sw, lw("ffn_sub_norm.weight", 0), B.swn, f32buf([FF, EPS])], 1);       // ← ffn_sub_norm
    disp(e, P.mv, [lw("ffn_down.weight", 0), B.swn, B.fo, u32buf([D, FF])], G(D));
    disp(e, P.add, [B.h1, B.fo, B.h2, u32buf([D])], G(D));
    dev.queue.submit([e.finish()]);
    if (pos === T - 1) lastH = B.h2;
  }
  // last-position: final norm + tied lm_head
  const e2 = dev.createCommandEncoder();
  disp(e2, P.rms, [lastH, w("output_norm.weight"), B.xf, f32buf([D, EPS])], 1);
  disp(e2, P.mv, [w("token_embd.weight"), B.xf, B.logits, u32buf([V, D])], G(V));
  const rb = dev.createBuffer({ size: V * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  e2.copyBufferToBuffer(B.logits, 0, rb, 0, V * 4); dev.queue.submit([e2.finish()]);
  await rb.mapAsync(GPUMapMode.READ); const got = Array.from(new Float32Array(rb.getMappedRange().slice(0)));
  let dot = 0, na = 0, nb = 0, maxAbs = 0; for (let i = 0; i < V; i++) { dot += got[i] * expected[i]; na += got[i] * got[i]; nb += expected[i] * expected[i]; maxAbs = Math.max(maxAbs, Math.abs(got[i] - expected[i])); }
  const cosine = dot / (Math.sqrt(na * nb) || 1);
  const am = (a) => a.indexOf(Math.max(...a)), ok = cosine > 0.999999 && am(got) === am(expected);
  window.__bitfwd = { ok, cosine: +cosine.toFixed(8), maxAbs: +maxAbs.toExponential(2), argmaxGot: am(got), argmaxExp: am(expected), got: got.map(v => +v.toFixed(4)), expected: expected.map(v => +v.toFixed(4)) };
  log(`BitNet GPU forward: ${ok ? "PASS" : "FAIL"}  cosine=${cosine.toFixed(8)} argmax ${am(got)}==${am(expected)} maxAbs=${maxAbs.toExponential(2)}`);
})().catch((e) => { window.__bitfwd = { ok: false, err: String(e) }; log("ERR " + e + "\n" + (e.stack || "")); });
</script>
