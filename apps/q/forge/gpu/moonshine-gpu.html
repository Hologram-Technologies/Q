      disp(e,P.add,[dx,dso,uadd],n*S);
      disp(e,P.ln,[dx,GW(pf+"post_attention_layernorm.weight"),zeroS,dcn,uN],n);
      tile(e,dcn,GW(pf+"encoder_attn.q_proj.weight"),dummy,dcq,n,S,S,0);   // cross-attn: NO rope
      disp(e,P.attn,[dcq,cK[il],cV[il],dcr,aCross,u4([0]),fScale],NH*n);
      tile(e,dcr,GW(pf+"encoder_attn.o_proj.weight"),dummy,dco,n,S,S,0);
      disp(e,P.add,[dx,dco,uadd],n*S);
      disp(e,P.ln,[dx,GW(pf+"final_layernorm.weight"),zeroS,dmn,uN],n);
      tile(e,dmn,GW(pf+"mlp.fc1.weight"),GW(pf+"mlp.fc1.bias"),dh1,n,S,2*IFF,1);
      disp(e,P.swiglu,[dh1,dgg,uswig],n*IFF);
      tile(e,dgg,GW(pf+"mlp.fc2.weight"),GW(pf+"mlp.fc2.bias"),dh2,n,IFF,S,1);
      disp(e,P.add,[dx,dh2,uadd],n*S);
    }
    disp(e,P.ln,[dx,GW("model.decoder.norm.weight"),zeroS,dan,uN],n);
    e.copyBufferToBuffer(dan,(n-1)*S*4,lastRow,0,S*4);
    dev.queue.submit([e.finish()]);
    const le=dev.createCommandEncoder(); tile(le,lastRow,embedB,dummy,logitsB,1,S,VOCAB,0); dev.queue.submit([le.finish()]);
    const lg=await readback(logitsB,VOCAB);
    if(gen.length===0){ logits0=lg; }
    let best=0,bv=-Infinity; for(let vv=0;vv<VOCAB;vv++) if(lg[vv]>bv){bv=lg[vv];best=vv;}
    if(best===2) break; gen.push(best); seq.push(best);
  }
  log("— first-step logits —"); score(logits0,gLG,"logits0");
  let am=0,av=-Infinity; for(let vv=0;vv<VOCAB;vv++) if(logits0[vv]>av){av=logits0[vv];am=vv;}
  log(`  argmax ${am} (oracle ${stref.logits0_argmax}) ${am===stref.logits0_argmax?"✓":"✗"}`);
  let gold=txref.ids.slice(1); if(gold[gold.length-1]===2)gold=gold.slice(0,-1);
  let pre=0; while(pre<gen.length&&pre<gold.length&&gen[pre]===gold[pre])pre++;
  const exact=gen.length===gold.length&&pre===gold.length;
  const ms=Math.round(performance.now()-t0);
  window.__moon={stage:"done",convOk:true,encCos:score.last,genLen:gen.length,goldLen:gold.length,prefix:pre,exact,argmax:am,argmaxOk:am===stref.logits0_argmax,ms,bytesMB:+(H0.stats.bytesFetched/1e6).toFixed(1),verifies:H0.stats.verifies,pass:exact&&am===stref.logits0_argmax};
  log(`\n— full greedy —`);
  log(`  gen ${gen.length} vs golden ${gold.length} · prefix ${pre}/${gold.length} → ${exact?"✓ EXACT":"✗"}`);
  log(`\n${exact&&am===stref.logits0_argmax?"✅ MOONSHINE GPU FORWARD MATCHES REFERENCE":"❌ mismatch"} · ${ms}ms · ${(H0.stats.bytesFetched/1e6).toFixed(1)}MB streamed, ${H0.stats.verifies} L5`);
 } catch(err){ window.__moon={stage:"error",error:String(err)}; log("ERROR: "+err+"\n"+(err.stack||"")); }
})();
