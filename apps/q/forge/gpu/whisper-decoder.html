<!doctype html><meta charset="utf-8"><title>Holo Whisper — GPU decoder (W-2)</title>
<body style="font:14px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init…</pre></body>
<script type="module">
// W-2 decoder witness: run Whisper's text decoder (embed → [causal self-attn + KV via full prefill] +
// CROSS-attn over the golden encoder K/V + MLP, ×NL, then ln → tied-embedding logits) on WebGPU over the
// standard prompt, scored vs the CPU oracle (whisper-dec-ref): argmax must MATCH + logit cosine≈1.
const out = document.getElementById("out"); const log = (s) => out.textContent += "\n" + s;
window.__dec = { stage: "start" };
async function f32(u) { return new Float32Array(await (await fetch(u)).arrayBuffer()); }

const EMBED = `@group(0)@binding(0)var<storage,read>ids:array<u32>;@group(0)@binding(1)var<storage,read>te:array<f32>;@group(0)@binding(2)var<storage,read>pe:array<f32>;@group(0)@binding(3)var<storage,read_write>x:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let N=p.x;let S=p.y;if(idx>=N*S){return;}let pp=idx/S;let d=idx%S;x[idx]=te[ids[pp]*S+d]+pe[pp*S+d];}`;
const LN = `@group(0)@binding(0)var<storage,read>x:array<f32>;@group(0)@binding(1)var<storage,read>w:array<f32>;@group(0)@binding(2)var<storage,read>b:array<f32>;@group(0)@binding(3)var<storage,read_write>y:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let row=g.x;let n=p.x;let S=p.y;if(row>=n){return;}let base=row*S;var mean=0.0;for(var i=0u;i<S;i++){mean=mean+x[base+i];}mean=mean/f32(S);var v=0.0;for(var i=0u;i<S;i++){let d=x[base+i]-mean;v=v+d*d;}let sc=1.0/sqrt(v/f32(S)+1e-5);for(var i=0u;i<S;i++){y[base+i]=(x[base+i]-mean)*sc*w[i]+b[i];}}`;
const LIN = `@group(0)@binding(0)var<storage,read>X:array<f32>;@group(0)@binding(1)var<storage,read>W:array<f32>;@group(0)@binding(2)var<storage,read>B:array<f32>;@group(0)@binding(3)var<storage,read_write>Y:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let n=p.x;let inD=p.y;let outD=p.z;if(idx>=n*outD){return;}let row=idx/outD;let o=idx%outD;var s=select(0.0,B[o],p.w==1u);let xb=row*inD;let wb=o*inD;for(var i=0u;i<inD;i++){s=s+X[xb+i]*W[wb+i];}Y[idx]=s;}`;
const ATTN = `@group(0)@binding(0)var<storage,read>q:array<f32>;@group(0)@binding(1)var<storage,read>k:array<f32>;@group(0)@binding(2)var<storage,read>v:array<f32>;@group(0)@binding(3)var<storage,read_write>o:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;@group(0)@binding(5)var<uniform>pc:vec4<u32>;@group(0)@binding(6)var<uniform>pf:vec4<f32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let nQ=p.x;let nK=p.y;let H=p.z;let hd=p.w;let Sd=H*hd;let scale=pf.x;if(idx>=H*nQ){return;}
let h=idx/nQ;let i=idx%nQ;let ho=h*hd;let qb=i*Sd+ho;let lim=select(nK,i+1u,pc.x==1u);
var m=-3.0e38;var l=0.0;var acc:array<f32,64>;for(var d=0u;d<hd;d++){acc[d]=0.0;}
for(var j=0u;j<lim;j++){let kb=j*Sd+ho;var s=0.0;for(var d=0u;d<hd;d++){s=s+q[qb+d]*k[kb+d];}s=s*scale;let mn=max(m,s);let corr=exp(m-mn);let e=exp(s-mn);l=l*corr+e;let vb=j*Sd+ho;for(var d=0u;d<hd;d++){acc[d]=acc[d]*corr+e*v[vb+d];}m=mn;}
let ob=i*Sd+ho;for(var d=0u;d<hd;d++){o[ob+d]=acc[d]/l;}}`;
const GELU = `@group(0)@binding(0)var<storage,read_write>c:array<f32>;@group(0)@binding(1)var<uniform>p:vec4<u32>;@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;if(idx>=p.x){return;}let x=c[idx];c[idx]=0.5*x*(1.0+tanh(0.7978845608028654*(x+0.044715*x*x*x)));}`;
const ADD = `@group(0)@binding(0)var<storage,read_write>x:array<f32>;@group(0)@binding(1)var<storage,read>y:array<f32>;@group(0)@binding(2)var<uniform>p:vec4<u32>;@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;if(idx>=p.x){return;}x[idx]=x[idx]+y[idx];}`;

(async () => {
  try {
    if (!navigator.gpu) throw new Error("no WebGPU");
    const man = await (await fetch("decoder-weights.json")).json();
    const dref = await (await fetch("whisper-dec-ref.json")).json();
    const S = man.S, H = man.H, hd = S / H, FF = 4 * S, NL = man.NL, VOCAB = man.n_vocab, scale = 1 / Math.sqrt(hd);
    const prompt = dref.prompt, N = prompt.length, n_enc = dref.n_enc;
    log(`S=${S} H=${H} hd=${hd} NL=${NL} vocab=${VOCAB} N=${N} n_enc=${n_enc} (model ${dref.model})`);
    window.__dec.stage = "loading";
    const [encf, wpack, gold] = await Promise.all([f32("whisper-enc-ref.enc.f32"), f32("decoder-weights.f32"), f32("whisper-dec-ref.logits.f32")]);

    const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
    const pipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });
    const P = { emb: pipe(EMBED), ln: pipe(LN), lin: pipe(LIN), attn: pipe(ATTN), gelu: pipe(GELU), add: pipe(ADD) };
    const sb = (k) => dev.createBuffer({ size: Math.max(4, k * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
    const wb = (a) => { const b = dev.createBuffer({ size: Math.max(4, a.byteLength), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
    const u4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
    const f4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Float32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
    const G = (k) => Math.ceil(k / 64);
    const bg = (pl, a) => dev.createBindGroup({ layout: pl.getBindGroupLayout(0), entries: a.map((b, i) => ({ binding: i, resource: { buffer: b } })) });
    const disp = (enc, pl, a, k) => { const pa = enc.beginComputePass(); pa.setPipeline(pl); pa.setBindGroup(0, bg(pl, a)); pa.dispatchWorkgroups(G(k)); pa.end(); };

    const W = {}; for (const [name, t] of Object.entries(man.tensors)) W[name] = wb(wpack.slice(t.off, t.off + t.len));
    const tokEmb = W["decoder.token_embedding.weight"], posEmb = W["decoder.positional_embedding"], dummy = wb(new Float32Array([0]));
    const idsB = wb(new Uint32Array(prompt)), encB = wb(encf);
    const x = sb(N * S), an = sb(N * S), q = sb(N * S), k = sb(N * S), v = sb(N * S), sa = sb(N * S), so = sb(N * S);
    const cn = sb(N * S), cq = sb(N * S), cr = sb(N * S), co = sb(N * S), mn = sb(N * S), h1 = sb(N * FF), h2 = sb(N * S);
    const cK = sb(n_enc * S), cV = sb(n_enc * S), fnLast = sb(S), logitsB = sb(VOCAB);
    const uNS = u4([N, S]), fScale = f4([scale]), causal1 = u4([1]), causal0 = u4([0]), uAdd = u4([N * S]), uGelu = u4([N * FF]);
    const aSelf = u4([N, N, H, hd]), aCross = u4([N, n_enc, H, hd]);

    window.__dec.stage = "compute"; const t0 = performance.now();
    const enc = dev.createCommandEncoder();
    disp(enc, P.emb, [idsB, tokEmb, posEmb, x, uNS], N * S);
    for (let il = 0; il < NL; il++) {
      const p = `decoder.blocks.${il}.`, T = (s) => W[p + s];
      disp(enc, P.lin, [encB, T("cross_attn.key.weight"), dummy, cK, u4([n_enc, S, S, 0])], n_enc * S);                 // cross K (no bias)
      disp(enc, P.lin, [encB, T("cross_attn.value.weight"), T("cross_attn.value.bias"), cV, u4([n_enc, S, S, 1])], n_enc * S); // cross V
      disp(enc, P.ln, [x, T("attn_ln.weight"), T("attn_ln.bias"), an, uNS], N);
      disp(enc, P.lin, [an, T("attn.query.weight"), T("attn.query.bias"), q, u4([N, S, S, 1])], N * S);
      disp(enc, P.lin, [an, T("attn.key.weight"), dummy, k, u4([N, S, S, 0])], N * S);
      disp(enc, P.lin, [an, T("attn.value.weight"), T("attn.value.bias"), v, u4([N, S, S, 1])], N * S);
      disp(enc, P.attn, [q, k, v, sa, aSelf, causal1, fScale], H * N);                                                  // causal self-attn
      disp(enc, P.lin, [sa, T("attn.out.weight"), T("attn.out.bias"), so, u4([N, S, S, 1])], N * S);
      disp(enc, P.add, [x, so, uAdd], N * S);
      disp(enc, P.ln, [x, T("cross_attn_ln.weight"), T("cross_attn_ln.bias"), cn, uNS], N);
      disp(enc, P.lin, [cn, T("cross_attn.query.weight"), T("cross_attn.query.bias"), cq, u4([N, S, S, 1])], N * S);
      disp(enc, P.attn, [cq, cK, cV, cr, aCross, causal0, fScale], H * N);                                              // cross-attn (non-causal)
      disp(enc, P.lin, [cr, T("cross_attn.out.weight"), T("cross_attn.out.bias"), co, u4([N, S, S, 1])], N * S);
      disp(enc, P.add, [x, co, uAdd], N * S);
      disp(enc, P.ln, [x, T("mlp_ln.weight"), T("mlp_ln.bias"), mn, uNS], N);
      disp(enc, P.lin, [mn, T("mlp.0.weight"), T("mlp.0.bias"), h1, u4([N, S, FF, 1])], N * FF);
      disp(enc, P.gelu, [h1, uGelu], N * FF);
      disp(enc, P.lin, [h1, T("mlp.2.weight"), T("mlp.2.bias"), h2, u4([N, FF, S, 1])], N * S);
      disp(enc, P.add, [x, h2, uAdd], N * S);
    }
    disp(enc, P.ln, [x, W["decoder.ln.weight"], W["decoder.ln.bias"], an, uNS], N);     // final ln → an
    enc.copyBufferToBuffer(an, (N - 1) * S * 4, fnLast, 0, S * 4);                       // last position
    disp(enc, P.lin, [fnLast, tokEmb, dummy, logitsB, u4([1, S, VOCAB, 0])], VOCAB);     // tied logits
    const rb = dev.createBuffer({ size: VOCAB * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
    enc.copyBufferToBuffer(logitsB, 0, rb, 0, VOCAB * 4);
    dev.queue.submit([enc.finish()]);
    await rb.mapAsync(GPUMapMode.READ);
    const lg = new Float32Array(rb.getMappedRange().slice(0)); rb.unmap();
    const ms = Math.round(performance.now() - t0);

    // argmax over text tokens + EOT (tk<=50257), logit cosine over all vocab
    let best = -1, bv = -Infinity; for (let tk = 0; tk <= 50257; tk++) { if (lg[tk] > bv) { bv = lg[tk]; best = tk; } }
    let dot = 0, na = 0, nb = 0; for (let i = 0; i < VOCAB; i++) { dot += lg[i] * gold[i]; na += lg[i] * lg[i]; nb += gold[i] * gold[i]; }
    const cosine = dot / (Math.sqrt(na) * Math.sqrt(nb));
    const pass = best === dref.argmax && cosine >= 0.999;
    window.__dec = { stage: "done", gpuArgmax: best, oracleArgmax: dref.argmax, argmatch: best === dref.argmax, cosine: +cosine.toFixed(6), gpuVal: +bv.toFixed(3), oracleVal: dref.argval, ms, pass };
    log(`\nGPU decoder (${NL} layers) → argmax ${best} (${bv.toFixed(2)}) · oracle ${dref.argmax} (${dref.argval}) in ${ms}ms`);
    log(`argmax match: ${best === dref.argmax ? "✓" : "✗"} · logit cosine ${cosine.toFixed(6)} → ${pass ? "✓ PASS" : "✗ FAIL"}`);
  } catch (e) { window.__dec = { stage: "error", error: String(e) }; log("ERROR: " + e + "\n" + (e.stack || "")); }
})();
</script>
