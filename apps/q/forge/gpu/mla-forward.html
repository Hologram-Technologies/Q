<!doctype html>
<meta charset="utf-8">
<title>GLM-class layer forward on GPU — greedy parity vs CPU Tier-A oracle</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0b0d; color: #e6e8ea; font: 13px/1.6 ui-monospace, Menlo, monospace; padding: 24px 28px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  #v { border: 1px solid #1c2128; border-radius: 10px; padding: 14px 16px; background: #101318; white-space: pre-wrap; }
  #v.ok { border-color: #1f6f43; background: #0d1712; } #v.bad { border-color: #6f2f2f; background: #170d0d; }
  .big { font-size: 18px; font-weight: 700; }
</style>
<h1>GLM-class transformer layer — MLA + mul_mat_id MoE + K-quant path, whole forward on WebGPU</h1>
<div id="v">running…</div>
<script type="module">
import { runMlaGpuForward } from "./holo-mla-gpu.mjs";
const $v = document.getElementById("v");
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) || 1); };
const maxAbs = (a, b) => { let m = 0; for (let i = 0; i < a.length; i++) m = Math.max(m, Math.abs(a[i] - b[i])); return m; };
const argmax = (a) => { let m = 0; for (let i = 1; i < a.length; i++) if (a[i] > a[m]) m = i; return m; };

async function run() {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const data = await (await fetch("./_qtest/mla.json?cb=" + Date.now())).json();
  let route = null;
  const gpu = await runMlaGpuForward(dev, data.full, data.ids, (sel, wt) => { route = { sel, wt }; });
  const ora = data.logits;
  const c = cos(gpu, ora), mx = maxAbs(gpu, ora), aGpu = argmax(gpu), aOra = argmax(ora);
  const routeOk = JSON.stringify(route.sel) === JSON.stringify(data.moe.selected);
  const ok = aGpu === aOra && c > 0.9999 && routeOk;
  window.__fwd = { ok, cos: c, maxAbs: mx, argmaxGpu: aGpu, argmaxOracle: aOra, route: route.sel, routeOracle: data.moe.selected };
  $v.className = ok ? "ok" : "bad";
  $v.innerHTML =
`<span class="big">${ok ? "GLM-class GPU forward MATCHES the CPU oracle — greedy token identical ✓" : "MISMATCH ✗"}</span>

prompt ids [${data.ids}] · ${data.T} positions · 1 layer (MLA + DeepSeek-MoE), whole forward on WebGPU
final logits (dim ${ora.length}) : cosine ${c.toFixed(8)} · maxAbs ${mx.toExponential(2)}
greedy argmax : GPU ${aGpu}  ·  oracle ${aOra}  ${aGpu === aOra ? "✓" : "✗"}
MoE routing   : GPU [${route.sel}]  ·  oracle [${data.moe.selected}]  ${routeOk ? "✓" : "✗"}

Every matvec/norm/rope/attention/swiglu ran on the GPU through the witnessed kernels. Swap the mvF
weight path to MATVECQ4KRAW/Q5KRAW/Q6KRAW (witnessed) and this is a real quantized GLM/DeepSeek forward.`;
}
run().catch(e => { $v.className = "bad"; $v.textContent = "ERROR: " + (e.stack || e.message); window.__fwd = { ok: false, err: String(e.message) }; });
</script>
