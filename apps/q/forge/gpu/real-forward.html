<!doctype html>
<meta charset="utf-8">
<title>Real DeepSeek-V2-Lite — whole 27-layer forward on WebGPU, weights κ-streamed</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0b0d; color: #e6e8ea; font: 13px/1.6 ui-monospace, Menlo, monospace; padding: 24px 28px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  #v { border: 1px solid #1c2128; border-radius: 10px; padding: 14px 16px; background: #101318; white-space: pre-wrap; min-height: 40px; }
  #v.ok { border-color: #1f6f43; background: #0d1712; } #v.bad { border-color: #6f2f2f; background: #170d0d; }
  .big { font-size: 18px; font-weight: 700; }
  #log { margin-top: 12px; max-height: 240px; overflow: auto; border: 1px solid #1a1d22; border-radius: 8px; padding: 8px 12px; background: #0c0f13; color: #9db4d4; font-size: 12px; white-space: pre-wrap; }
</style>
<h1>Real DeepSeek-V2-Lite — 27-layer MLA+MoE forward on WebGPU, weights streamed by κ (HTTP Range + SHA-256)</h1>
<div id="v">loading metadata…</div>
<div id="log"></div>
<script type="module">
import { runRealForward, runRealForwardResident } from "./holo-mla-gpu-real.mjs";
const Q = new URLSearchParams(location.search);
const READBACK = Q.get("readback") === "1";
const GEN = Q.has("gen") ? parseInt(Q.get("gen")) : 8;
const $v = document.getElementById("v"), $log = document.getElementById("log");
const log = (s) => { $log.textContent = s + "\n" + $log.textContent; };
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) || 1); };

async function run() {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const meta = await (await fetch("./_qtest/real-model.json?cb=" + Date.now())).json();
  $v.textContent = `streaming ${meta.cfg.nLayer}-layer forward · prompt [${meta.ids}] · vocab ${meta.vocab}…`;
  const layerCos = [];
  const t0 = performance.now();
  const fwd = READBACK ? runRealForward : runRealForwardResident;
  const { argmax, logits, stats, gen = [], genTimes = [], tokPerSec } = await fwd(dev, meta, {
    log, genTokens: READBACK ? 0 : GEN,
    onLayer: (il, h) => { const g = meta.trace[`l${il}.out`]; if (g) layerCos[il] = cos(h, g); },
  });
  const secs = ((performance.now() - t0) / 1000).toFixed(1);
  const lc = cos(logits, meta.floatLogits);
  const okToken = argmax === meta.floatArgmax;
  const berlin = argmax === meta.expectedInt;
  const warm = (stats.opfsHits || 0) > 0 && stats.perf.fetch < 500;   // served from OPFS, ~0 network
  const ok = okToken && lc > 0.999;
  const medMs = genTimes.length ? [...genTimes].sort((a, b) => a - b)[genTimes.length >> 1] : null;
  window.__realfwd = { ok, argmax, floatArgmax: meta.floatArgmax, expectedInt: meta.expectedInt, berlin, logitsCos: lc, tokPerSec, medMs, gen, warm, opfsHits: stats.opfsHits, stats, secs };
  $v.className = ok ? "ok" : "bad";
  $v.innerHTML =
`<span class="big">${ok ? (berlin ? "Real DeepSeek-V2-Lite decodes “ Berlin” on WebGPU ✓" : "GPU forward matches the float oracle ✓") : "MISMATCH ✗"}</span>

argmax : GPU ${argmax} " Berlin"  ${berlin ? "== llama.cpp ✓" : "≠"}   ·   logits cos vs oracle ${lc.toFixed(6)}
${gen.length > 1 ? `generated ${gen.length} tokens [${gen.join(", ")}]` : ""}
${tokPerSec ? `STEADY-STATE: ${tokPerSec.toFixed(2)} tok/s  ·  median ${medMs.toFixed(0)} ms/token  (${genTimes.length} generate steps, weights+KV resident)` : ""}
load: ${warm ? `WARM — ${stats.opfsHits} blocks from OPFS, ${(stats.perf.fetch / 1000).toFixed(1)}s network (0-net reload ✓)` : `COLD — streamed ${(stats.netBytes / 1e6).toFixed(0)} MB by κ, persisted to OPFS`} · ${stats.verified} SHA-256-verified · ${secs}s total
profile: fetch ${(stats.perf.fetch / 1000).toFixed(1)}s · opfs ${(stats.perf.opfs / 1000).toFixed(1)}s · verify ${(stats.perf.verify / 1000).toFixed(1)}s · gpu-sync ${(stats.perf.gpu / 1000).toFixed(1)}s

Whole 27-layer forward (MLA + 64/6 MoE + 2×shared + leading-dense + Q6_K lm_head), resident on the GPU, real
Q4_K/Q8_0/Q6_K weights κ-streamed + SHA-256-verified, OPFS-persisted for warm-0 reload. No inference server.`;
  log(`DONE in ${secs}s${tokPerSec ? " · " + tokPerSec.toFixed(2) + " tok/s" : ""}`);
}
run().catch((e) => { $v.className = "bad"; $v.textContent = "ERROR: " + (e.stack || e.message); window.__realfwd = { ok: false, err: String(e.message) }; });
</script>
