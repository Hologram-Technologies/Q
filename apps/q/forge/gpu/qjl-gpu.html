<!doctype html><meta charset=utf-8><title>QJL dot-correction GPU witness</title>
<body><pre id=log>loading…</pre><script type=module>
// WGSL QJL Stage-2 dot-correction (the TBQ attention-score term), witnessed vs the CPU
// oracle qjlDotCorrection. Two steps: (1) project R·q in-shader — ×qjl_signs then Fast
// Walsh-Hadamard (one workgroup, shared mem, no 1/√d) = qjl_project_inplace; (2) per cached
// block, corr = d_r · √(π/2)/d · Σ_j sign(qjl_bits_j)·projRq_j. This is what would be ADDED
// to each rotated-space attention score for TBQ KV. Matches the unbiased estimator on CPU.
const log = (m) => document.getElementById("log").textContent = m;
(async () => {
  const { d, N, qjlBytes, Rq, qjlSigns, qjlBits, dr, expected } = await (await fetch("./_qjl_data.json")).json();
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const f32sb = (a) => { const b = dev.createBuffer({ size: a.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
  const u8sb = (u8) => { const pad = new Uint8Array(Math.ceil(u8.length / 4) * 4); pad.set(u8); const b = dev.createBuffer({ size: pad.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array(pad.buffer)); return b; };
  const pipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });

  // step 1: project R·q  (×qjl_signs then FHT, no 1/√d)  → projRq[d]
  const PROJ = `
const D:u32=${d}u;
@group(0)@binding(0)var<storage,read>rq:array<f32>;@group(0)@binding(1)var<storage,read>signs:array<f32>;@group(0)@binding(2)var<storage,read_write>outp:array<f32>;
var<workgroup> sh:array<f32,${d}>;
@compute @workgroup_size(${d}) fn main(@builtin(local_invocation_id) lid:vec3<u32>){
  let o=lid.x; sh[o]=rq[o]*signs[o]; workgroupBarrier();
  var len:u32=1u; loop{ if(len>=D){break;} if((o&len)==0u){let a=sh[o];let b=sh[o+len];sh[o]=a+b;sh[o+len]=a-b;} workgroupBarrier(); len=len<<1u; }
  outp[o]=sh[o];
}`;
  // step 2: per block, corr = d_r · √(π/2)/d · Σ_j sign(qjl_bits_j)·projRq_j
  const CORR = `
const D:u32=${d}u; const QB:u32=${qjlBytes}u; const SCALE:f32=${Math.sqrt(1.5707963) / d};
@group(0)@binding(0)var<storage,read>proj:array<f32>;@group(0)@binding(1)var<storage,read>bits:array<u32>;@group(0)@binding(2)var<storage,read>dr:array<f32>;@group(0)@binding(3)var<storage,read_write>corr:array<f32>;
fn gb(b:u32)->u32{let w=bits[b>>2u];return (w>>((b&3u)*8u))&0xffu;}
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){
  let p=g.x; if(p>=${N}u){return;}
  if(dr[p]<1e-15){corr[p]=0.0;return;}
  let base=p*QB; var sum=0.0;
  for(var j=0u;j<D;j++){ let bit=(gb(base+(j>>3u))>>(j&7u))&1u; let sgn=select(-1.0,1.0,bit==1u); sum=sum+sgn*proj[j]; }
  corr[p]=dr[p]*SCALE*sum;
}`;
  const bProj = f32sb(new Float32Array(d));
  { const e = dev.createCommandEncoder(); const P = pipe(PROJ);
    const bg = dev.createBindGroup({ layout: P.getBindGroupLayout(0), entries: [{ binding: 0, resource: { buffer: f32sb(new Float32Array(Rq)) } }, { binding: 1, resource: { buffer: f32sb(new Float32Array(qjlSigns)) } }, { binding: 2, resource: { buffer: bProj } }] });
    const pa = e.beginComputePass(); pa.setPipeline(P); pa.setBindGroup(0, bg); pa.dispatchWorkgroups(1); pa.end(); dev.queue.submit([e.finish()]); }
  const bitsFlat = new Uint8Array(N * qjlBytes); qjlBits.forEach((a, i) => bitsFlat.set(a, i * qjlBytes));
  const bCorr = dev.createBuffer({ size: N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
  { const e = dev.createCommandEncoder(); const P = pipe(CORR);
    const bg = dev.createBindGroup({ layout: P.getBindGroupLayout(0), entries: [{ binding: 0, resource: { buffer: bProj } }, { binding: 1, resource: { buffer: u8sb(bitsFlat) } }, { binding: 2, resource: { buffer: f32sb(new Float32Array(dr)) } }, { binding: 3, resource: { buffer: bCorr } }] });
    const pa = e.beginComputePass(); pa.setPipeline(P); pa.setBindGroup(0, bg); pa.dispatchWorkgroups(Math.ceil(N / 64)); pa.end();
    const rd = dev.createBuffer({ size: N * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }); e.copyBufferToBuffer(bCorr, 0, rd, 0, N * 4); dev.queue.submit([e.finish()]);
    await rd.mapAsync(GPUMapMode.READ); const got = Array.from(new Float32Array(rd.getMappedRange().slice(0)));
    let maxRel = 0; for (let i = 0; i < N; i++) maxRel = Math.max(maxRel, Math.abs(got[i] - expected[i]) / (Math.abs(expected[i]) + 1e-4));
    const ok = maxRel < 1e-4;
    window.__qjl = { ok, maxRel: +maxRel.toExponential(2), N, got: got.map(v => +v.toFixed(4)), expected: expected.map(v => +v.toFixed(4)) };
    log(`QJL correction GPU: ${ok ? "PASS" : "FAIL"}  maxRel=${maxRel.toExponential(2)} (${N} blocks)`);
  }
})().catch((e) => { window.__qjl = { ok: false, err: String(e) }; log("ERR " + e); });
</script>
