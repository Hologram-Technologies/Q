<script type="module">
// κ-ADDRESSED NATIVE RUNTIME: the browser fetches a GGUF, FORGES it to content-
// addressed κ-objects (did:holo:sha256, L5-verified), synthesizes the transformer
// graph, unpacks weights from the verified κ-blocks, and runs the whole forward on
// the GPU — predicting the next token, no server compute, no re-quantization.

import { forgeGguf, loadByKappa, ggmlNBytes, GGML_TYPE_NAME } from "../gguf-forge.mjs";
import { synthesizeGraph } from "../gguf-forge-graph.mjs";
import { makeTokenizer } from "../gguf-forge-tokenizer.mjs";
import { dequantizeExact, GGML } from "../gguf-forge-dequant.mjs";
import { unpackWeight } from "../gguf-forge-gpupack.mjs";
import { parseGgufHeader } from "../../qvac-ingest.mjs";
import { sha256hex, jcs, didHolo } from "../../../../../holo-os/system/os/usr/lib/holo/holo-uor.mjs";
import { openGgufHoloStream } from "../gguf-forge-kstream.mjs";
import { makeKappaStore } from "./holo-kappa-store.mjs";
import { createGpuRuntime, G, TQENC, TQDEC } from "./holo-gguf-gpu.mjs?v=8";   // ONE shared WGSL kernel runtime (run-native + Q's brain)
import { tqTables } from "../gguf-forge-turboquant.mjs";        // TurboQuant KV codec tables (signs/codebook/boundaries)
import { genTestAdapter, adapterKappa, openAdapterHolo } from "./holo-lora.mjs?v=9";   // LoRA adapter as a κ-object (open base model + adapter by link)

// Browser forge: identical κ-objects to forgeGguf, but hashes each tensor with the
// hardware-accelerated WebCrypto SHA-256 (same algorithm → identical did:holo:sha256
// and rootKappa) instead of pure-JS. ~100x faster on a 470MB model. Also keeps blocks
// as zero-copy subarrays (lower memory). rootKappa still re-derives to the same value.
async function forgeFast(bytes) {
  const { version, dataOffset, tensors, meta } = parseGgufHeader(bytes);
  const toHex = (u8) => { let s = ""; for (const b of u8) s += b.toString(16).padStart(2, "0"); return s; };
  const b64 = (u8) => { let s = ""; for (const b of u8) s += String.fromCharCode(b); return btoa(s); };
  const blocks = new Map(), planTensors = [];
  for (const t of tensors) {
    const n = t.dims.reduce((a, b) => a * b, 1), nbytes = ggmlNBytes(t.ggmlType, n);
    const blob = bytes.subarray(dataOffset + t.offset, dataOffset + t.offset + nbytes);
    const dig = new Uint8Array(await crypto.subtle.digest("SHA-256", blob));
    const hex = toHex(dig);
    if (!blocks.has(hex)) blocks.set(hex, blob);          // zero-copy view (vs forgeGguf's slice)
    planTensors.push({ name: t.name, dims: t.dims, type: t.ggmlType, typeName: GGML_TYPE_NAME[t.ggmlType] || String(t.ggmlType), nbytes, kappa: "sha256:" + hex, sri: "sha256-" + b64(dig) });
  }
  const arch = meta["general.architecture"] || "unknown";
  const plan = { format: "gguf-forge/1", arch, ggufVersion: version, meta, tensors: planTensors };
  return { version, dataOffset, arch, meta, tensors: planTensors, blocks, plan, rootKappa: didHolo("sha256", sha256hex(jcs(plan))) };
}

// ── A/B path (SRC=gguf): fetch the monolithic GGUF and re-forge κ-objects in-browser ──
async function loadByForge(tl) {
  log("fetching GGUF…");
  const bytes = new Uint8Array(await (await fetch(MODEL)).arrayBuffer());
  log(`forging ${(bytes.length / 1e6 | 0)}MB → κ-objects (content-addressing + L5)…`);
  await new Promise((r) => setTimeout(r, 30));            // let the status paint
  tl("fetched");
  const f = await forgeFast(bytes);
  tl("forged");
  loadByKappa({ get: (h) => f.blocks.get(h) }, f.tensors[0].kappa);   // L5 spot-check
  return { ...f, tokSrc: bytes, src: "gguf" };
}

// ── Vision path (SRC=holo, default): load every weight BY ITS κ from the sealed .holo ──
// per-block L5 on receipt (getBody refuses a tampered body), a verify-once global κ-cache (O(1) warm),
// HTTP-Range so only the bytes you need cross the wire. No re-forge, no monolithic download, no
// location-as-identity — the model IS its content. The header (tokenizer + hparams) comes from the .holo.
async function loadByKappaStream(tl) {
  log("opening sealed .holo (stream by κ)…");
  let served = 0, ranged = null, whole = null;           // bytes off the WIRE — stays 0 on a fully-warm load
  const ensureMode = async () => {                       // probe LAZILY: a warm load never touches the network at all
    if (ranged !== null) return;
    const probe = await fetch(HOLO, { headers: { Range: "bytes=0-1" } }); served += 2;
    ranged = probe.status === 206;
    if (!ranged) { whole = new Uint8Array(await (await fetch(HOLO)).arrayBuffer()); served += whole.length; }
  };
  const rangeReader = async (off, len) => {
    await ensureMode();
    if (ranged) { const b = new Uint8Array(await (await fetch(HOLO, { headers: { Range: `bytes=${off}-${off + len - 1}` } })).arrayBuffer()); served += b.length; return b; }
    return whole.subarray(off, off + len);
  };
  // PERSISTENT content store: OPFS dir "holo-kappa", keyed by κ, shared across every model. Body bodies
  // AND the head region (gguf header + tokenizer) are kept forever + L5-verified → a second load is
  // 0-network and offline. urlHint = a local accelerator so open-by-URL is 0-wire too (trust still by κ).
  const persist = makeKappaStore();                      // ?fresh=1 wipes it first for a deterministic cold run
  if (new URLSearchParams(location.search).get("fresh") === "1") { await persist.clear(); log("cleared OPFS κ-store (cold run)…"); }
  const cache = new Map();
  const { plan, store, headerBytes, headWarm } = await openGgufHoloStream(rangeReader, { cache, persist, urlHint: HOLO, rootKappa: "did:holo:sha256:" + KAPPA });
  tl(`opened holo (arch=${plan.arch}, ${plan.tensors.length} tensors, head ${headWarm ? "WARM" : "cold"})`);
  const blocks = new Map();                              // pull each body BY ITS κ: OPFS-hit (0 net) or Range+L5, then persist
  let i = 0;
  for (const t of plan.tensors) {
    const hex = t.kappa.split(":").pop();
    if (!blocks.has(hex)) blocks.set(hex, await store.get(hex));
    if ((++i % 40) === 0) log(`κ-streaming weights by κ… ${i}/${plan.tensors.length} (${persist.stats.opfsHits} warm, ${persist.stats.misses} net)`);
  }
  const ps = persist.stats;
  const warm = served === 0;                             // the WHOLE archive (head + every body) came from OPFS — 0 wire
  tl(`κ-streamed ${blocks.size} bodies + head — ${warm ? "FULLY WARM (0 bytes off the wire, offline)" : `cold ${(served / 1e6).toFixed(1)}MB`}; bodyHits=${ps.opfsHits} headHits=${ps.headHits} writes=${ps.opfsWrites + ps.headWrites} refuses=${ps.refuses + ps.headRefuses}`);
  const plan2 = { format: "gguf-forge/1", arch: plan.arch, meta: plan.meta, tensors: plan.tensors };
  const rootKappa = didHolo("sha256", sha256hex(jcs(plan.tensors.map((t) => t.kappa))));  // identity over the κ-set
  window.__stream = { src: "holo", warm, headWarm, tensors: blocks.size, wireBytes: served, bodyBytesFetchedMB: +(ps.bytesFetched / 1e6).toFixed(1), bodyHits: ps.opfsHits, headHits: ps.headHits, writes: ps.opfsWrites + ps.headWrites, refuses: ps.refuses + ps.headRefuses };
  return { tensors: plan.tensors, blocks, plan: plan2, rootKappa, tokSrc: headerBytes, src: "holo" };
}

const out = document.getElementById("out");
const t0 = performance.now();
const log = (m) => { out.textContent = `[${((performance.now() - t0) / 1000).toFixed(1)}s] ${m}`; };
window.__run = { ready: false };
// ?model= picks the sealed .holo. Dense Qwen (Q4_K/Q5_0/Q8_0) or BitNet (TQ2_0 ternary + F16 ffn_down,
// Q6_K tied lm_head, RMS sub-norms, no QKV bias) — both ride the one κ-stream loader + kernel runtime.
const MODELS = {
  qwen:   { holo: "../.models/qwen2.5-0.5b-instruct.holo",  gguf: "../.models/qwen2.5-0.5b-instruct-q4_k_m.gguf", kappa: "41a930c07450623751f84af6a55bbecd54fe608ad6e94adf17f83c712aaf1b91", eos: [151643, 151645, 151662, 151663, 151664], prompt: "The capital of France is" },
  bitnet: { holo: "../.models/bitnet-xl-tq2_0.holo",        gguf: "",                                              kappa: "0d34147915df9b9fc9fada65fb44cd1cecc372221ef297950afc8c63c7fb9c86", eos: [2], prompt: "The capital of France is" },
};
const _q = new URLSearchParams(location.search);
// OPEN-BY-LINK: ?holo=<κ-or-url> opens an ARBITRARY model by content hash — the link is a κ, not a path.
// A 64-hex κ resolves via the local manifest (κ→.holo) if present, else the κ-route /.holo/sha256/<κ>
// (Service Worker → IPFS heal, prod). Identity is the hash; every block is re-derived (L5) on receipt.
let MODEL_ID, M, MODEL, HOLO, KAPPA;
const _holo = _q.get("holo");
if (_holo) {
  const isK = /^[0-9a-f]{64}$/i.test(_holo);
  KAPPA = isK ? _holo.toLowerCase() : "";
  const hit = isK ? Object.values(MODELS).find((m) => m.kappa === KAPPA) : null;
  HOLO = hit ? hit.holo : (isK ? "/.holo/sha256/" + KAPPA : _holo);   // local manifest → κ-route (SW/IPFS) → url
  M = hit || { eos: [], prompt: "The capital of France is" };          // eos for an unknown linked model is read from the .holo header
  MODEL_ID = hit ? "link:" + KAPPA.slice(0, 8) : "link"; MODEL = "";
} else {
  MODEL_ID = (_q.get("model") || "qwen").toLowerCase();
  M = MODELS[MODEL_ID] || MODELS.qwen;
  MODEL = M.gguf; HOLO = M.holo; KAPPA = M.kappa;          // SRC=gguf re-forges MODEL; SRC=holo streams HOLO by κ
}
const SRC = (_q.get("src") || "holo").toLowerCase();
const PROMPT = _q.get("p") || M.prompt;

// WGSL kernels + dispatch/uniform/buffer helpers now live in the shared runtime module
// holo-gguf-gpu.mjs (imported above) — run-native and Q's brain consume the EXACT same kernels.
let dev;

async function main() {
  const adapter = await navigator.gpu.requestAdapter(); dev = await adapter.requestDevice();
  const _rt = createGpuRuntime(dev), { P, disp, u4, f4, resetUniforms } = _rt;
  // VRAM accounting (measured, not estimated): wrap the buffer allocators to sum bytes uploaded to the GPU.
  let _vram = 0; const sbuf = (n) => { _vram += Math.max(4, n * 4); return _rt.sbuf(n); }, wF = (a) => { _vram += Math.max(4, a.byteLength); return _rt.wF(a); }, rawU32 = (b) => { _vram += Math.max(4, b.byteLength); return _rt.rawU32(b); };
  // upload an unpacked weight to GPU buffers (HIFI path)
  const upW = (u) => { if (u.kind === "q") { const q = u.quants, qU32 = new Uint32Array(q.buffer, q.byteOffset, q.length / 4); return { kind: "q", sBuf: wF(u.scales), qBuf: wF(qU32) }; } return { kind: "f32", fBuf: wF(u.data) }; };

  const tl = (m) => { (window.__t = window.__t || []).push(((performance.now() - t0) / 1000).toFixed(1) + "s " + m); };
  const f = SRC === "gguf" ? await loadByForge(tl) : await loadByKappaStream(tl);
  const graph = synthesizeGraph(f.plan), S = graph.stats;
  const tdir = {}; for (const t of f.tensors) tdir[t.name] = t;
  const blk = (name) => f.blocks.get(tdir[name].kappa.split(":").pop());
  const dimsNK = (name) => { const d = tdir[name].dims; return [d.length > 1 ? d[1] : 1, d[0]]; };

  const tok = makeTokenizer(f.tokSrc);
  const _ids = _q.get("ids");                            // ?ids=a,b,c → feed raw token ids (isolate the forward, parity witness)
  const tokens = _ids ? _ids.split(",").map(Number) : tok.encode(PROMPT, { addSpecial: false });
  const D = S.n_embd, NH = S.n_head, NHKV = S.n_head_kv, HD = S.head_dim, EPS = S.eps, FREQ = S.freq_base;
  const KV = NHKV * HD, QD = NH * HD, scale = 1 / Math.sqrt(HD), grp = NH / NHKV;
  const params = new URLSearchParams(location.search);
  const N_NEW = Math.max(1, +(params.get("n") || 1));    // tokens to generate
  const HIFI = params.get("hifi") === "1";               // integer-dot (bit-faithful, slower, unpacked)
  // BitNet: route TQ2_0 matvecs through the Q8_K-activation INTEGER dot (matches llama.cpp greedy);
  // ?tq2=float forces the f32 dequant-dot (correct but Tier-B, like dense fast vs HIFI).
  const BITINT = !HIFI && Object.values(tdir).some((t) => t.type === GGML.TQ2_0) && params.get("tq2") !== "float";
  const ADAPT = !!params.get("adapter");                 // ?adapter=1 = in-page seeded test adapter; ?adapter=<κ> = open a real adapter .holo by content hash

  log(`κ root ${f.rootKappa.slice(0, 28)}… — uploading weights…`);
  // Fast default: Q5_0/Q8_0 weights uploaded as PACKED κ-block bytes (no JS unpack, ~half
  // the upload), dequantized in-shader. Q6_K/Q4_K/F32 -> f32. HIFI: unpacked + integer dot.
  const loadW = HIFI
    ? (name) => { const t = tdir[name], [N, K] = dimsNK(name); return upW(unpackWeight(blk(name), t.type, N, K)); }
    : (name) => {
        const t = tdir[name], [N, K] = dimsNK(name);
        if (t.type === GGML.Q5_0) return { kind: "q5raw", buf: rawU32(blk(name)), N, K };
        if (t.type === GGML.Q8_0) return { kind: "q8raw", buf: rawU32(blk(name)), N, K };
        if (t.type === GGML.Q4_K) return { kind: "q4kraw", buf: rawU32(blk(name)), N, K };      // raw in-shader (no f32 expansion)
        if (t.type === GGML.Q6_K) return { kind: "q6kraw", buf: rawU32(blk(name)), N, K };      // raw in-shader (no f32 expansion)
        if (t.type === GGML.TQ2_0) return { kind: BITINT ? "tq2i" : "tq2", buf: rawU32(blk(name)), N, K };  // BitNet ternary (integer Q8_K dot, or f32)
        if (BITINT && t.type === GGML.F16) return { kind: "f16", buf: rawU32(blk(name)), N, K };  // BitNet ffn_down: f16·f16 dot (llama-faithful)
        return { kind: "f32", fBuf: wF(unpackWeight(blk(name), t.type, N, K).data), N, K };     // F16/Q6_K/Q4_K/F32 → f32
      };
  const Wt = {};
  // optional tensors (o:1) load only if present → one loop serves qwen (biases, no sub-norms) AND
  // BitNet (sub-norms, no biases). loadOpt returns null when the tensor is absent.
  const loadOpt = (name) => (tdir[name] ? loadW(name) : null);
  for (let i = 0; i < S.n_layer; i++) {
    const p = `blk.${i}.`;
    for (const [k, g, o] of [["attn_norm", "attn_norm.weight", 0], ["wq", "attn_q.weight", 0], ["bq", "attn_q.bias", 1], ["wk", "attn_k.weight", 0], ["bk", "attn_k.bias", 1], ["wv", "attn_v.weight", 0], ["bv", "attn_v.bias", 1], ["wo", "attn_output.weight", 0], ["attn_sub_norm", "attn_sub_norm.weight", 1], ["ffn_norm", "ffn_norm.weight", 0], ["gate", "ffn_gate.weight", 0], ["up", "ffn_up.weight", 0], ["down", "ffn_down.weight", 0], ["ffn_sub_norm", "ffn_sub_norm.weight", 1]])
      Wt[`l${i}.${k}`] = o ? loadOpt(p + g) : loadW(p + g);
  }
  Wt["final_norm"] = loadW("output_norm.weight");
  tl("layer weights unpacked+uploaded");
  // lm_head (chunked: a single quants buffer would exceed the 128MB binding limit)
  const lmName = tdir["output.weight"] ? "output.weight" : "token_embd.weight", lmT = tdir[lmName], [lmN, lmK] = dimsNK(lmName);
  const vocab = lmN, nbL = lmK / 32;
  const lmChunks = [], chk = (CH) => { const rows = Math.ceil(lmN / CH); return Array.from({ length: CH }, (_, c) => [c * rows, Math.min(lmN, c * rows + rows)]); };
  // raw lm_head kinds: [block elems, bytes/block, kind] — in-shader unpack, weight stays packed
  const RAWLM = { [GGML.Q5_0]: [32, 22, "q5raw"], [GGML.Q8_0]: [32, 34, "q8raw"], [GGML.TQ2_0]: [256, 66, "tq2"], [GGML.Q4_K]: [256, 144, "q4kraw"] };
  const isRawLm = !!RAWLM[lmT.type];
  if (HIFI && (lmT.type === GGML.Q5_0 || lmT.type === GGML.Q8_0)) {
    const lmU = unpackWeight(blk(lmName), lmT.type, lmN, lmK);
    for (const [r0, r1] of chk(Math.ceil(lmN / 100000))) { const q = lmU.quants.subarray(r0 * lmK, r1 * lmK); lmChunks.push({ kind: "hifi", r0, n: r1 - r0, qBuf: wF(new Uint32Array(q.buffer, q.byteOffset, q.length / 4)), sBuf: wF(lmU.scales.subarray(r0 * nbL, r1 * nbL).slice()) }); }
  } else if (isRawLm) {                                  // Q5_0/Q8_0/TQ2_0/Q4_K packed bytes, in-shader unpack
    const [be, bsz, kind] = RAWLM[lmT.type], raw = blk(lmName), bpr = (lmK / be) * bsz;
    for (const [r0, r1] of chk(Math.ceil(lmN / 100000))) lmChunks.push({ kind, r0, n: r1 - r0, buf: rawU32(raw.subarray(r0 * bpr, r1 * bpr)) });
  } else if (BITINT && lmT.type === GGML.Q6_K) {        // BitNet tied lm_head: Q6_K · Q8_K INTEGER dot (the op that needs integer to match llama.cpp greedy)
    const raw = blk(lmName), bpr = (lmK / 256) * 210;
    for (const [r0, r1] of chk(Math.ceil(lmN / 100000))) lmChunks.push({ kind: "q6ki", r0, n: r1 - r0, buf: rawU32(raw.subarray(r0 * bpr, r1 * bpr)) });
  } else if (lmT.type === GGML.Q6_K) {                  // non-BitNet Q6_K lm_head: raw in-shader dequant-dot (packed)
    const raw = blk(lmName), bpr = (lmK / 256) * 210;
    for (const [r0, r1] of chk(Math.ceil(lmN / 100000))) lmChunks.push({ kind: "q6kraw", r0, n: r1 - r0, buf: rawU32(raw.subarray(r0 * bpr, r1 * bpr)) });
  } else {                                              // F16/Q6_K/Q4_K/F32 → dequant to f32, chunked under the 128MB binding limit
    const data = unpackWeight(blk(lmName), lmT.type, lmN, lmK).data;
    for (const [r0, r1] of chk(Math.max(1, Math.ceil(lmN * lmK * 4 / (120 * 1024 * 1024))))) lmChunks.push({ kind: "f", r0, n: r1 - r0, buf: wF(data.subarray(r0 * lmK, r1 * lmK).slice()) });
  }
  tl("lm_head uploaded");
  // embeddings: dequant token_embd rows ON DEMAND (avoid materializing the whole ~544MB table)
  const teT = tdir["token_embd.weight"], teRaw = blk("token_embd.weight"), teBpr = ggmlNBytes(teT.type, D);
  const embedRow = (t) => dequantizeExact(teT.type, teRaw.subarray(t * teBpr, (t + 1) * teBpr), D);
  const _vramW = _vram;                                  // weights + lm_head + embeddings resident on the GPU
  tl("embeddings ready");

  log(`running ${S.n_layer}-layer GPU forward on "${PROMPT}"…`);
  const SB = {}; for (const [n, sz] of [["h", D], ["hh", D], ["xn", D], ["q", QD], ["qb", QD], ["qr", QD], ["k", KV], ["kb", KV], ["kr", KV], ["v", KV], ["vb", KV], ["ctx", QD], ["ctxn", QD], ["ao", D], ["fi", D], ["xn2", D], ["g", lmK /*unused*/], ["hn", D]]) SB[n] = sbuf(sz);
  const FF = Wt["l0.gate"].kind ? (tdir["blk.0.ffn_gate.weight"].dims[1]) : 0; // FF = gate N
  for (const [n, sz] of [["g", FF], ["u", FF], ["sw", FF], ["swn", FF], ["fo", D]]) SB[n] = sbuf(sz);
  const maxPos = tokens.length + N_NEW;
  // ?kv=pq: store the K cache as compact PolarQuant PQ4_0 blocks (~7× smaller for d=64) — the long-context
  // memory win. V stays f32. Per token K is encoded to KcQ[L]; at attention KcQ is decoded into one shared
  // f32 scratch (tempKc) reused across layers, then the existing ATTN runs. Codec witnessed bit-exact.
  const KVQ = params.get("kv") === "pq" && (HD === 64 || HD === 128);
  let Penc, Pdec, KcQ, tempKc, sgBuf, Bbuf, blkU = 0, kqBytes = 0;
  if (KVQ) {
    const TYPE = HD === 64 ? 49 : 48, tb = tqTables(TYPE); blkU = Math.ceil(tb.total / 4);  // PQ4_0_64 / PQ4_0
    const tqPipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });
    Penc = tqPipe(TQENC(tb.d, blkU)); Pdec = tqPipe(TQDEC(tb.d, blkU, tb.codebook));
    sgBuf = wF(new Float32Array(tb.signs)); Bbuf = wF(new Float32Array(tb.boundaries));
    KcQ = []; for (let L = 0; L < S.n_layer; L++) { const b = dev.createBuffer({ size: maxPos * NHKV * blkU * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST }); KcQ.push(b); kqBytes += maxPos * NHKV * blkU * 4; }
    tempKc = sbuf(maxPos * KV); _vram += kqBytes;
  }
  const Kc = [], Vc = []; for (let L = 0; L < S.n_layer; L++) { Kc.push(KVQ ? null : sbuf(maxPos * KV)); Vc.push(sbuf(maxPos * KV)); }
  const logits = sbuf(vocab);
  // Q8_0 activation scratch (sized for the largest matvec input). aQ holds packed int8.
  const aS = sbuf(FF / 32), aQ = dev.createBuffer({ size: (FF / 4) * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
  // Q8_K activation scratch (BitNet TQ2_0 inputs are all K=D; size for max(D,QD)). aKd=f32 scale/256-block, aKq=int8.
  const aKmax = Math.max(D, QD), aKd = sbuf(Math.ceil(aKmax / 256)), aKq = dev.createBuffer({ size: Math.ceil(aKmax / 4) * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
  _vram += (FF / 4) * 4 + Math.ceil(aKmax / 4) * 4;       // aQ + aKq (created directly, not via wrapped helpers)
  // FOOTPRINT (measured): weights resident + KV cache (grows with context). KV/token = n_layer·2·(NHKV·HD)·4 B.
  // K-cache bytes/token: f32 = n_layer·KV·4; PQ = n_layer·NHKV·blkU·4. (V cache is n_layer·KV·4 either way.)
  const kPerTokKB = KVQ ? (S.n_layer * NHKV * blkU * 4) / 1024 : (S.n_layer * KV * 4) / 1024;
  window.__vram = { model: MODEL_ID, kvMode: KVQ ? "pq4" : "f32", weightsMB: +(_vramW / 1e6).toFixed(1), totalAllocMB: +(_vram / 1e6).toFixed(1), kPerTokenKB: +kPerTokKB.toFixed(2), vPerTokenKB: +((S.n_layer * KV * 4) / 1024).toFixed(2), kReductionX: KVQ ? +((KV * 4) / (NHKV * blkU * 4)).toFixed(1) : 1, nLayer: S.n_layer, KV, ctxTokens: maxPos };
  // LoRA adapter: the learned delta on attn_q, applied in the forward (C0 primitive: A·x→B·h→saxpy).
  //   ?adapter=<κ> → resolve+open a real adapter .holo BY content hash (local manifest → κ-route → IPFS),
  //   per-body L5; ?adapter=1 → the in-page seeded test adapter (regression). Both yield layers[L].{A,B}.
  let adA = [], adB = [], adScale = 0, adR = 0, adHA = null, adHB = null;
  if (ADAPT) {
    const adP = params.get("adapter"), byK = /^[0-9a-f]{64}$/i.test(adP);
    let layers, adK = "", src = "seed";
    if (byK) {                                            // open the adapter BY κ — the link is a content hash, not a path
      const ADAPTERS = { "216a1e18045de1e3babb34c359afa4194f2bc2278ee6d3e737f2c6037dc7fe86": "../.models/qwen-attn_q-adapter.holo" };
      const url = ADAPTERS[adP.toLowerCase()] || ("/.holo/sha256/" + adP);   // local manifest → κ-route (SW/IPFS heal)
      const bytes = new Uint8Array(await (await fetch(url)).arrayBuffer());
      const ad = openAdapterHolo(bytes);                 // per-body L5 + footer L5 (tampered → throws)
      layers = ad.layers; adR = ad.r; adScale = ad.scale; adK = "did:holo:sha256:" + adP.toLowerCase(); src = "holo";
    } else {                                             // ?adapter=1: in-page seeded test adapter
      adR = 8; adScale = 1.0; const adAmp = +(params.get("amp") || 0.3);
      const ad = genTestAdapter({ seed: 1, inn: D, out: QD, r: adR, nLayer: S.n_layer, scale: adScale, amp: adAmp });
      layers = ad.layers; adK = await adapterKappa(ad, sha256hex);
    }
    for (let L = 0; L < S.n_layer; L++) { adA.push(wF(layers[L].A)); adB.push(wF(layers[L].B)); }
    adHA = sbuf(adR); adHB = sbuf(QD);
    window.__adapter = { applied: true, src, target: "attn_q", r: adR, scale: adScale, kappa: adK, link: `?holo=${KAPPA}&adapter=${adK.split(":").pop()}` };
  }
  // hifi: quantize the activation to Q8_0 and integer-dot (matches ggml exactly).
  // fast (default): float dequant-dot. Both consume the same κ-block weights.
  const quantAct = HIFI ? (enc, xB, K) => disp(enc, P.q8, [xB, aS, aQ, u4([K / 32])], G(K / 32)) : () => {};
  // BitNet: quantize the activation to Q8_K right before a group of TQ2·Q8_K integer matvecs sharing that input.
  const quantActK = (enc, xB, K) => disp(enc, P.q8k, [xB, aKd, aKq, u4([K / 256])], G(K / 256));
  const mv = (enc, w, xB, yB, ob = 0, N, K) => {
    if (w.kind === "q5raw") disp(enc, P.q5raw, [w.buf, xB, yB, u4([N, K, ob])], G(N));        // in-shader unpack
    else if (w.kind === "q8raw") disp(enc, P.q8raw, [w.buf, xB, yB, u4([N, K, ob])], G(N));
    else if (w.kind === "q4kraw") disp(enc, P.q4kraw, [w.buf, xB, yB, u4([N, K, ob])], G(N));   // Q4_K raw in-shader dequant-dot
    else if (w.kind === "q6kraw") disp(enc, P.q6kraw, [w.buf, xB, yB, u4([N, K, ob])], G(N));   // Q6_K raw in-shader dequant-dot
    else if (w.kind === "tq2") disp(enc, P.tq2, [w.buf, xB, yB, u4([N, K, ob])], G(N));        // BitNet ternary f32 dequant-dot
    else if (w.kind === "tq2i") disp(enc, P.tq2i, [w.buf, aKd, aKq, yB, u4([N, K, ob])], G(N)); // BitNet ternary · Q8_K integer dot
    else if (w.kind === "f16") disp(enc, P.f16, [w.buf, xB, yB, u4([N, K, ob])], G(N));        // f16·f16 dot (BitNet ffn_down)
    else if (w.kind === "f32") disp(enc, P.f, [w.fBuf, xB, yB, u4([N, K, ob])], G(N));
    else disp(enc, P.qi, [w.sBuf, w.qBuf, aS, aQ, yB, u4([N, K, ob])], G(N));                 // HIFI integer-dot
  };
  log(`generating ${N_NEW} token(s)${HIFI ? " (hifi integer-dot)" : ""}…`);
  const seq = [...tokens], gen = [], EOS = new Set(M.eos);
  let pos = 0;
  while (pos < seq.length) {
    resetUniforms();                                  // reuse the uniform pool each token
    dev.queue.writeBuffer(SB.h, 0, embedRow(seq[pos]));
    const enc = dev.createCommandEncoder();           // one command buffer for the whole token
    for (let L = 0; L < S.n_layer; L++) {
      const w = (s) => Wt[`l${L}.${s}`];
      disp(enc, P.rms, [SB.h, w("attn_norm").fBuf, SB.xn, f4([D, EPS])], 1);
      quantAct(enc, SB.xn, D); if (BITINT) quantActK(enc, SB.xn, D);   // Q8_K for the q/k/v TQ2 matvecs (shared input)
      // QKV — bias is optional (BitNet has none); without it, rope/KV source the raw projection.
      mv(enc, w("wq"), SB.xn, SB.q, 0, QD, D);
      if (ADAPT) { disp(enc, P.f, [adA[L], SB.xn, adHA, u4([adR, D, 0])], G(adR)); disp(enc, P.f, [adB[L], adHA, adHB, u4([QD, adR, 0])], G(QD)); disp(enc, P.saxpy, [adHB, SB.q, f4([adScale, QD])], G(QD)); }   // LoRA: q += scale·B·(A·xn)
      let qS = SB.q; if (w("bq")) { disp(enc, P.add, [SB.q, w("bq").fBuf, SB.qb, u4([QD])], G(QD)); qS = SB.qb; }
      mv(enc, w("wk"), SB.xn, SB.k, 0, KV, D); let kS = SB.k; if (w("bk")) { disp(enc, P.add, [SB.k, w("bk").fBuf, SB.kb, u4([KV])], G(KV)); kS = SB.kb; }
      mv(enc, w("wv"), SB.xn, SB.v, 0, KV, D); let vS = SB.v; if (w("bv")) { disp(enc, P.add, [SB.v, w("bv").fBuf, SB.vb, u4([KV])], G(KV)); vS = SB.vb; }
      disp(enc, P.rope, [qS, SB.qr, f4([HD, HD, NH, pos]), f4([FREQ])], G(NH * HD / 2));
      disp(enc, P.rope, [kS, SB.kr, f4([HD, HD, NHKV, pos]), f4([FREQ])], G(NHKV * HD / 2));
      let kCache = Kc[L];
      if (KVQ) { disp(enc, Penc, [SB.kr, sgBuf, KcQ[L], Bbuf, u4([pos * NHKV * blkU])], NHKV); }   // encode this token's K → KcQ
      else enc.copyBufferToBuffer(SB.kr, 0, Kc[L], pos * KV * 4, KV * 4);
      enc.copyBufferToBuffer(vS, 0, Vc[L], pos * KV * 4, KV * 4);
      if (KVQ) { disp(enc, Pdec, [KcQ[L], sgBuf, tempKc], (pos + 1) * NHKV); kCache = tempKc; }      // decode K cache → f32 scratch
      disp(enc, P.attn, [SB.qr, kCache, Vc[L], SB.ctx, u4([NH, HD, pos, KV]), f4([scale, grp])], G(NH));
      // attn_sub_norm (BitNet): RMS the attention context BEFORE the output projection.
      let woIn = SB.ctx; if (w("attn_sub_norm")) { disp(enc, P.rms, [SB.ctx, w("attn_sub_norm").fBuf, SB.ctxn, f4([QD, EPS])], 1); woIn = SB.ctxn; }
      quantAct(enc, woIn, QD); if (BITINT) quantActK(enc, woIn, QD);   // Q8_K for the wo TQ2 matvec
      mv(enc, w("wo"), woIn, SB.ao, 0, D, QD);
      disp(enc, P.add, [SB.h, SB.ao, SB.fi, u4([D])], G(D));
      disp(enc, P.rms, [SB.fi, w("ffn_norm").fBuf, SB.xn2, f4([D, EPS])], 1);
      quantAct(enc, SB.xn2, D); if (BITINT) quantActK(enc, SB.xn2, D);  // Q8_K for the gate/up TQ2 matvecs (shared input)
      mv(enc, w("gate"), SB.xn2, SB.g, 0, FF, D); mv(enc, w("up"), SB.xn2, SB.u, 0, FF, D);
      disp(enc, P.swiglu, [SB.g, SB.u, SB.sw, u4([FF])], G(FF));
      // ffn_sub_norm (BitNet): RMS the SwiGLU activation BEFORE the down projection.
      let downIn = SB.sw; if (w("ffn_sub_norm")) { disp(enc, P.rms, [SB.sw, w("ffn_sub_norm").fBuf, SB.swn, f4([FF, EPS])], 1); downIn = SB.swn; }
      quantAct(enc, downIn, FF);
      mv(enc, w("down"), downIn, SB.fo, 0, D, FF);
      disp(enc, P.add, [SB.fi, SB.fo, SB.hh, u4([D])], G(D));
      enc.copyBufferToBuffer(SB.hh, 0, SB.h, 0, D * 4);
    }
    const doGen = pos >= tokens.length - 1;           // this position predicts the next token
    let rb = null;
    if (doGen) {
      disp(enc, P.rms, [SB.h, Wt["final_norm"].fBuf, SB.hn, f4([D, EPS])], 1);
      quantAct(enc, SB.hn, lmK); if (BITINT) quantActK(enc, SB.hn, lmK);   // Q8_K for the q6ki lm_head dot
      for (const ch of lmChunks) {
        if (ch.kind === "hifi") disp(enc, P.qi, [ch.sBuf, ch.qBuf, aS, aQ, logits, u4([ch.n, lmK, ch.r0])], G(ch.n));
        else if (ch.kind === "q6ki") disp(enc, P.q6ki, [ch.buf, aKd, aKq, logits, u4([ch.n, lmK, ch.r0])], G(ch.n));
        else disp(enc, P[ch.kind], [ch.buf, SB.hn, logits, u4([ch.n, lmK, ch.r0])], G(ch.n));   // f/q8raw/q5raw
      }
      rb = dev.createBuffer({ size: vocab * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
      enc.copyBufferToBuffer(logits, 0, rb, 0, vocab * 4);
    }
    dev.queue.submit([enc.finish()]);                 // one submit per token
    if (doGen) {
      await rb.mapAsync(GPUMapMode.READ); const lg = new Float32Array(rb.getMappedRange().slice(0)); rb.unmap(); rb.destroy();
      let am = 0; for (let i = 1; i < vocab; i++) if (lg[i] > lg[am]) am = i;
      gen.push(am);
      const done = EOS.has(am) || gen.length >= N_NEW;
      window.__run = { ready: done, prompt: PROMPT, tokens, gen, genText: tok.decode(gen), completion: PROMPT + tok.decode(gen), rootKappa: f.rootKappa, nTensors: f.tensors.length, hifi: HIFI, src: f.src, stream: window.__stream || null };
      log(`"${PROMPT}" →${tok.decode(gen)}${done ? "" : "…"}   [κ ${f.rootKappa.slice(0, 24)}…, ${HIFI ? "hifi" : "fast"}]`);
      if (done) break;
      seq.push(am);
    } else {
      await dev.queue.onSubmittedWorkDone();          // serialize so the uniform pool is safe to reuse
    }
    pos++;
  }
}
main().catch((e) => { window.__run = { ready: true, error: String(e), stack: e.stack }; out.textContent = "error: " + e + "\n" + (e.stack || ""); });
