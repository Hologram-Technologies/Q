<!doctype html><meta charset="utf-8"><title>Holo Whisper — GPU-resident decode (W-3 perf)</title>
<body style="font:14px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init…</pre></body>
<script type="module">
// W-3 PERF: same exact forward as whisper-transcribe.html, but the autoregressive decode is GPU-RESIDENT —
// argmax runs on the GPU and writes the next token into an ids buffer that the next step's EMBED reads
// directly, so the ENTIRE decode is recorded into ONE command submit with ONE sync (vs 53 per-token CPU
// round-trips). Same kernels, same math → must reproduce the exact 53-token oracle transcript, far faster.
const out = document.getElementById("out"); const log = (s) => out.textContent += "\n" + s;
window.__txf = { stage: "start" };
async function f32(u) { return new Float32Array(await (await fetch(u)).arrayBuffer()); }
const AUDIO_SEC = 13.06;

const CONV1D = `@group(0)@binding(0)var<storage,read>inp:array<f32>;@group(0)@binding(1)var<storage,read>w:array<f32>;@group(0)@binding(2)var<storage,read_write>outp:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;@group(0)@binding(4)var<uniform>q:vec4<u32>;
fn f16r(x:f32)->f32{return unpack2x16float(pack2x16float(vec2<f32>(x,0.0))).x;}
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let IC=p.x;let OC=p.y;let K=p.z;let OL=p.w;let L=q.x;let stride=q.y;let pad=q.z;if(idx>=OC*OL){return;}
let oc=idx/OL;let ol=idx%OL;var s=0.0;let wb=oc*IC*K;for(var ic=0u;ic<IC;ic++){let ib=ic*L;let wcb=wb+ic*K;for(var k=0u;k<K;k++){let ip=i32(ol*stride)-i32(pad)+i32(k);if(ip<0||ip>=i32(L)){continue;}s=s+f16r(inp[ib+u32(ip)])*w[wcb+k];}}outp[oc*OL+ol]=s;}`;
const GELUBIAS = `@group(0)@binding(0)var<storage,read_write>c:array<f32>;@group(0)@binding(1)var<storage,read>b:array<f32>;@group(0)@binding(2)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let OC=p.x;let OL=p.y;if(idx>=OC*OL){return;}let x=c[idx]+b[idx/OL];c[idx]=0.5*x*(1.0+tanh(0.7978845608028654*(x+0.044715*x*x*x)));}`;
const TPOS = `@group(0)@binding(0)var<storage,read>c2:array<f32>;@group(0)@binding(1)var<storage,read>pos:array<f32>;@group(0)@binding(2)var<storage,read_write>x:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let OL=p.x;let S=p.y;if(idx>=OL*S){return;}let pp=idx/S;let d=idx%S;x[idx]=c2[d*OL+pp]+pos[idx];}`;
const EMBED1 = `@group(0)@binding(0)var<storage,read>ids:array<u32>;@group(0)@binding(1)var<storage,read>te:array<f32>;@group(0)@binding(2)var<storage,read>pe:array<f32>;@group(0)@binding(3)var<storage,read_write>x:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let d=g.x;let pos=p.x;let S=p.y;if(d>=S){return;}let tok=ids[pos];x[d]=te[tok*S+d]+pe[pos*S+d];}`;
const LN = `@group(0)@binding(0)var<storage,read>x:array<f32>;@group(0)@binding(1)var<storage,read>w:array<f32>;@group(0)@binding(2)var<storage,read>b:array<f32>;@group(0)@binding(3)var<storage,read_write>y:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let row=g.x;let n=p.x;let S=p.y;if(row>=n){return;}let base=row*S;var mean=0.0;for(var i=0u;i<S;i++){mean=mean+x[base+i];}mean=mean/f32(S);var v=0.0;for(var i=0u;i<S;i++){let d=x[base+i]-mean;v=v+d*d;}let sc=1.0/sqrt(v/f32(S)+1e-5);for(var i=0u;i<S;i++){y[base+i]=(x[base+i]-mean)*sc*w[i]+b[i];}}`;
const LIN = `@group(0)@binding(0)var<storage,read>X:array<f32>;@group(0)@binding(1)var<storage,read>W:array<f32>;@group(0)@binding(2)var<storage,read>B:array<f32>;@group(0)@binding(3)var<storage,read_write>Y:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let n=p.x;let inD=p.y;let outD=p.z;if(idx>=n*outD){return;}let row=idx/outD;let o=idx%outD;var s=select(0.0,B[o],p.w==1u);let xb=row*inD;let wb=o*inD;for(var i=0u;i<inD;i++){s=s+X[xb+i]*W[wb+i];}Y[idx]=s;}`;
const ATTN = `@group(0)@binding(0)var<storage,read>q:array<f32>;@group(0)@binding(1)var<storage,read>k:array<f32>;@group(0)@binding(2)var<storage,read>v:array<f32>;@group(0)@binding(3)var<storage,read_write>o:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;@group(0)@binding(5)var<uniform>pc:vec4<u32>;@group(0)@binding(6)var<uniform>pf:vec4<f32>;
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;let nQ=p.x;let nK=p.y;let H=p.z;let hd=p.w;let Sd=H*hd;let scale=pf.x;if(idx>=H*nQ){return;}
let h=idx/nQ;let i=idx%nQ;let ho=h*hd;let qb=i*Sd+ho;let lim=select(nK,i+1u,pc.x==1u);
var m=-3.0e38;var l=0.0;var acc:array<f32,64>;for(var d=0u;d<hd;d++){acc[d]=0.0;}
for(var j=0u;j<lim;j++){let kb=j*Sd+ho;var s=0.0;for(var d=0u;d<hd;d++){s=s+q[qb+d]*k[kb+d];}s=s*scale;let mn=max(m,s);let corr=exp(m-mn);let e=exp(s-mn);l=l*corr+e;let vb=j*Sd+ho;for(var d=0u;d<hd;d++){acc[d]=acc[d]*corr+e*v[vb+d];}m=mn;}
let ob=i*Sd+ho;for(var d=0u;d<hd;d++){o[ob+d]=acc[d]/l;}}`;
const GELU = `@group(0)@binding(0)var<storage,read_write>c:array<f32>;@group(0)@binding(1)var<uniform>p:vec4<u32>;@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;if(idx>=p.x){return;}let x=c[idx];c[idx]=0.5*x*(1.0+tanh(0.7978845608028654*(x+0.044715*x*x*x)));}`;
const ADD = `@group(0)@binding(0)var<storage,read_write>x:array<f32>;@group(0)@binding(1)var<storage,read>y:array<f32>;@group(0)@binding(2)var<uniform>p:vec4<u32>;@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){let idx=g.x;if(idx>=p.x){return;}x[idx]=x[idx]+y[idx];}`;
// GPU argmax over text tokens + EOT → writes next token id into ids[outPos] (no CPU readback in the loop)
const ARGMAX = `@group(0)@binding(0)var<storage,read>logits:array<f32>;@group(0)@binding(1)var<storage,read_write>ids:array<u32>;@group(0)@binding(2)var<uniform>p:vec4<u32>;
var<workgroup> bV:array<f32,256>;var<workgroup> bI:array<u32,256>;
@compute @workgroup_size(256)fn main(@builtin(local_invocation_id)l:vec3<u32>){let t=l.x;let VOCAB=p.y;var mv=-3.0e38;var mi=0u;
for(var i=t;i<VOCAB;i=i+256u){if(i>50256u&&i!=50257u){continue;}let s=logits[i];if(s>mv){mv=s;mi=i;}}
bV[t]=mv;bI[t]=mi;workgroupBarrier();
var stride=128u;loop{if(stride==0u){break;}if(t<stride){if(bV[t+stride]>bV[t]){bV[t]=bV[t+stride];bI[t]=bI[t+stride];}}workgroupBarrier();stride=stride/2u;}
if(t==0u){ids[p.x]=bI[0];}}`;

(async () => {
  try {
    if (!navigator.gpu) throw new Error("no WebGPU");
    const stem = await (await fetch("wstem.json")).json();
    const eman = await (await fetch("encoder-weights.json")).json();
    const dman = await (await fetch("decoder-weights.json")).json();
    const gref = await (await fetch("whisper-tx-ref.json")).json();
    const S = eman.S, H = eman.H, hd = S / H, FF = 4 * S, NL = eman.NL, VOCAB = dman.n_vocab, scale = 1 / Math.sqrt(hd);
    const K = 3, L = 3000, OL1 = L, n_enc = ((L - 1) / 2 | 0) + 1, IC0 = stem.n_mels;
    const gold = gref.ids, maxNew = 72, EOT = 50257;
    const prompt = [50258, 50259, 50359, 50363], PN = prompt.length, Ptot = PN + maxNew;
    log(`S=${S} H=${H} NL=${NL} vocab=${VOCAB} n_enc=${n_enc} · golden ${gold.length} tok (${gref.cpuMs}ms CPU=${(gref.cpuMs/1000/AUDIO_SEC).toFixed(1)}× realtime)`);
    window.__txf.stage = "loading";
    const [mel, c1w, c1b, c2w, c2b, pos, ewp, dwp] = await Promise.all([
      f32("whisper-enc-ref.mel.f32"), f32("wstem.conv1_w.f32"), f32("wstem.conv1_b.f32"), f32("wstem.conv2_w.f32"),
      f32("wstem.conv2_b.f32"), f32("wstem.pos.f32"), f32("encoder-weights.f32"), f32("decoder-weights.f32")]);

    const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
    const pipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });
    const P = { conv: pipe(CONV1D), gb: pipe(GELUBIAS), tpos: pipe(TPOS), emb: pipe(EMBED1), ln: pipe(LN), lin: pipe(LIN), attn: pipe(ATTN), gelu: pipe(GELU), add: pipe(ADD), argmax: pipe(ARGMAX) };
    const sb = (k) => dev.createBuffer({ size: Math.max(4, k * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
    const wb = (a) => { const b = dev.createBuffer({ size: Math.max(4, a.byteLength), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
    const u4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
    const f4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Float32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
    const G = (k) => Math.ceil(k / 64);
    const bg = (pl, a) => dev.createBindGroup({ layout: pl.getBindGroupLayout(0), entries: a.map((b, i) => ({ binding: i, resource: { buffer: b } })) });
    const disp = (enc, pl, a, k, wg) => { const pa = enc.beginComputePass(); pa.setPipeline(pl); pa.setBindGroup(0, bg(pl, a)); pa.dispatchWorkgroups(wg || G(k)); pa.end(); };
    const EW = {}; for (const [n, t] of Object.entries(eman.tensors)) EW[n] = wb(ewp.slice(t.off, t.off + t.len));
    const DW = {}; for (const [n, t] of Object.entries(dman.tensors)) DW[n] = wb(dwp.slice(t.off, t.off + t.len));
    const tokEmb = DW["decoder.token_embedding.weight"], posEmb = DW["decoder.positional_embedding"], dummy = wb(new Float32Array([0]));
    const fScale = f4([scale]), causal0 = u4([0]), uNE = u4([n_enc, S]), uNEadd = u4([n_enc * S]), uNEgelu = u4([n_enc * FF]), aEnc = u4([n_enc, n_enc, H, hd]);

    // ── encoder (one submit) ──
    window.__txf.stage = "encoder"; const tEnc0 = performance.now();
    const melB = wb(mel), c1B = sb(S * OL1), c2B = sb(S * n_enc), encX = sb(n_enc * S);
    const an = sb(n_enc * S), q = sb(n_enc * S), k = sb(n_enc * S), v = sb(n_enc * S), at = sb(n_enc * S), ao = sb(n_enc * S), mn = sb(n_enc * S), h1 = sb(n_enc * FF), h2 = sb(n_enc * S);
    const cK = [], cV = []; for (let l = 0; l < NL; l++) { cK[l] = sb(n_enc * S); cV[l] = sb(n_enc * S); }
    let e = dev.createCommandEncoder();
    disp(e, P.conv, [melB, wb(c1w), c1B, u4([IC0, S, K, OL1]), u4([L, 1, 1])], S * OL1);
    disp(e, P.gb, [c1B, wb(c1b), u4([S, OL1])], S * OL1);
    disp(e, P.conv, [c1B, wb(c2w), c2B, u4([S, S, K, n_enc]), u4([L, 2, 1])], S * n_enc);
    disp(e, P.gb, [c2B, wb(c2b), u4([S, n_enc])], S * n_enc);
    disp(e, P.tpos, [c2B, wb(pos), encX, u4([n_enc, S])], n_enc * S);
    for (let il = 0; il < NL; il++) {
      const T = (s) => EW[`encoder.blocks.${il}.` + s];
      disp(e, P.ln, [encX, T("attn_ln.weight"), T("attn_ln.bias"), an, uNE], n_enc);
      disp(e, P.lin, [an, T("attn.query.weight"), T("attn.query.bias"), q, u4([n_enc, S, S, 1])], n_enc * S);
      disp(e, P.lin, [an, T("attn.key.weight"), dummy, k, u4([n_enc, S, S, 0])], n_enc * S);
      disp(e, P.lin, [an, T("attn.value.weight"), T("attn.value.bias"), v, u4([n_enc, S, S, 1])], n_enc * S);
      disp(e, P.attn, [q, k, v, at, aEnc, causal0, fScale], H * n_enc);
      disp(e, P.lin, [at, T("attn.out.weight"), T("attn.out.bias"), ao, u4([n_enc, S, S, 1])], n_enc * S);
      disp(e, P.add, [encX, ao, uNEadd], n_enc * S);
      disp(e, P.ln, [encX, T("mlp_ln.weight"), T("mlp_ln.bias"), mn, uNE], n_enc);
      disp(e, P.lin, [mn, T("mlp.0.weight"), T("mlp.0.bias"), h1, u4([n_enc, S, FF, 1])], n_enc * FF);
      disp(e, P.gelu, [h1, uNEgelu], n_enc * FF);
      disp(e, P.lin, [h1, T("mlp.2.weight"), T("mlp.2.bias"), h2, u4([n_enc, FF, S, 1])], n_enc * S);
      disp(e, P.add, [encX, h2, uNEadd], n_enc * S);
    }
    disp(e, P.ln, [encX, EW["encoder.ln_post.weight"], EW["encoder.ln_post.bias"], an, uNE], n_enc);
    for (let il = 0; il < NL; il++) {
      const p = `decoder.blocks.${il}.`;
      disp(e, P.lin, [an, DW[p + "cross_attn.key.weight"], dummy, cK[il], u4([n_enc, S, S, 0])], n_enc * S);
      disp(e, P.lin, [an, DW[p + "cross_attn.value.weight"], DW[p + "cross_attn.value.bias"], cV[il], u4([n_enc, S, S, 1])], n_enc * S);
    }
    dev.queue.submit([e.finish()]);
    await dev.queue.onSubmittedWorkDone();
    const encMs = Math.round(performance.now() - tEnc0);
    log(`encoder + cross-K/V: ${encMs}ms`);

    // ── GPU-resident decode: ONE submit, on-GPU argmax feeds the next embed ──
    window.__txf.stage = "decode";
    const idsB = dev.createBuffer({ size: (Ptot + 1) * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
    dev.queue.writeBuffer(idsB, 0, new Uint32Array(prompt));   // prefill prompt; ids[PN..] filled by argmax
    const Kc = [], Vc = []; for (let l = 0; l < NL; l++) { Kc[l] = sb(Ptot * S); Vc[l] = sb(Ptot * S); }
    const dx = sb(S), dan = sb(S), dq = sb(S), dk = sb(S), dv = sb(S), dsa = sb(S), dso = sb(S);
    const dcn = sb(S), dcq = sb(S), dcr = sb(S), dco = sb(S), dmn = sb(S), dh1 = sb(FF), dh2 = sb(S), fnLast = sb(S), logitsB = sb(VOCAB);
    const u1S = u4([1, S]), uS = u4([S]), uFF = u4([FF]), aCross = u4([1, n_enc, H, hd]), L0 = u4([1, S, S, 0]), L1 = u4([1, S, S, 1]), Lmlp0 = u4([1, S, FF, 1]), Lmlp2 = u4([1, FF, S, 1]), Lhead = u4([1, S, VOCAB, 0]);
    const embP = [], aSelf = [], argP = [];   // per-position uniforms (distinct buffers — one submit sees each value)
    for (let p = 0; p < Ptot; p++) { embP[p] = u4([p, S]); aSelf[p] = u4([1, p + 1, H, hd]); argP[p] = u4([p + 1, VOCAB]); }

    const tDec0 = performance.now();
    const ec = dev.createCommandEncoder();
    for (let p = 0; p < Ptot; p++) {
      disp(ec, P.emb, [idsB, tokEmb, posEmb, dx, embP[p]], S);
      for (let il = 0; il < NL; il++) {
        const T = (s) => DW[`decoder.blocks.${il}.` + s];
        disp(ec, P.ln, [dx, T("attn_ln.weight"), T("attn_ln.bias"), dan, u1S], 1);
        disp(ec, P.lin, [dan, T("attn.query.weight"), T("attn.query.bias"), dq, L1], S);
        disp(ec, P.lin, [dan, T("attn.key.weight"), dummy, dk, L0], S);
        disp(ec, P.lin, [dan, T("attn.value.weight"), T("attn.value.bias"), dv, L1], S);
        ec.copyBufferToBuffer(dk, 0, Kc[il], p * S * 4, S * 4);
        ec.copyBufferToBuffer(dv, 0, Vc[il], p * S * 4, S * 4);
        disp(ec, P.attn, [dq, Kc[il], Vc[il], dsa, aSelf[p], causal0, fScale], 0, H);
        disp(ec, P.lin, [dsa, T("attn.out.weight"), T("attn.out.bias"), dso, L1], S);
        disp(ec, P.add, [dx, dso, uS], S);
        disp(ec, P.ln, [dx, T("cross_attn_ln.weight"), T("cross_attn_ln.bias"), dcn, u1S], 1);
        disp(ec, P.lin, [dcn, T("cross_attn.query.weight"), T("cross_attn.query.bias"), dcq, L1], S);
        disp(ec, P.attn, [dcq, cK[il], cV[il], dcr, aCross, causal0, fScale], 0, H);
        disp(ec, P.lin, [dcr, T("cross_attn.out.weight"), T("cross_attn.out.bias"), dco, L1], S);
        disp(ec, P.add, [dx, dco, uS], S);
        disp(ec, P.ln, [dx, T("mlp_ln.weight"), T("mlp_ln.bias"), dmn, u1S], 1);
        disp(ec, P.lin, [dmn, T("mlp.0.weight"), T("mlp.0.bias"), dh1, Lmlp0], FF);
        disp(ec, P.gelu, [dh1, uFF], FF);
        disp(ec, P.lin, [dh1, T("mlp.2.weight"), T("mlp.2.bias"), dh2, Lmlp2], S);
        disp(ec, P.add, [dx, dh2, uS], S);
      }
      if (p >= PN - 1) {
        disp(ec, P.ln, [dx, DW["decoder.ln.weight"], DW["decoder.ln.bias"], fnLast, u1S], 1);
        disp(ec, P.lin, [fnLast, tokEmb, dummy, logitsB, Lhead], VOCAB);
        disp(ec, P.argmax, [logitsB, idsB, argP[p]], 0, 1);   // writes ids[p+1] on the GPU
      }
    }
    const rb = dev.createBuffer({ size: (Ptot + 1) * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
    ec.copyBufferToBuffer(idsB, 0, rb, 0, (Ptot + 1) * 4);
    dev.queue.submit([ec.finish()]);
    await rb.mapAsync(GPUMapMode.READ);
    const allIds = [...new Uint32Array(rb.getMappedRange().slice(0))]; rb.unmap();
    const decMs = Math.round(performance.now() - tDec0);

    const gen = []; for (let i = PN; i < allIds.length; i++) { if (allIds[i] === EOT) break; gen.push(allIds[i]); }
    let pre = 0; while (pre < gen.length && pre < gold.length && gen[pre] === gold[pre]) pre++;
    const exact = gen.length === gold.length && pre === gold.length;
    const totalMs = encMs + decMs, rtf = (totalMs / 1000) / AUDIO_SEC;
    const pass = exact && rtf < 1;
    window.__txf = { stage: "done", genLen: gen.length, goldLen: gold.length, prefixMatch: pre, exact, encMs, decMs, perTokMs: +(decMs / gen.length).toFixed(1), totalMs, audioSec: AUDIO_SEC, rtf: +rtf.toFixed(3), speedupVsCpu: +(gref.cpuMs / totalMs).toFixed(1), prevDecMs: 9209, decSpeedup: +(9209 / decMs).toFixed(1), genHead: gen.slice(0, 8), pass };
    log(`\nGPU-resident decode: ${gen.length} tok · ${decMs}ms (${(decMs / gen.length).toFixed(1)}ms/tok) · was 9209ms (${(9209 / decMs).toFixed(1)}× faster decode)`);
    log(`encoder ${encMs}ms + decode ${decMs}ms = TOTAL ${totalMs}ms`);
    log(`ids exact match: ${exact ? "✓ 53/53" : `✗ (prefix ${pre}/${gold.length})`}`);
    log(`RTF ${rtf.toFixed(3)} (${totalMs}ms / ${AUDIO_SEC}s) · ${(gref.cpuMs / totalMs).toFixed(0)}× faster than CPU → ${pass ? "✓ PASS" : "✗ FAIL"}`);
  } catch (err) { window.__txf = { stage: "error", error: String(err) }; log("ERROR: " + err + "\n" + (err.stack || "")); }
})();
</script>
