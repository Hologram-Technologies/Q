<!doctype html>
<meta charset="utf-8">
<title>K-quant GPU matvec — Q4_K / Q5_K / Q6_K raw kernels vs CPU oracle</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0b0d; color: #e6e8ea; font: 13px/1.6 ui-monospace, Menlo, monospace; padding: 24px 28px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  #v { border: 1px solid #1c2128; border-radius: 10px; padding: 14px 16px; background: #101318; white-space: pre-wrap; }
  #v.ok { border-color: #1f6f43; background: #0d1712; } #v.bad { border-color: #6f2f2f; background: #170d0d; }
  .big { font-size: 18px; font-weight: 700; }
</style>
<h1>K-quant GPU matvec — raw κ-block in-shader dequant-dot vs CPU dequant oracle (real qwen35 tensors)</h1>
<div id="v">running…</div>
<script type="module">
import { createGpuRuntime } from "./holo-gguf-gpu.mjs";
const $v = document.getElementById("v");
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) || 1); };
const relMax = (a, b) => { let m = 0, s = 0; for (let i = 0; i < b.length; i++) s = Math.max(s, Math.abs(b[i])); for (let i = 0; i < a.length; i++) m = Math.max(m, Math.abs(a[i] - b[i])); return m / (s || 1); };

async function run() {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const { P, disp, u4, sbuf, wF, rawU32, resetUniforms } = createGpuRuntime(dev);
  const readback = async (buf, n) => {
    const stg = dev.createBuffer({ size: n * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
    const enc = dev.createCommandEncoder(); enc.copyBufferToBuffer(buf, 0, stg, 0, n * 4); dev.queue.submit([enc.finish()]);
    await stg.mapAsync(GPUMapMode.READ); const out = Float32Array.from(new Float32Array(stg.getMappedRange().slice(0))); stg.unmap(); stg.destroy(); return out;
  };
  const PIPE = { 12: P.q4kraw, 13: P.q5kraw, 14: P.q6kraw }, NAME = { 12: "Q4_K", 13: "Q5_K", 14: "Q6_K" };

  const results = [];
  for (const tag of ["q4k", "q5k", "q6k"]) {
    const meta = await (await fetch(`./_qtest/${tag}.json?cb=` + Date.now())).json();
    const bin = new Uint8Array(await (await fetch(`./_qtest/${tag}.bin?cb=` + Date.now())).arrayBuffer());
    resetUniforms();
    const rb = rawU32(bin), act = wF(Float32Array.from(meta.act)), out = sbuf(meta.N);
    const enc = dev.createCommandEncoder();
    disp(enc, PIPE[meta.ggmlType], [rb, act, out, u4([meta.N, meta.K, 0, 0])], Math.ceil(meta.N / 64));
    dev.queue.submit([enc.finish()]);
    const gpu = await readback(out, meta.N);
    results.push({ tag, name: NAME[meta.ggmlType], N: meta.N, K: meta.K, cos: cos(gpu, meta.y), relMax: relMax(gpu, meta.y) });
  }
  const ok = results.every(r => r.cos > 0.99999 && r.relMax < 1e-4);
  window.__kquant = { ok, results };
  $v.className = ok ? "ok" : "bad";
  $v.innerHTML = `<span class="big">${ok ? "K-quant GPU matvec MATCHES the CPU oracle ✓" : "MISMATCH ✗"}</span>\n\n` +
    results.map(r => `${r.name}  [N=${r.N} K=${r.K}] : cosine ${r.cos.toFixed(8)} · relMax ${r.relMax.toExponential(2)}`).join("\n") +
    `\n\nReal qwen3.5-9B tensors, raw κ-block bytes dequant-dotted in-shader (no f32 expansion on host).\nThese are the matvec kernels the GLM/DeepSeek MLA+MoE linears dispatch into — confirmed reusable.`;
}
run().catch(e => { $v.className = "bad"; $v.textContent = "ERROR: " + (e.stack || e.message); window.__kquant = { ok: false, err: String(e.message) }; });
</script>
