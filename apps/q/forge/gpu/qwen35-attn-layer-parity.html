<!doctype html><meta charset=utf8><title>qwen35 GPU attention layer parity</title>
<style>body{font:14px monospace;background:#111;color:#ddd;padding:20px}.ok{color:#5f5}.fail{color:#f55}</style>
<h3>qwen35 GPU attention layer (gated GQA + QK-norm + partial RoPE) — vs CPU oracle</h3>
<pre id=out>running… (needs a WebGPU browser)</pre>
<script type=module>
import { qwen35Attention } from "../gguf-forge-qwen35-attn.mjs";
import { matvecFGPU, headNormRopeGPU, causalGQAGPU } from "./holo-qwen35-kernels.mjs";
const out = document.getElementById("out");
const log = (s, cls) => { out.innerHTML += `\n${cls ? `<span class=${cls}>${s}</span>` : s}`; };
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) + 1e-30); };
const sig = x => 1 / (1 + Math.exp(-x));
let s = 5; const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff * 2 - 1; };
const arr = (n, sc = 1) => { const a = new Float32Array(n); for (let i = 0; i < n; i++) a[i] = rnd() * sc; return a; };
try {
  if (!navigator.gpu) throw new Error("no navigator.gpu");
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const D = { d_model: 8, n_head: 4, n_kv: 2, head_dim: 4, eps: 1e-6, rope_dim: 2 };
  const W = { attn_norm: arr(D.d_model), attn_q: arr(D.n_head * D.head_dim * 2 * D.d_model, 0.3), attn_k: arr(D.n_kv * D.head_dim * D.d_model, 0.3), attn_v: arr(D.n_kv * D.head_dim * D.d_model, 0.3), attn_output: arr(D.d_model * D.n_head * D.head_dim, 0.3), attn_q_norm: arr(D.head_dim).map(x => 0.1 * x), attn_k_norm: arr(D.head_dim).map(x => 0.1 * x) };
  const T = 4, xs = Array.from({ length: T }, () => arr(D.d_model));
  const cosS = Array.from({ length: T }, (_, t) => Float32Array.from([Math.cos(t), Math.cos(t)])), sinS = Array.from({ length: T }, (_, t) => Float32Array.from([Math.sin(t), Math.sin(t)]));
  const cpu = qwen35Attention(W, D, xs, cosS, sinS, { inputNormed: true }).ySeq;
  const hd = D.head_dim, nh = D.n_head, nkv = D.n_kv;
  const Q = new Float32Array(T * nh * hd), Kf = new Float32Array(T * nkv * hd), Vf = new Float32Array(T * nkv * hd), Gt = [];
  for (let t = 0; t < T; t++) {
    const qg = await matvecFGPU(dev, W.attn_q, xs[t], nh * hd * 2, D.d_model);
    const qraw = new Float32Array(nh * hd), g = new Float32Array(nh * hd);
    for (let h = 0; h < nh; h++) for (let i = 0; i < hd; i++) { qraw[h * hd + i] = qg[h * 2 * hd + i]; g[h * hd + i] = qg[h * 2 * hd + hd + i]; }
    Q.set(await headNormRopeGPU(dev, qraw, W.attn_q_norm, cosS[t], sinS[t], nh, hd, D.rope_dim, D.eps), t * nh * hd);
    Kf.set(await headNormRopeGPU(dev, await matvecFGPU(dev, W.attn_k, xs[t], nkv * hd, D.d_model), W.attn_k_norm, cosS[t], sinS[t], nkv, hd, D.rope_dim, D.eps), t * nkv * hd);
    Vf.set(await matvecFGPU(dev, W.attn_v, xs[t], nkv * hd, D.d_model), t * nkv * hd); Gt.push(g);
  }
  const ctx = await causalGQAGPU(dev, Q, Kf, Vf, T, nh, hd, nkv, 1 / Math.sqrt(hd));
  let minCos = 1;
  for (let t = 0; t < T; t++) { const c = ctx.slice(t * nh * hd, (t + 1) * nh * hd); for (let i = 0; i < c.length; i++) c[i] *= sig(Gt[t][i]); const o = await matvecFGPU(dev, W.attn_output, c, D.d_model, nh * hd); const cc = cos(cpu[t], o); minCos = Math.min(minCos, cc); log(`  t=${t}  cos=${cc.toFixed(6)}`); }
  log(minCos > 0.9995 ? "\nGPU ATTENTION LAYER PARITY ✓" : "\nPARITY ✗", minCos > 0.9995 ? "ok" : "fail");
} catch (e) { log("ERROR: " + e.message + "\n" + e.stack, "fail"); }
</script>
