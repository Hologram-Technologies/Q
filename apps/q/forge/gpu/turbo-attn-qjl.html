<!doctype html><meta charset=utf-8><title>TurboQuant TBQ + QJL attention GPU witness</title>
<body><pre id=log>loading…</pre><script type=module>
// Full GPU attention pass with a TBQ4_0 K cache AND the QJL stage-2 score correction — the
// two witnessed pieces (decode-then-attend + QJL kernel) composed. Per head: projRq =
// qjl_project(forward_rotate(q_head)); per cached pos: score = (<q,decoded_K> + d_r·√(π/2)/d·
// Σ sign(qjl_j)·projRq_j) · attn_scale. Witnessed vs the CPU executor with TBQ K + QJL live.
const log = (m) => document.getElementById("log").textContent = m;
let dev; const pipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });
const MATVEC = `@group(0)@binding(0)var<storage,read>W:array<f32>;@group(0)@binding(1)var<storage,read>x:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let n=g.x;let N=p.x;let K=p.y;if(n>=N){return;}var acc=0.0;let b=n*K;for(var k=0u;k<K;k++){acc=acc+W[b+k]*x[k];}y[n]=acc;}`;
const ADD = `@group(0)@binding(0)var<storage,read>a:array<f32>;@group(0)@binding(1)var<storage,read>b:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let i=g.x;if(i>=p.x){return;}y[i]=a[i]+b[i];}`;
const RMS = `@group(0)@binding(0)var<storage,read>x:array<f32>;@group(0)@binding(1)var<storage,read>w:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<f32>;
@compute @workgroup_size(1) fn main(){let N=u32(p.x);var ss=0.0;for(var i=0u;i<N;i++){ss=ss+x[i]*x[i];}let sc=1.0/sqrt(ss/p.x+p.y);for(var i=0u;i<N;i++){y[i]=x[i]*sc*w[i];}}`;
const ROPE = `@group(0)@binding(0)var<storage,read>x:array<f32>;@group(0)@binding(1)var<storage,read_write>y:array<f32>;@group(0)@binding(2)var<uniform>a:vec4<f32>;@group(0)@binding(3)var<uniform>b:vec4<f32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let hd=u32(a.x);let nheads=u32(a.z);let pos=a.w;let fb=b.x;let half=u32(a.y)/2u;let idx=g.x;if(idx>=nheads*half){return;}let head=idx/half;let ic=idx%half;let base=head*hd;let ts=pow(fb,-2.0/a.y);let theta=pos*pow(ts,f32(ic));let c=cos(theta);let s=sin(theta);let x0=x[base+ic];let x1=x[base+ic+half];y[base+ic]=x0*c-x1*s;y[base+ic+half]=x0*s+x1*c;}`;
const SWIGLU = `@group(0)@binding(0)var<storage,read>gt:array<f32>;@group(0)@binding(1)var<storage,read>up:array<f32>;@group(0)@binding(2)var<storage,read_write>y:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let i=g.x;if(i>=p.x){return;}let v=gt[i];y[i]=(v/(1.0+exp(-v)))*up[i];}`;
// attention WITH per-(head,pos) QJL correction added to the raw dot before scale
const ATTNQ = `@group(0)@binding(0)var<storage,read>q:array<f32>;@group(0)@binding(1)var<storage,read>kc:array<f32>;@group(0)@binding(2)var<storage,read>vc:array<f32>;@group(0)@binding(3)var<storage,read_write>ctx:array<f32>;@group(0)@binding(4)var<storage,read>corr:array<f32>;@group(0)@binding(5)var<uniform>a:vec4<u32>;@group(0)@binding(6)var<uniform>b:vec4<f32>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){let nh=a.x;let hd=a.y;let curPos=a.z;let kv=a.w;let scale=b.x;let grp=u32(b.y);let T=u32(b.z);let hh=g.x;if(hh>=nh){return;}let kvh=hh/grp;let qoff=hh*hd;let koff=kvh*hd;var sc:array<f32,64>;var mx=-3.0e38;for(var s=0u;s<=curPos;s++){var d=0.0;for(var i=0u;i<hd;i++){d=d+q[qoff+i]*kc[s*kv+koff+i];}sc[s]=(d+corr[hh*T+s])*scale;if(sc[s]>mx){mx=sc[s];}}var sum=0.0;for(var s=0u;s<=curPos;s++){sc[s]=exp(sc[s]-mx);sum=sum+sc[s];}for(var i=0u;i<hd;i++){var acc=0.0;for(var s=0u;s<=curPos;s++){acc=acc+(sc[s]/sum)*vc[s*kv+koff+i];}ctx[qoff+i]=acc;}}`;
// decode TBQ/PQ4_0 K block (dequant + inverse Hadamard) → resident f32
const DECODE = (d, total) => `
const CB=array<f32,16>(-0.23762692286887249,-0.18079342531272283,-0.14176134070424901,-0.11024676790280842,-0.08279230816984559,-0.05774433563409530,-0.03413390187425037,-0.01129645493594766,0.01129645493594766,0.03413390187425037,0.05774433563409530,0.08279230816984559,0.11024676790280842,0.14176134070424901,0.18079342531272283,0.23762692286887249);
const D:u32=${d}u; const STRIDE:u32=${total}u; const INV:f32=${1 / Math.sqrt(d)};
@group(0)@binding(0)var<storage,read>blk:array<u32>;@group(0)@binding(1)var<storage,read>signs:array<f32>;@group(0)@binding(2)var<storage,read_write>outp:array<f32>;
var<workgroup> sh:array<f32,${d}>;
fn gb(b:u32)->u32{let w=blk[b>>2u];return (w>>((b&3u)*8u))&0xffu;}
@compute @workgroup_size(${d}) fn main(@builtin(workgroup_id) wid:vec3<u32>,@builtin(local_invocation_id) lid:vec3<u32>){
  let o=lid.x; let base=wid.x*STRIDE;
  let d16=gb(base+(D>>1u))|(gb(base+(D>>1u)+1u)<<8u); let nrm=unpack2x16float(d16).x;
  let byte=gb(base+(o>>1u)); let idx=select(byte>>4u,byte&0xfu,(o&1u)==0u); sh[o]=CB[idx]*nrm;
  workgroupBarrier();
  var len:u32=1u; loop{ if(len>=D){break;} if((o&len)==0u){let a=sh[o];let b=sh[o+len];sh[o]=a+b;sh[o+len]=a-b;} workgroupBarrier(); len=len<<1u; }
  outp[wid.x*D+o]=sh[o]*signs[o]*INV;
}`;
// projRq[hh] = qjl_project(forward_rotate(q_head)); one workgroup per head, two FHTs
const PROJRQ = (d) => `
const D:u32=${d}u; const INV:f32=${Math.fround(1 / Math.fround(Math.sqrt(d)))};
@group(0)@binding(0)var<storage,read>q:array<f32>;@group(0)@binding(1)var<storage,read>s1:array<f32>;@group(0)@binding(2)var<storage,read>sq:array<f32>;@group(0)@binding(3)var<storage,read_write>outp:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
var<workgroup> sh:array<f32,${d}>;
fn fht(o:u32){ var len:u32=1u; loop{ if(len>=D){break;} if((o&len)==0u){let a=sh[o];let b=sh[o+len];sh[o]=a+b;sh[o+len]=a-b;} workgroupBarrier(); len=len<<1u; } }
@compute @workgroup_size(${d}) fn main(@builtin(workgroup_id) wid:vec3<u32>,@builtin(local_invocation_id) lid:vec3<u32>){
  let hh=wid.x; let hd=p.x; let o=lid.x;
  sh[o]=q[hh*hd+o]*s1[o]; workgroupBarrier(); fht(o); sh[o]=sh[o]*INV; workgroupBarrier();   // R·q
  sh[o]=sh[o]*sq[o]; workgroupBarrier(); fht(o);                                              // qjl project
  outp[hh*D+o]=sh[o];
}`;
// corr[hh*T+tp] = d_r[tp]·qjlScale·Σ_j sign(qjl_j)·projRq[hh][j]
const CORR = (d, total, idx, qjlBytes, T, qjlScale) => `
const D:u32=${d}u; const STRIDE:u32=${total}u; const QOFF:u32=${idx + 2}u; const DROFF:u32=${idx + 2 + qjlBytes}u; const T:u32=${T}u; const QSCALE:f32=${qjlScale};
@group(0)@binding(0)var<storage,read>proj:array<f32>;@group(0)@binding(1)var<storage,read>blk:array<u32>;@group(0)@binding(2)var<storage,read_write>corr:array<f32>;@group(0)@binding(3)var<uniform>p:vec4<u32>;
fn gb(b:u32)->u32{let w=blk[b>>2u];return (w>>((b&3u)*8u))&0xffu;}
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) g:vec3<u32>){
  let id=g.x; let NH=p.x; if(id>=NH*T){return;} let hh=id/T; let tp=id%T;
  let base=tp*STRIDE; let d16=gb(base+DROFF)|(gb(base+DROFF+1u)<<8u); let d_r=unpack2x16float(d16).x;
  if(d_r<1e-15){corr[hh*T+tp]=0.0;return;}
  var sum=0.0; for(var j=0u;j<D;j++){ let bit=(gb(base+QOFF+(j>>3u))>>(j&7u))&1u; let sgn=select(-1.0,1.0,bit==1u); sum=sum+sgn*proj[hh*D+j]; }
  corr[hh*T+tp]=d_r*QSCALE*sum;
}`;
const ub = (v) => { const b = dev.createBuffer({ size: 16, usage: 72 }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
const fb = (v) => { const b = dev.createBuffer({ size: 16, usage: 72 }); dev.queue.writeBuffer(b, 0, new Float32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
const st = (n) => dev.createBuffer({ size: Math.max(4, n * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
const sb = (u8) => { const pad = new Uint8Array(Math.ceil(u8.length / 4) * 4); pad.set(u8); const b = dev.createBuffer({ size: pad.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array(pad.buffer)); return b; };
const f32sb = (a) => { const b = dev.createBuffer({ size: a.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
function disp(enc, P, bufs, groups) { const bg = dev.createBindGroup({ layout: P.getBindGroupLayout(0), entries: bufs.map((b, i) => ({ binding: i, resource: { buffer: b } })) }); const p = enc.beginComputePass(); p.setPipeline(P); p.setBindGroup(0, bg); p.dispatchWorkgroups(groups); p.end(); }
(async () => {
  dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const J = await (await fetch("./_turboattnqjl.json")).json();
  const bin = new Float32Array(await (await fetch("./_turboattnqjl.bin")).arrayBuffer());
  const { D, NH, NHKV, HD, FF, V, QD, KVDIM, EPS, FREQ, BD, BTOTAL, idx, qjlBytes, scale, grp, T, qjlScale } = J.cfg, { tokens, layout, signs, qjlSigns, Kblocks, Vf32, expected } = J;
  const P = { mv: pipe(MATVEC), add: pipe(ADD), rms: pipe(RMS), rope: pipe(ROPE), sw: pipe(SWIGLU), attnq: pipe(ATTNQ), dec: pipe(DECODE(BD, BTOTAL)), proj: pipe(PROJRQ(BD)), corr: pipe(CORR(BD, BTOTAL, idx, qjlBytes, T, qjlScale)) };
  const w = {}; for (const n in layout) { w[n] = f32sb(bin.subarray(layout[n].off, layout[n].off + layout[n].len).slice()); }
  const L = (n) => w[`blk.0.${n}`];
  // K cache: decode TBQ blocks → Kc ; V cache: f32 vectors directly
  const flat = (arrs, stride) => { const o = new Uint8Array(arrs.length * stride); arrs.forEach((a, i) => o.set(a, i * stride)); return o; };
  const Kbuf = sb(flat(Kblocks, BTOTAL)), sgn = f32sb(new Float32Array(signs)), sqj = f32sb(new Float32Array(qjlSigns));
  const Kc = st(T * KVDIM), Vc = f32sb(Float32Array.from(Vf32.flat()));
  { const e = dev.createCommandEncoder(); disp(e, P.dec, [Kbuf, sgn, Kc], T); dev.queue.submit([e.finish()]); }
  // last-position forward
  const B = { h: st(D), xn: st(D), q: st(QD), qr: st(QD), proj: st(NH * BD), corr: st(NH * T), ctx: st(QD), ao: st(D), h1: st(D), xn2: st(D), g: st(FF), u: st(FF), sw: st(FF), fo: st(D), h2: st(D), xf: st(D), logits: st(V) };
  const te = layout["token_embd.weight"].off, last = T - 1, G = (n) => Math.ceil(n / 64);
  dev.queue.writeBuffer(B.h, 0, bin.subarray(te + tokens[last] * D, te + tokens[last] * D + D).slice());
  const e = dev.createCommandEncoder();
  disp(e, P.rms, [B.h, L("attn_norm.weight"), B.xn, fb([D, EPS])], 1);
  disp(e, P.mv, [L("attn_q.weight"), B.xn, B.q, ub([QD, D])], G(QD));
  disp(e, P.rope, [B.q, B.qr, fb([HD, HD, NH, last]), fb([FREQ])], G(NH * HD / 2));
  // QJL: per-head projRq, then per-(head,pos) correction
  disp(e, P.proj, [B.qr, sgn, sqj, B.proj, ub([HD])], NH);
  disp(e, P.corr, [B.proj, Kbuf, B.corr, ub([NH])], G(NH * T));
  disp(e, P.attnq, [B.qr, Kc, Vc, B.ctx, B.corr, ub([NH, HD, last, KVDIM]), fb([scale, grp, T])], G(NH));
  disp(e, P.mv, [L("attn_output.weight"), B.ctx, B.ao, ub([D, QD])], G(D));
  disp(e, P.add, [B.h, B.ao, B.h1, ub([D])], G(D));
  disp(e, P.rms, [B.h1, L("ffn_norm.weight"), B.xn2, fb([D, EPS])], 1);
  disp(e, P.mv, [L("ffn_gate.weight"), B.xn2, B.g, ub([FF, D])], G(FF));
  disp(e, P.mv, [L("ffn_up.weight"), B.xn2, B.u, ub([FF, D])], G(FF));
  disp(e, P.sw, [B.g, B.u, B.sw, ub([FF])], G(FF));
  disp(e, P.mv, [L("ffn_down.weight"), B.sw, B.fo, ub([D, FF])], G(D));
  disp(e, P.add, [B.h1, B.fo, B.h2, ub([D])], G(D));
  disp(e, P.rms, [B.h2, w["output_norm.weight"], B.xf, fb([D, EPS])], 1);
  disp(e, P.mv, [w["token_embd.weight"], B.xf, B.logits, ub([V, D])], G(V));
  const rb = dev.createBuffer({ size: V * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  e.copyBufferToBuffer(B.logits, 0, rb, 0, V * 4); dev.queue.submit([e.finish()]);
  await rb.mapAsync(GPUMapMode.READ); const got = Array.from(new Float32Array(rb.getMappedRange().slice(0)));
  let dot = 0, na = 0, nb = 0, maxAbs = 0; for (let i = 0; i < V; i++) { dot += got[i] * expected[i]; na += got[i] * got[i]; nb += expected[i] * expected[i]; maxAbs = Math.max(maxAbs, Math.abs(got[i] - expected[i])); }
  const cosine = dot / (Math.sqrt(na * nb) || 1), am = (a) => a.indexOf(Math.max(...a)), ok = cosine > 0.999999 && am(got) === am(expected);
  window.__turboattnqjl = { ok, cosine: +cosine.toFixed(8), maxAbs: +maxAbs.toExponential(2), argmaxGot: am(got), argmaxExp: am(expected) };
  log(`TBQ+QJL attention GPU: ${ok ? "PASS" : "FAIL"}  cosine=${cosine.toFixed(8)} argmax ${am(got)}==${am(expected)} maxAbs=${maxAbs.toExponential(2)}`);
})().catch((e) => { window.__turboattnqjl = { ok: false, err: String(e) }; log("ERR " + e + "\n" + (e.stack || "")); });
</script>
