<!doctype html><meta charset=utf-8><title>TurboQuant KV codec — runtime round-trip witness</title>
<body><pre id=out>loading…</pre><script type=module>
// Proves the encode+decode kernels (now in the shared runtime module) reproduce the CPU KV codec:
//   • GPU nibbles BIT-EXACT vs CPU tqEncodeKV (the quantization is deterministic)
//   • GPU decode ≈ CPU decode ≈ original vector (cosine ~1; the round-trip is lossy by design, 4 bpw)
//   • reports the per-block byte saving (34 B PQ4_0_64 vs 256 B f32 = 7.5×) — the KV-memory win
import { TQENC, TQDEC } from "./holo-gguf-gpu.mjs?v=5";
import { tqTables, tqEncodeKV, tqDecodeKV, TQ_TYPES } from "../gguf-forge-turboquant.mjs";
const out = document.getElementById("out"); const log = (m) => out.textContent = m;
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na * nb) || 1); };
(async () => {
  const TYPE = 49;                                        // PQ4_0_64 (d=64 head-dim, no QJL)
  const T = TQ_TYPES[TYPE], { d, total, codebook, boundaries, signs } = tqTables(TYPE), U = Math.ceil(total / 4);
  const NB = 8, x = new Float32Array(NB * d);             // NB head-vectors of synthetic K
  let s = 12345; const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
  for (let i = 0; i < x.length; i++) x[i] = (rnd() - 0.5) * 2.0;
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const pipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });
  const f32sb = (a) => { const b = dev.createBuffer({ size: a.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
  const st = (n) => dev.createBuffer({ size: Math.max(4, n * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
  const u4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
  const disp = (e, P, bufs, g) => { const bg = dev.createBindGroup({ layout: P.getBindGroupLayout(0), entries: bufs.map((b, i) => ({ binding: i, resource: { buffer: b } })) }); const p = e.beginComputePass(); p.setPipeline(P); p.setBindGroup(0, bg); p.dispatchWorkgroups(g); p.end(); };
  const Penc = pipe(TQENC(d, U)), Pdec = pipe(TQDEC(d, U, codebook));
  const xBuf = f32sb(x), sgBuf = f32sb(new Float32Array(signs)), Bbuf = f32sb(new Float32Array(boundaries));
  const kcq = st(NB * U), dec = st(NB * d);
  const e = dev.createCommandEncoder();
  disp(e, Penc, [xBuf, sgBuf, kcq, Bbuf, u4([0])], NB);    // encode NB blocks
  disp(e, Pdec, [kcq, sgBuf, dec], NB);                    // decode NB blocks
  const rk = dev.createBuffer({ size: NB * U * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ }), rd = dev.createBuffer({ size: NB * d * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  e.copyBufferToBuffer(kcq, 0, rk, 0, NB * U * 4); e.copyBufferToBuffer(dec, 0, rd, 0, NB * d * 4); dev.queue.submit([e.finish()]);
  await rk.mapAsync(GPUMapMode.READ); const gpuBlocks = new Uint8Array(rk.getMappedRange().slice(0));
  await rd.mapAsync(GPUMapMode.READ); const gpuDec = new Float32Array(rd.getMappedRange().slice(0));
  // CPU reference
  const cpuEnc = tqEncodeKV(TYPE, x), cpuDec = tqDecodeKV(TYPE, cpuEnc, NB * d);
  // nibble bit-exactness (first `idx` bytes of each block; gpu padded to U*4, cpu packed to total)
  let nibBad = 0; for (let b = 0; b < NB; b++) for (let i = 0; i < T.idx; i++) if (gpuBlocks[b * U * 4 + i] !== cpuEnc[b * total + i]) nibBad++;
  const cGpuOrig = cos(gpuDec, x), cGpuCpu = cos(gpuDec, cpuDec), cCpuOrig = cos(cpuDec, x);
  const ok = nibBad === 0 && cGpuCpu > 0.99999;
  window.__tqkv = { ok, nibBad, cosGpuVsCpu: +cGpuCpu.toFixed(6), cosGpuVsOrig: +cGpuOrig.toFixed(4), cosCpuVsOrig: +cCpuOrig.toFixed(4), bytesPerBlock: total, f32Bytes: d * 4, ratio: +(d * 4 / total).toFixed(1) };
  log(`TQ KV codec runtime: ${ok ? "PASS" : "FAIL"} — nibbles ${nibBad === 0 ? "BIT-EXACT" : nibBad + " bad"}; GPU↔CPU cos ${cGpuCpu.toFixed(6)}; round-trip cos vs orig ${cGpuOrig.toFixed(4)}; ${total}B vs ${d * 4}B f32 = ${(d * 4 / total).toFixed(1)}× smaller`);
})().catch((e) => { window.__tqkv = { ok: false, err: String(e) }; out.textContent = "ERR " + e + "\n" + (e.stack || ""); });
</script>
