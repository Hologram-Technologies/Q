<!doctype html><meta charset=utf-8><title>LoRA backward GPU witness (A5)</title>
<body><pre id=out>loading…</pre><script type=module>
// A5 real-WebGPU proof: the BACKWARD kernels (OUTER·MATVECT·ADAMW) run on actual silicon and match the proven
// CPU autograd (gguf-forge-lora-train.mjs), and a GPU-driven training loop LEARNS. Node gradient-checks the math
// (tools/train-backward-witness.mjs); this confirms the same WGSL on the GPU. window.__bwd holds the verdict.
import { createBackwardRuntime, loraBackwardGPU, adamwStepGPU } from "./holo-gguf-gpu-backward.mjs?v=1";
import { loraForward, loraBackward, adamwStep, maskedCrossEntropy } from "../gguf-forge-lora-train.mjs";
const out = document.getElementById("out"); const log = (m) => out.textContent = m;
const rel = (a, b) => { let me = 0, mx = 1e-12; for (let i = 0; i < a.length; i++) { me = Math.max(me, Math.abs(a[i] - b[i])); mx = Math.max(mx, Math.abs(b[i])); } return me / mx; };
(async () => {
  if (!navigator.gpu) throw new Error("no WebGPU in this browser");
  const inn = 64, outd = 48, r = 8, scale = 1.5, dims = { inn, out: outd, r };
  let s = 7; const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return (s / 0x7fffffff - 0.5); };
  const W0 = new Float32Array(outd * inn).map(rnd), A = new Float32Array(r * inn).map(() => rnd() * 0.3), B = new Float32Array(outd * r).map(() => rnd() * 0.3), x = new Float32Array(inn).map(rnd);
  const target = 11;
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const rt = createBackwardRuntime(dev);

  // single-step: CPU forward → CE → GPU backward vs CPU backward
  const { y, h } = loraForward(W0, A, B, scale, x, dims);
  const { dLogits } = maskedCrossEntropy(y, [target], [1], 1, outd);
  const dy = dLogits.slice(0, outd);
  const { dA: cdA, dB: cdB } = loraBackward(B, scale, x, h, dy, dims);
  const { dA: gdA, dB: gdB } = await loraBackwardGPU(rt, { B, scale, x, h, dy, dims });
  const eA = rel(gdA, cdA), eB = rel(gdB, cdB);

  // ADAMW on GPU vs CPU
  const th1 = Float32Array.from(A), m1 = new Float32Array(A.length), v1 = new Float32Array(A.length);
  adamwStep(th1, cdA, m1, v1, 1, 0.05);
  const g = await adamwStepGPU(rt, { theta: Float32Array.from(A), grad: cdA, m: new Float32Array(A.length), v: new Float32Array(A.length), t: 1, alpha: 0.05 });
  const eAdam = rel(g.theta, th1);

  // GPU-driven training loop (CPU forward, GPU backward + GPU adamw) → loss must fall + flip prediction
  const At = new Float32Array(r * inn).map(() => rnd() * 0.04), Bt = new Float32Array(outd * r);
  const mA = new Float32Array(At.length), vA = new Float32Array(At.length), mB = new Float32Array(Bt.length), vB = new Float32Array(Bt.length);
  const argmax = (yv) => { let mi = 0; for (let o = 1; o < outd; o++) if (yv[o] > yv[mi]) mi = o; return mi; };
  const basePred = argmax(loraForward(W0, At, new Float32Array(outd * r), scale, x, dims).y);
  let first = null, last = null;
  for (let step = 0; step < 120; step++) {
    const f = loraForward(W0, At, Bt, scale, x, dims);
    const ce = maskedCrossEntropy(f.y, [target], [1], 1, outd);
    const d = ce.dLogits.slice(0, outd);
    const bw = await loraBackwardGPU(rt, { B: Bt, scale, x, h: f.h, dy: d, dims });
    const sa = await adamwStepGPU(rt, { theta: At, grad: bw.dA, m: mA, v: vA, t: step + 1, alpha: 0.05 });
    At.set(sa.theta); mA.set(sa.m); vA.set(sa.v);
    const sb = await adamwStepGPU(rt, { theta: Bt, grad: bw.dB, m: mB, v: vB, t: step + 1, alpha: 0.05 });
    Bt.set(sb.theta); mB.set(sb.m); vB.set(sb.v);
    if (first === null) first = ce.loss; last = ce.loss;
  }
  const finalPred = argmax(loraForward(W0, At, Bt, scale, x, dims).y);
  const ok = eA < 1e-4 && eB < 1e-4 && eAdam < 1e-4 && last < first * 0.3 && finalPred === target;
  window.__bwd = { ok, dA_rel: +eA.toExponential(2), dB_rel: +eB.toExponential(2), adamw_rel: +eAdam.toExponential(2), loss: [+first.toFixed(3), +last.toFixed(3)], basePred, finalPred, target };
  log(`LoRA backward GPU (A5): ${ok ? "PASS" : "FAIL"}\n  dA vs CPU rel ${eA.toExponential(2)} · dB rel ${eB.toExponential(2)} · ADAMW rel ${eAdam.toExponential(2)}\n  GPU-trained loop loss ${first.toFixed(3)} → ${last.toFixed(3)}; prediction ${basePred} (base) → ${finalPred} (target ${target})`);
})().catch((e) => { window.__bwd = { ok: false, err: String(e) }; out.textContent = "ERR " + e + "\n" + (e.stack || ""); });
</script>
