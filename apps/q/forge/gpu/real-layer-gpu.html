<!doctype html>
<meta charset="utf-8">
<title>Real DeepSeek-V2-Lite layer on GPU — Q4_K/Q8_0 MLA+MoE kernels vs CPU oracle</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0b0d; color: #e6e8ea; font: 13px/1.6 ui-monospace, Menlo, monospace; padding: 24px 28px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  #v { border: 1px solid #1c2128; border-radius: 10px; padding: 14px 16px; background: #101318; white-space: pre-wrap; }
  #v.ok { border-color: #1f6f43; background: #0d1712; } #v.bad { border-color: #6f2f2f; background: #170d0d; }
  .big { font-size: 18px; font-weight: 700; }
</style>
<h1>Real DeepSeek-V2-Lite layer 1 on WebGPU — real Q4_K/Q8_0 weights, kernels vs CPU Tier-A oracle</h1>
<div id="v">running…</div>
<script type="module">
import { createGpuRuntime } from "./holo-gguf-gpu.mjs";
const $v = document.getElementById("v");
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) || 1); };
const relMax = (a, b) => { let m = 0, s = 0; for (let i = 0; i < b.length; i++) s = Math.max(s, Math.abs(b[i])); for (let i = 0; i < a.length; i++) m = Math.max(m, Math.abs(a[i] - b[i])); return m / (s || 1); };

async function run() {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const { P, disp, u4, sbuf, wF, rawU32, resetUniforms } = createGpuRuntime(dev);
  const data = await (await fetch("./_qtest/real-layer.json?cb=" + Date.now())).json();
  const bin = new Uint8Array(await (await fetch("./_qtest/real-layer.bin?cb=" + Date.now())).arrayBuffer());
  const man = data.manifest;
  const G = (n) => Math.ceil(n / 64);
  const RAW = { 12: P.q4kraw, 13: P.q5kraw, 14: P.q6kraw, 8: P.q8raw, 6: P.q5raw };
  const sliceBin = (name) => bin.subarray(man[name].off, man[name].off + man[name].len);

  const readback = async (buf, n) => {
    const stg = dev.createBuffer({ size: n * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
    const enc = dev.createCommandEncoder(); enc.copyBufferToBuffer(buf, 0, stg, 0, n * 4); dev.queue.submit([enc.finish()]);
    await stg.mapAsync(GPUMapMode.READ); const out = Float32Array.from(new Float32Array(stg.getMappedRange().slice(0))); stg.unmap(); stg.destroy(); return out;
  };
  // raw K-quant matvec: weight bytes (bin slice) by ggmlType, over f32 activation buffer → readback
  const mvRaw = async (name, type, N, K, xb) => {
    const pipe = RAW[type]; if (!pipe) throw new Error("no GPU kernel for ggmlType " + type + " (" + name + ")");
    resetUniforms(); const rb = rawU32(sliceBin(name)), yb = sbuf(N);
    const enc = dev.createCommandEncoder(); disp(enc, pipe, [rb, xb, yb, u4([N, K, 0, 0])], G(N)); dev.queue.submit([enc.finish()]);
    return readback(yb, N);
  };
  const swigluGpu = async (g, u, n) => { resetUniforms(); const gb = wF(g), ub = wF(u), yb = sbuf(n); const enc = dev.createCommandEncoder(); disp(enc, P.swiglu, [gb, ub, yb, u4([n, 0, 0, 0])], G(n)); dev.queue.submit([enc.finish()]); return readback(yb, n); };

  const results = [];

  // ── 1) real Q4_K MLA matvec (attn_q, 2048→3072) ──
  // The GPU raw kernels do FLOAT dequant-dot → compare to the float-dequant oracle (kernel correctness).
  // `intMax` = how far the integer-dot path (CPU forward / llama.cpp) sits — the known fast-vs-hifi seam.
  const aq = data.attnQ;
  const qGpu = await mvRaw("attn_q", aq.type, aq.N, aq.K, wF(Float32Array.from(aq.x)));
  results.push({ name: `MLA attn_q (Q4_K [N=${aq.N} K=${aq.K}])`, cos: cos(qGpu, aq.expectedFloat), relMax: relMax(qGpu, aq.expectedFloat), intMax: relMax(aq.expectedFloat, aq.expected) });

  // ── 2) real MoE layer: 6/64 routed experts (Q4_K gate/up, Q8_0 down) + 2×shared, ungated ──
  const m = data.moe, D = data.cfg.D, xb = wF(Float32Array.from(m.x));
  const out = new Float32Array(D);
  for (let i = 0; i < m.selected.length; i++) {
    const g = await mvRaw(`gate_${i}`, m.gateType, m.gateN, m.gateK, xb);
    const u = await mvRaw(`up_${i}`, m.upType, m.gateN, m.gateK, xb);
    const act = await swigluGpu(g, u, m.gateN);
    const dn = await mvRaw(`down_${i}`, m.downType, m.downN, m.downK, wF(act));
    for (let j = 0; j < D; j++) out[j] += m.weights[i] * dn[j];
  }
  const sg = await mvRaw("sgate", m.sgateType, m.sgateN, m.sgateK, xb);
  const su = await mvRaw("sup", m.supType, m.sgateN, m.sgateK, xb);
  const sact = await swigluGpu(sg, su, m.sgateN);
  const sh = await mvRaw("sdown", m.sdownType, m.sdownN, m.sdownK, wF(sact));
  for (let j = 0; j < D; j++) out[j] += sh[j];
  results.push({ name: `MoE layer (${m.selected.length}/${data.cfg.E} experts, Q4_K gate/up + Q8_0 down + Q6_K 2×shared)`, cos: cos(out, m.expectedFloat), relMax: relMax(out, m.expectedFloat), intMax: relMax(m.expectedFloat, m.expected) });

  const ok = results.every((r) => r.cos > 0.99999 && r.relMax < 1e-4);
  window.__real = { ok, results, argmax: data.argmax, selected: m.selected };
  $v.className = ok ? "ok" : "bad";
  $v.innerHTML = `<span class="big">${ok ? "Real DeepSeek-V2-Lite kernels MATCH the float-dequant oracle on real K-quant weights ✓" : "MISMATCH ✗"}</span>\n\n` +
    `model ${data.model} · layer ${data.layer} · CPU forward decoded "${data.argmax === 18828 ? " Berlin" : "id " + data.argmax}" · routed experts [${m.selected}]\n\n` +
    results.map((r) => `${r.name}\n    vs float-dequant oracle: cosine ${r.cos.toFixed(8)} · relMax ${r.relMax.toExponential(2)}   (integer-dot/hifi seam: ${r.intMax.toExponential(2)})`).join("\n") +
    `\n\nReal quantized weights (Q4_K attn+experts, Q8_0 down, Q6_K shared-down) from the forged 10 GB model, matvec'd
in-shader. GPU raw kernels = FLOAT dequant-dot (Tier-B fast path) → match the float oracle to the f32 floor. The
integer-dot column is the fast-vs-hifi gap (llama.cpp uses integer dot; Q6_K integer kernel exists, Q4_K/Q5_K
integer-dot kernels are the remaining lever for exact near-tie parity). Correctness on real GLM-class weights: proven.`;
}
run().catch((e) => { $v.className = "bad"; $v.textContent = "ERROR: " + (e.stack || e.message); window.__real = { ok: false, err: String(e.message) }; });
</script>
