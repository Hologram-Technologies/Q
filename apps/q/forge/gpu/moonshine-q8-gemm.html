<!doctype html><meta charset="utf-8"><title>Holo Moonshine — in-shader int8 GEMM witness (P2)</title>
<body style="font:13px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init…</pre></body>
<script type="module">
// P2 witness: an in-shader int8-dequant tiled GEMM (TILED_Q8) reads int8 weights + per-row f32 scales
// straight from the .holo κ-body (¼ the bytes of f32 → ¼ GPU memory + ¼ read bandwidth) and dequants inside
// the matmul. Verify it equals the f32 TILED GEMM on a REAL Moonshine weight, and measure the memory win.
// If exact, this is the kernel that turns int8 into a RUNTIME win (not just download), to land in the engine.
import { streamHolo } from "./holo-whisper-stream.mjs";
const out = document.getElementById("out"); const log = (s) => out.textContent += "\n" + s;
window.__q8 = { stage: "start" };

const TILED = `@group(0)@binding(0)var<storage,read>A:array<f32>;@group(0)@binding(1)var<storage,read>B:array<f32>;@group(0)@binding(2)var<storage,read>bias:array<f32>;@group(0)@binding(3)var<storage,read_write>Y:array<f32>;@group(0)@binding(4)var<uniform>p:vec4<u32>;
var<workgroup> As:array<f32,256>;var<workgroup> Bs:array<f32,256>;
@compute @workgroup_size(16,16)fn main(@builtin(workgroup_id)wg:vec3<u32>,@builtin(local_invocation_id)l:vec3<u32>){
let rows=p.x;let inD=p.y;let outD=p.z;let tx=l.x;let ty=l.y;let r=wg.y*16u+ty;let o=wg.x*16u+tx;var acc=0.0;let nT=(inD+15u)/16u;
for(var kt=0u;kt<nT;kt++){let ai=kt*16u+tx;let bi=kt*16u+ty;
As[ty*16u+tx]=select(0.0,A[r*inD+ai],r<rows&&ai<inD);Bs[ty*16u+tx]=select(0.0,B[o*inD+bi],o<outD&&bi<inD);
workgroupBarrier();for(var kk=0u;kk<16u;kk++){acc=acc+As[ty*16u+kk]*Bs[kk*16u+tx];}workgroupBarrier();}
if(r<rows&&o<outD){Y[r*outD+o]=acc+select(0.0,bias[o],p.w==1u);}}`;
// int8 weights packed 4/word in array<u32>; per-row f32 scale; dequant on tile-load; Y = scale[o]·acc + bias
const TILED_Q8 = `@group(0)@binding(0)var<storage,read>A:array<f32>;@group(0)@binding(1)var<storage,read>B:array<u32>;@group(0)@binding(2)var<storage,read>scl:array<f32>;@group(0)@binding(3)var<storage,read>bias:array<f32>;@group(0)@binding(4)var<storage,read_write>Y:array<f32>;@group(0)@binding(5)var<uniform>p:vec4<u32>;
var<workgroup> As:array<f32,256>;var<workgroup> Bs:array<f32,256>;
fn rdq(idx:u32)->f32{let w=B[idx>>2u];let sh=(idx&3u)*8u;let b=(w>>sh)&0xffu;return f32(i32(b<<24u)>>24u);}
@compute @workgroup_size(16,16)fn main(@builtin(workgroup_id)wg:vec3<u32>,@builtin(local_invocation_id)l:vec3<u32>){
let rows=p.x;let inD=p.y;let outD=p.z;let tx=l.x;let ty=l.y;let r=wg.y*16u+ty;let o=wg.x*16u+tx;var acc=0.0;let nT=(inD+15u)/16u;
for(var kt=0u;kt<nT;kt++){let ai=kt*16u+tx;let bi=kt*16u+ty;
As[ty*16u+tx]=select(0.0,A[r*inD+ai],r<rows&&ai<inD);Bs[ty*16u+tx]=select(0.0,rdq(o*inD+bi),o<outD&&bi<inD);
workgroupBarrier();for(var kk=0u;kk<16u;kk++){acc=acc+As[ty*16u+kk]*Bs[kk*16u+tx];}workgroupBarrier();}
if(r<rows&&o<outD){Y[r*outD+o]=acc*scl[o]+select(0.0,bias[o],p.w==1u);}}`;

(async () => {
 try {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const H = await streamHolo("/.models/moonshine-tiny-int8.holo");
  const NAME = "model.decoder.layers.0.mlp.fc1.weight";   // [2304,288] int8 — a big matmul weight
  const o = H.meta.order.find((t) => t.name === NAME);
  if (o.type !== 9) throw new Error("expected int8 (type 9), got " + o.type);
  const rows = o.dims[0], cols = o.dims[1], n = rows * cols;
  log(`weight ${NAME} [${rows},${cols}] type ${o.type}`);
  const Wf32 = await H.getF32(NAME);                       // streamer dequant → f32 reference
  const body = await H.bodyByKappa(o.kappa);               // raw κ-body = [f32 scale×rows][int8×n]
  const al = (body.byteOffset % 4) ? new Uint8Array(body.slice().buffer) : body;
  const scales = new Float32Array(al.buffer, al.byteOffset, rows);
  const int8 = al.subarray(rows * 4, rows * 4 + n);        // int8 data
  log(`bytes: f32 weight ${(n * 4 / 1e6).toFixed(2)}MB · int8 body ${((rows * 4 + n) / 1e6).toFixed(2)}MB (${(100 * (rows * 4 + n) / (n * 4)).toFixed(0)}%)`);

  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const pipe = (c) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code: c }), entryPoint: "main" } });
  const Pf = pipe(TILED), Pq = pipe(TILED_Q8);
  const sb = (k) => dev.createBuffer({ size: Math.max(4, k * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
  const wb = (a) => { const b = dev.createBuffer({ size: Math.max(4, a.byteLength), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
  const u4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
  const bg = (pl, a) => dev.createBindGroup({ layout: pl.getBindGroupLayout(0), entries: a.map((b, i) => ({ binding: i, resource: { buffer: b } })) });
  const T16 = (x) => Math.ceil(x / 16);
  const rdbk = async (buf, len) => { const rb = dev.createBuffer({ size: len * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ }); const e = dev.createCommandEncoder(); e.copyBufferToBuffer(buf, 0, rb, 0, len * 4); dev.queue.submit([e.finish()]); await rb.mapAsync(GPUMapMode.READ); const r = new Float32Array(rb.getMappedRange().slice(0)); rb.unmap(); return r; };

  const RA = 4;   // activation rows
  const A = new Float32Array(RA * cols); for (let i = 0; i < A.length; i++) A[i] = Math.sin(i * 0.017) * 0.7;
  const Abuf = wb(A), dummy = wb(new Float32Array([0]));
  // int8 buffer padded to mult of 4 bytes
  const padN = Math.ceil(n / 4) * 4, i8 = new Uint8Array(padN); i8.set(int8);
  const Wf32B = wb(Wf32), Wi8B = wb(i8), sclB = wb(scales);
  const Yf = sb(RA * rows), Yq = sb(RA * rows), uni = u4([RA, cols, rows, 0]);

  const time = async (fn) => { const t = performance.now(); for (let i = 0; i < 20; i++) fn(); await dev.queue.onSubmittedWorkDone(); return (performance.now() - t) / 20; };
  const runF = () => { const e = dev.createCommandEncoder(); const pa = e.beginComputePass(); pa.setPipeline(Pf); pa.setBindGroup(0, bg(Pf, [Abuf, Wf32B, dummy, Yf, uni])); pa.dispatchWorkgroups(T16(rows), T16(RA)); pa.end(); dev.queue.submit([e.finish()]); };
  const runQ = () => { const e = dev.createCommandEncoder(); const pa = e.beginComputePass(); pa.setPipeline(Pq); pa.setBindGroup(0, bg(Pq, [Abuf, Wi8B, sclB, dummy, Yq, uni])); pa.dispatchWorkgroups(T16(rows), T16(RA)); pa.end(); dev.queue.submit([e.finish()]); };
  runF(); runQ(); await dev.queue.onSubmittedWorkDone();
  const yf = await rdbk(Yf, RA * rows), yq = await rdbk(Yq, RA * rows);
  let dot = 0, na = 0, nb = 0, mx = 0; for (let i = 0; i < yf.length; i++) { dot += yf[i] * yq[i]; na += yf[i] * yf[i]; nb += yq[i] * yq[i]; const er = Math.abs(yf[i] - yq[i]); if (er > mx) mx = er; }
  const cos = dot / (Math.sqrt(na) * Math.sqrt(nb));
  const tf = await time(runF), tq = await time(runQ);
  window.__q8 = { stage: "done", cosine: +cos.toFixed(6), maxAbs: +mx.toExponential(2), f32MB: +(n * 4 / 1e6).toFixed(2), int8MB: +((rows * 4 + n) / 1e6).toFixed(2), memPct: +(100 * (rows * 4 + n) / (n * 4)).toFixed(0), msF32: +tf.toFixed(3), msInt8: +tq.toFixed(3), speedup: +(tf / tq).toFixed(2), pass: cos >= 0.9999 };
  log(`\nTILED_Q8 vs TILED(f32): cosine ${cos.toFixed(6)} · maxAbs ${mx.toExponential(2)} ${cos >= 0.9999 ? "✓ MATCH" : "✗"}`);
  log(`GPU weight memory: ${(n * 4 / 1e6).toFixed(2)}MB (f32) → ${((rows * 4 + n) / 1e6).toFixed(2)}MB (int8) = ${(100 * (rows * 4 + n) / (n * 4)).toFixed(0)}%`);
  log(`GEMM time: f32 ${tf.toFixed(3)}ms · int8 ${tq.toFixed(3)}ms · ${(tf / tq).toFixed(2)}×`);
 } catch (e) { window.__q8 = { stage: "error", error: String(e) }; log("ERROR: " + e + "\n" + (e.stack || "")); }
})();
</script>
