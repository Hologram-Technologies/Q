<!doctype html>
<meta charset="utf-8">
<title>K-quant matvec microbench — naive vs tiled, isolated (parity + GB/s)</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0a0b0d; color: #e6e8ea; font: 13px/1.6 ui-monospace, Menlo, monospace; padding: 24px 28px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  #v { border: 1px solid #1c2128; border-radius: 10px; padding: 14px 16px; background: #101318; white-space: pre-wrap; }
  #v.ok { border-color: #1f6f43; background: #0d1712; } #v.bad { border-color: #6f2f2f; background: #170d0d; }
  .big { font-size: 17px; font-weight: 700; }
  table { border-collapse: collapse; margin-top: 10px; } td, th { border: 1px solid #222; padding: 3px 10px; text-align: right; } th { color: #8a9099; }
</style>
<h1>K-quant matvec microbench — isolated (no 5 GB forward, reloadable in seconds)</h1>
<div id="v">running…</div>
<script type="module">
import { createGpuRuntime } from "./holo-gguf-gpu.mjs";
const $v = document.getElementById("v");
const cos = (a, b) => { let d = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return d / (Math.sqrt(na) * Math.sqrt(nb) || 1); };
const relMax = (a, b) => { let m = 0, s = 0; for (let i = 0; i < b.length; i++) s = Math.max(s, Math.abs(b[i])); for (let i = 0; i < a.length; i++) m = Math.max(m, Math.abs(a[i] - b[i])); return m / (s || 1); };
const median = (xs) => [...xs].sort((a, b) => a - b)[xs.length >> 1];
const BB = { 12: 144, 13: 176, 14: 210, 8: 34 }, BE = { 12: 256, 13: 256, 14: 256, 8: 32 };  // bytes/block, elems/block

async function run() {
  if (!navigator.gpu) throw new Error("no WebGPU");
  const adapter = await navigator.gpu.requestAdapter();
  const dev = await adapter.requestDevice();
  const rt = createGpuRuntime(dev), { P, disp, u4, sbuf, wF, rawU32 } = rt;
  const G = (n) => Math.ceil(n / 64);
  const readback = async (buf, n) => { const s = dev.createBuffer({ size: n * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST }); const e = dev.createCommandEncoder(); e.copyBufferToBuffer(buf, 0, s, 0, n * 4); dev.queue.submit([e.finish()]); await s.mapAsync(GPUMapMode.READ); const o = Float32Array.from(new Float32Array(s.getMappedRange().slice(0))); s.unmap(); s.destroy(); return o; };

  // ── PARITY: run a pipe over the real _qtest/q6k fixture, compare to the CPU oracle y ──
  const parity = async (tag, pipe, groupsFn) => {
    const meta = await (await fetch(`./_qtest/${tag}.json?cb=` + Date.now())).json();
    const bin = new Uint8Array(await (await fetch(`./_qtest/${tag}.bin?cb=` + Date.now())).arrayBuffer());
    const rb = rawU32(bin), act = wF(Float32Array.from(meta.act)), out = sbuf(meta.N);
    const enc = dev.createCommandEncoder(); disp(enc, pipe, [rb, act, out, u4([meta.N, meta.K, 0, 0])], groupsFn(meta.N)); dev.queue.submit([enc.finish()]);
    const gpu = await readback(out, meta.N);
    rb.destroy(); act.destroy(); out.destroy();
    return { cos: cos(gpu, meta.y), relMax: relMax(gpu, meta.y), N: meta.N, K: meta.K };
  };

  // ── TIMING: real lm_head chunk shape (N rows × K), random Q6_K bytes (values irrelevant for throughput) ──
  // BATCHED throughput (the executor batches many matvecs into one command buffer at router flushes → per-dispatch
  // sync is NOT paid per op). Time `iters` back-to-back dispatches in ONE submit + ONE sync ⇒ per-dispatch cost.
  const timeKernel = async (pipe, groupsFn, type, N, K, warm = 20, iters = 200) => {
    const nb = K / BE[type], rowBytes = nb * BB[type], wbytes = N * rowBytes;
    const rand = new Uint8Array(wbytes); for (let i = 0; i < wbytes; i += 4096) rand[i] = (i * 2654435761) & 0xff;
    const rb = rawU32(rand), act = wF(new Float32Array(K).map((_, i) => Math.sin(i))), out = sbuf(N);
    const ub = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(ub, 0, new Uint32Array([N, K, 0, 0]));
    const batch = async (cnt) => { const e = dev.createCommandEncoder(); for (let i = 0; i < cnt; i++) disp(e, pipe, [rb, act, out, ub], groupsFn(N)); dev.queue.submit([e.finish()]); await dev.queue.onSubmittedWorkDone(); };
    await batch(warm);
    const t0 = performance.now(); await batch(iters); const ms = (performance.now() - t0) / iters;
    rb.destroy(); act.destroy(); out.destroy(); ub.destroy();
    return { ms, gbs: wbytes / (ms / 1000) / 1e9, wbytes };
  };

  const G8 = (n) => Math.ceil(n / 8), rows = [];
  // per-token weight-read counts (26 MoE layers × 6 experts, + attn): rough per-token ms contribution
  const configs = [
    { name: "Q6_K lm_head", type: 14, fixture: "q6k2048", naive: P.q6kraw, tiled: P.q6ktiled, N: 51200, K: 2048, perTok: 2 },
    { name: "Q4_K gate/up expert", type: 12, fixture: "q4k2048", naive: P.q4kraw, tiled: P.q4ktiled, N: 1408, K: 2048, perTok: 26 * 6 * 2 + 27 * 4 },
    { name: "Q8_0 down expert", type: 8, fixture: "q8_1408", naive: P.q8raw, tiled: P.q8tiled, N: 2048, K: 1408, perTok: 26 * 6 },
  ];
  let allOk = true;
  for (const c of configs) {
    const pN = await parity(c.fixture, c.naive, G), pT = await parity(c.fixture, c.tiled, G8);
    const tN = await timeKernel(c.naive, G, c.type, c.N, c.K), tT = await timeKernel(c.tiled, G8, c.type, c.N, c.K);
    const ok = pT.cos > 0.99999 && pT.relMax < 1e-4; allOk = allOk && ok;
    rows.push([c.name, pT.cos, pT.relMax, tN.ms, tT.ms, tN.ms / tT.ms, c.perTok]);
  }
  const perTokNaive = rows.reduce((s, r) => s + r[3] * r[6], 0), perTokTiled = rows.reduce((s, r) => s + r[4] * r[6], 0);
  window.__bench = { ok: allOk, rows: rows.map(r => ({ name: r[0], cos: r[1], relMax: r[2], naiveMs: r[3], tiledMs: r[4], speedup: r[5], perTok: r[6] })), perTokNaiveMs: perTokNaive, perTokTiledMs: perTokTiled, matvecSpeedup: perTokNaive / perTokTiled };
  $v.className = allOk ? "ok" : "bad";
  $v.innerHTML = `<span class="big">${allOk ? `tiled Q6_K/Q4_K/Q8_0 parity-exact · matvec-time ${(perTokNaive / perTokTiled).toFixed(1)}× ✓` : "PARITY FAIL ✗"}</span>\n` +
    `device: ${adapter.info?.description || adapter.info?.vendor || "webgpu"} · binding ${(dev.limits.maxStorageBufferBindingSize/1e6|0)}MB · subgroups=${dev.features.has("subgroups")}\n` +
    `<table><tr><th>kernel (real shape)</th><th>parity cos</th><th>relMax</th><th>naive ms</th><th>tiled ms</th><th>×</th><th>/token</th></tr>` +
    rows.map(r => `<tr><td style="text-align:left">${r[0]} N=${configs[rows.indexOf(r)].N}</td><td>${r[1].toFixed(6)}</td><td>${r[2].toExponential(1)}</td><td>${r[3].toFixed(3)}</td><td>${r[4].toFixed(3)}</td><td>${r[5].toFixed(1)}</td><td>${r[6]}</td></tr>`).join("") +
    `</table>\nΣ per-token matvec time: naive ${perTokNaive.toFixed(0)} ms → tiled ${perTokTiled.toFixed(0)} ms (${(perTokNaive / perTokTiled).toFixed(1)}× on the matvec bulk). Reload = fresh, seconds.`;
}
run().catch(e => { $v.className = "bad"; $v.textContent = "ERROR: " + (e.stack || e.message); window.__bench = { ok: false, err: String(e.message) }; });
</script>
