<!doctype html><meta charset="utf-8"><title>Holo Whisper — GPU conv-stem witness (W-1)</title>
<body style="font:14px ui-monospace,monospace;background:#0b0e16;color:#cdd6f4;padding:16px"><pre id="out">init…</pre></body>
<script type="module">
// W-1 conv-stem witness: run Whisper's audio front-end (conv1d×2 + bias + GELU + transpose + pos) on
// WebGPU and score vs the CPU oracle's golden (gpu/whisper-enc-ref.stem.f32). The oracle (gguf-forge-
// whisper.mjs) is byte-exact to whisper-cli → this is the Tier-B GPU parity bar (cosine≈1 / small maxAbs).
// The F16-round the oracle applies to the conv INPUT (`f16r`) is reproduced exactly by WGSL
// pack2x16float→unpack2x16float. Weights are already f16-valued. Bar: cosine≥0.9999, maxAbs small.
const out = document.getElementById("out");
const log = (s) => { out.textContent += "\n" + s; };
window.__convstem = { stage: "start" };

async function f32(url) { const b = await (await fetch(url)).arrayBuffer(); return new Float32Array(b); }

const CONV1D = `
@group(0)@binding(0)var<storage,read>inp:array<f32>;
@group(0)@binding(1)var<storage,read>w:array<f32>;
@group(0)@binding(2)var<storage,read_write>outp:array<f32>;
@group(0)@binding(3)var<uniform>p:vec4<u32>;   // IC, OC, K, OL
@group(0)@binding(4)var<uniform>q:vec4<u32>;   // L, stride, pad, _
fn f16r(x:f32)->f32{ return unpack2x16float(pack2x16float(vec2<f32>(x,0.0))).x; }   // ggml im2col casts patches to F16
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){
  let idx=g.x; let IC=p.x; let OC=p.y; let K=p.z; let OL=p.w; let L=q.x; let stride=q.y; let pad=q.z;
  if(idx>=OC*OL){return;}
  let oc=idx/OL; let ol=idx%OL; var s=0.0; let wb=oc*IC*K;
  for(var ic=0u;ic<IC;ic++){ let ib=ic*L; let wcb=wb+ic*K;
    for(var k=0u;k<K;k++){ let ip=i32(ol*stride)-i32(pad)+i32(k); if(ip<0||ip>=i32(L)){continue;} s=s+f16r(inp[ib+u32(ip)])*w[wcb+k]; } }
  outp[oc*OL+ol]=s;
}`;
const GELUBIAS = `
@group(0)@binding(0)var<storage,read_write>c:array<f32>;
@group(0)@binding(1)var<storage,read>b:array<f32>;
@group(0)@binding(2)var<uniform>p:vec4<u32>;   // OC, OL
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){
  let idx=g.x; let OC=p.x; let OL=p.y; if(idx>=OC*OL){return;}
  let x=c[idx]+b[idx/OL];
  c[idx]=0.5*x*(1.0+tanh(0.7978845608028654*(x+0.044715*x*x*x)));   // ggml_gelu tanh approx
}`;
const TPOS = `
@group(0)@binding(0)var<storage,read>c2:array<f32>;
@group(0)@binding(1)var<storage,read>pos:array<f32>;
@group(0)@binding(2)var<storage,read_write>x:array<f32>;
@group(0)@binding(3)var<uniform>p:vec4<u32>;   // OL, S
@compute @workgroup_size(64)fn main(@builtin(global_invocation_id)g:vec3<u32>){
  let idx=g.x; let OL=p.x; let S=p.y; if(idx>=OL*S){return;}
  let pp=idx/S; let d=idx%S; x[idx]=c2[d*OL+pp]+pos[idx];   // transpose [S,OL]→[OL,S] + pos
}`;

(async () => {
  try {
    if (!navigator.gpu) throw new Error("no WebGPU");
    const man = await (await fetch("wstem.json")).json();
    const ref = await (await fetch("whisper-enc-ref.json")).json();
    const S = man.S, IC0 = man.n_mels, K = 3, L = ref.melShape[1], OL1 = L, OL2 = ((L - 1) / 2 | 0) + 1;   // 80→512, 3000→1500
    log(`S=${S} n_mels=${IC0} L=${L} OL2=${OL2} (model ${ref.model})`);
    window.__convstem.stage = "loading";
    const [mel, w1, b1, w2, b2, pos, gold] = await Promise.all([
      f32("whisper-enc-ref.mel.f32"), f32("wstem.conv1_w.f32"), f32("wstem.conv1_b.f32"),
      f32("wstem.conv2_w.f32"), f32("wstem.conv2_b.f32"), f32("wstem.pos.f32"), f32("whisper-enc-ref.stem.f32")]);

    const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
    const pipe = (code) => dev.createComputePipeline({ layout: "auto", compute: { module: dev.createShaderModule({ code }), entryPoint: "main" } });
    const P = { conv: pipe(CONV1D), gb: pipe(GELUBIAS), tpos: pipe(TPOS) };
    const sb = (n) => dev.createBuffer({ size: Math.max(4, n * 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
    const wbuf = (a) => { const b = dev.createBuffer({ size: Math.max(4, a.byteLength), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, a); return b; };
    const u4 = (v) => { const b = dev.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST }); dev.queue.writeBuffer(b, 0, new Uint32Array([...v, 0, 0, 0, 0].slice(0, 4))); return b; };
    const G = (n) => Math.ceil(n / 64);
    const bg = (pl, arr) => dev.createBindGroup({ layout: pl.getBindGroupLayout(0), entries: arr.map((b, i) => ({ binding: i, resource: { buffer: b } })) });
    const disp = (enc, pl, arr, n) => { const pa = enc.beginComputePass(); pa.setPipeline(pl); pa.setBindGroup(0, bg(pl, arr)); pa.dispatchWorkgroups(G(n)); pa.end(); };

    const melB = wbuf(mel), w1B = wbuf(w1), b1B = wbuf(b1), w2B = wbuf(w2), b2B = wbuf(b2), posB = wbuf(pos);
    const c1B = sb(S * OL1), c2B = sb(S * OL2), xB = sb(OL2 * S);
    window.__convstem.stage = "compute";
    const t0 = performance.now();
    const enc = dev.createCommandEncoder();
    disp(enc, P.conv, [melB, w1B, c1B, u4([IC0, S, K, OL1]), u4([L, 1, 1])], S * OL1);     // conv1 [S,3000]
    disp(enc, P.gb, [c1B, b1B, u4([S, OL1])], S * OL1);                                      // +b1, gelu
    disp(enc, P.conv, [c1B, w2B, c2B, u4([S, S, K, OL2]), u4([L, 2, 1])], S * OL2);          // conv2 [S,1500] stride2
    disp(enc, P.gb, [c2B, b2B, u4([S, OL2])], S * OL2);                                      // +b2, gelu
    disp(enc, P.tpos, [c2B, posB, xB, u4([OL2, S])], OL2 * S);                               // transpose + pos
    const rb = dev.createBuffer({ size: OL2 * S * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
    enc.copyBufferToBuffer(xB, 0, rb, 0, OL2 * S * 4);
    dev.queue.submit([enc.finish()]);
    await rb.mapAsync(GPUMapMode.READ);
    const x = new Float32Array(rb.getMappedRange().slice(0)); rb.unmap();
    const ms = Math.round(performance.now() - t0);

    // score vs golden
    let dot = 0, na = 0, nb = 0, maxAbs = 0;
    for (let i = 0; i < x.length; i++) { const a = x[i], b = gold[i]; dot += a * b; na += a * a; nb += b * b; const e = Math.abs(a - b); if (e > maxAbs) maxAbs = e; }
    const cosine = dot / (Math.sqrt(na) * Math.sqrt(nb));
    const pass = cosine >= 0.9999 && maxAbs < 0.5;
    window.__convstem = { stage: "done", cosine: +cosine.toFixed(6), maxAbs: +maxAbs.toFixed(4), shape: [OL2, S], ms, gpuSample: [...x.slice(0, 4)].map(v => +v.toFixed(4)), goldSample: [...gold.slice(0, 4)].map(v => +v.toFixed(4)), pass };
    log(`\nGPU conv-stem [${OL2},${S}] in ${ms}ms`);
    log(`cosine ${cosine.toFixed(6)} · maxAbs ${maxAbs.toFixed(4)} → ${pass ? "✓ PASS" : "✗ FAIL"}`);
    log(`gpu  ${window.__convstem.gpuSample}\ngold ${window.__convstem.goldSample}`);
  } catch (e) { window.__convstem = { stage: "error", error: String(e) }; log("ERROR: " + e + "\n" + (e.stack || "")); }
})();
</script>
