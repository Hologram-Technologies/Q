<!doctype html><meta charset=utf-8><title>LoRA adapter-inference GPU witness</title>
<body><pre id=out>loading…</pre><script type=module>
// C0: prove the LoRA adapter applies in the GPU FORWARD (inference), matching the CPU loraForward
// reference: y = W0·x + scale·B·(A·x). Two small matmuls (A: r×inn, B: out×r) + a SAXPY. This is the
// primitive share-an-adapter needs — the learned delta on top of a base linear, on-device.
import { createGpuRuntime, G } from "./holo-gguf-gpu.mjs?v=7";
import { loraForward } from "../gguf-forge-lora-train.mjs";
const out = document.getElementById("out"); const log = (m) => out.textContent = m;
(async () => {
  const inn = 128, outd = 128, r = 8, scale = 2.0;
  let s = 7; const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return (s / 0x7fffffff - 0.5) * 2; };
  const W0 = new Float32Array(outd * inn).map(rnd), A = new Float32Array(r * inn).map(rnd), B = new Float32Array(outd * r).map(rnd), x = new Float32Array(inn).map(rnd);
  // CPU reference
  const { y: yCpu } = loraForward(W0, A, B, scale, x, { inn, out: outd, r });
  // GPU: base matvec + adapter (A·x → B·h → +scale)
  const dev = await (await navigator.gpu.requestAdapter()).requestDevice();
  const { P, disp, wF, sbuf, u4, f4, resetUniforms } = createGpuRuntime(dev);
  resetUniforms();
  const xB = wF(x), W0B = wF(W0), AB = wF(A), BB = wF(B);
  const yB = sbuf(outd), hB = sbuf(r), bhB = sbuf(outd);
  const e = dev.createCommandEncoder();
  disp(e, P.f, [W0B, xB, yB, u4([outd, inn, 0])], G(outd));   // y = W0·x
  disp(e, P.f, [AB, xB, hB, u4([r, inn, 0])], G(r));          // h = A·x
  disp(e, P.f, [BB, hB, bhB, u4([outd, r, 0])], G(outd));     // bh = B·h
  disp(e, P.saxpy, [bhB, yB, f4([scale, outd])], G(outd));    // y += scale·bh
  const rb = dev.createBuffer({ size: outd * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  e.copyBufferToBuffer(yB, 0, rb, 0, outd * 4); dev.queue.submit([e.finish()]);
  await rb.mapAsync(GPUMapMode.READ); const yGpu = new Float32Array(rb.getMappedRange().slice(0));
  // also compute base-only (no adapter) to confirm the adapter actually CHANGES the output
  let dot = 0, na = 0, nb = 0, maxAbs = 0, baseDiff = 0; const baseY = new Float32Array(outd);
  for (let o = 0; o < outd; o++) { let b = 0; for (let i = 0; i < inn; i++) b += W0[o * inn + i] * x[i]; baseY[o] = b; baseDiff = Math.max(baseDiff, Math.abs(yCpu[o] - b)); }
  for (let i = 0; i < outd; i++) { dot += yGpu[i] * yCpu[i]; na += yGpu[i] * yGpu[i]; nb += yCpu[i] * yCpu[i]; maxAbs = Math.max(maxAbs, Math.abs(yGpu[i] - yCpu[i])); }
  const cosine = dot / (Math.sqrt(na * nb) || 1), ok = cosine > 0.9999999 && maxAbs < 1e-3 && baseDiff > 0.1;
  window.__lora = { ok, cosine: +cosine.toFixed(8), maxAbs: +maxAbs.toExponential(2), adapterEffect: +baseDiff.toFixed(3) };
  log(`LoRA adapter inference GPU: ${ok ? "PASS" : "FAIL"} — y_gpu vs CPU loraForward cosine ${cosine.toFixed(8)}, maxAbs ${maxAbs.toExponential(2)}; adapter shifts base by ${baseDiff.toFixed(3)} (non-trivial)`);
})().catch((e) => { window.__lora = { ok: false, err: String(e) }; out.textContent = "ERR " + e + "\n" + (e.stack || ""); });
</script>
