<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo Video Hologram OS</title>
    <meta name="description" content="Holo Video the hologram-native video player: content-addressed, adaptive (HLS/DASH), low-latency, WebGPU present. Plays any holospace video in any browser." />
    <!-- The native video engine: video.js 8 (HTML5 <video> + Media Source Extensions),
         pinned + sha256-verified in _shared/videojs/ (PROVENANCE.txt, Law L5). The
         HLS/DASH adaptive source handler (@videojs/http-streaming, "VHS") is bundled
         INTO video.min.js — one engine file, no CDN — so 4K/8K ABR + Low-Latency HLS
         work offline. The icon font is embedded in the CSS (no external font). -->
    <link rel="stylesheet" href="./videojs/video-js.min.css" data-holo-shared="videojs/video-js.min.css" />
    <!-- The shared mobile conformance layer (WCAG 2.2 reflow / 48px targets / safe-area /
         no iOS auto-zoom) every shipped holospace adopts (enforce-witnesses gate). -->
    <link rel="stylesheet" href="../../_shared/holo-mobile.css" data-holo-shared="holo-mobile.css" />
    <style>
      :root { color-scheme: dark; --bg: var(--holo-bg); --dim: var(--holo-ink-dim); }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: #d4d4d4; display: flex; flex-direction: column;
        font: var(--holo-text-sm, 1rem)/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

      /* Thin holospace chrome — identity · κ-address · lifecycle. Same vocabulary as
         os.html so a video holospace reads like any other (ADR-026). */
      /* The chrome floats OVER the video and auto-hides while playing — cinematic, edge-to-edge, YouTube-clean. */
      #bar { position: absolute; top: 0; left: 0; right: 0; z-index: 8; display: flex; align-items: center; gap: 0.7rem;
        padding: 0.55rem 0.9rem 1.4rem; background: linear-gradient(180deg, rgba(8,10,14,0.82), rgba(8,10,14,0));
        font: var(--holo-text-sm, 1rem) ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; user-select: none;
        transition: opacity 0.3s ease, transform 0.3s ease; }
      body.chrome-hidden #bar { opacity: 0; transform: translateY(-110%); pointer-events: none; }
      body.chrome-hidden { cursor: none; }
      /* Bare preview mode — no chrome, no overlay, no controls: only the streaming video fills the box. */
      body.bare #overlay, body.bare .vjs-control-bar, body.bare .vjs-big-play-button { display: none !important; }
      body.bare .vjs-tech, body.bare #gpu { object-fit: cover; }
      #bar .name { color: #e6edf3; font-weight: 600; letter-spacing: 0.02em; }
      #bar .tag { color: var(--dim); }
      #bar .k { color: #58a6ff; word-break: break-all; max-width: 46vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #bar .sp { margin-left: auto; }
      #bar .stat { color: var(--dim); font-variant-numeric: tabular-nums; }
      #bar .ver { color: var(--dim); } #bar .ver.ok { color: #3fb950; } #bar .ver.bad { color: #f85149; }
      #bar .dot { color: #d29922; } #bar .dot.on { color: #3fb950; } #bar .dot.off { color: #f85149; }
      #bar button { font: inherit; color: var(--dim); background: transparent;
        border: 1px solid #1b2128; border-radius: 5px; padding: 0.15rem 0.5rem; cursor: pointer; }
      #bar button:hover { color: #e6edf3; border-color: #30363d; }

      /* The player fills the rest, full-bleed and letterboxed (object-fit), so a 4K
         source presents at the device's real pixels on PC and mobile alike. */
      #stage { position: absolute; inset: 0; background: #000; }
      .video-js { position: absolute; inset: 0; width: 100%; height: 100%; }
      .video-js .vjs-tech { object-fit: contain; }
      .vjs-default-skin { --vjs-theme-primary: #58a6ff; }
      /* Hologram OS WebGPU present surface: the decoded frame, rendered zero-copy
         through the GPU pipeline. JS sizes it to the video's contained rect (correct
         aspect, stage = letterbox). Sits above the source <video>, below the controls;
         pointer-events pass straight through to video.js's controls. */
      #gpu { position: absolute; display: none; z-index: 2; pointer-events: none; image-rendering: auto; }
      body.gpu-on #gpu { display: block; }
      body.gpu-on .vjs-tech { opacity: 0; }   /* keep decoding + audio; present via GPU */
      .video-js .vjs-control-bar, .video-js .vjs-big-play-button { z-index: 3; }
      #bar button.on { color: #d2a8ff; border-color: #8957e5; }

      /* Pre-play status / error panel over the player. */
      #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(60% 60% at 50% 45%, rgba(8,10,14,0.5), rgba(2,4,8,0.78)); transition: opacity 0.3s; z-index: 5; pointer-events: none; }
      #overlay.hidden { opacity: 0; }
      #panel { max-width: 40rem; padding: 1.5rem 1.75rem; text-align: center; }
      #panel .spin { width: 2.6rem; height: 2.6rem; margin: 0 auto 0.9rem; border: 3px solid rgba(255,255,255,0.16); border-top-color: #58a6ff; border-radius: 50%; animation: holoSpin 0.8s linear infinite; }
      #panel.err .spin, #overlay.hidden .spin { display: none; }
      @keyframes holoSpin { to { transform: rotate(360deg); } }
      #panel .ttl { color: #e6edf3; font-size: 1.05rem; font-weight: 600; margin-bottom: 0.2rem; }
      #panel .sub { color: var(--dim); }
      #panel.err .ttl { color: #f85149; }
      /* video.js controls fade with the chrome for a clean, immersive frame. */
      .video-js .vjs-control-bar { transition: opacity 0.3s ease; }
      body.chrome-hidden .video-js.vjs-has-started .vjs-control-bar { opacity: 0; pointer-events: none; }
      #toast { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #161b22;
        border: 1px solid #30363d; border-radius: var(--holo-radius-sm, 8px); padding: 0.45rem 0.8rem; font-size: var(--holo-text-sm, 1rem); opacity: 0;
        transition: opacity 0.2s; z-index: 9; pointer-events: none; }
      #toast.show { opacity: 1; }

      /* Dev loop (Deliverable 0): A/B split (\) = reconstructed | raw; HUD (F8) = cost. Default off. */
      body.ab .vjs-tech { opacity: 1 !important; }                 /* reveal the raw bilinear video under the canvas */
      #abdiv { position: absolute; width: 2px; background: rgba(255,255,255,.9); z-index: 4; display: none;
        cursor: ew-resize; box-shadow: 0 0 10px rgba(0,0,0,.7); pointer-events: auto; }
      body.ab #abdiv { display: block; }
      #abdiv .grip { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 22px; height: 22px;
        border-radius: 50%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.6); }
      #abdiv::before { content: "HOLOGRAM"; position: absolute; top: 8px; right: 7px; font: 700 11px ui-monospace,monospace; color: #fff; text-shadow: 0 1px 3px #000; }
      #abdiv::after  { content: "raw";      position: absolute; top: 8px; left: 7px;  font: 700 11px ui-monospace,monospace; color: #fff; text-shadow: 0 1px 3px #000; }
      #hud { position: absolute; top: 10px; left: 10px; z-index: 6; display: none; pointer-events: none; white-space: pre;
        font: 600 11px/1.55 ui-monospace,"Cascadia Code",monospace; color: #7ee787; background: rgba(8,10,14,.8);
        border: 1px solid #30363d; border-radius: var(--holo-radius-sm, 8px); padding: 8px 11px; backdrop-filter: blur(6px); }
      body.hud #hud { display: block; }
    </style>

</head>
  <body data-no-teleport>

    <div id="bar">
      <span class="name">Holo Video</span>
      <span class="k" id="kaddr" title="content address" style="display:none">holo://local</span>
      <span class="ver" id="ver" title="Checked safe in your browser"></span>
      <span class="sp"></span>
      <span class="stat" id="res"></span>
      <button id="audioBtn" title="Mute / unmute">🔊</button>
      <button id="gearBtn" title="Settings" aria-label="Settings" onclick="var a=document.getElementById('adv');a.hidden=!a.hidden;this.classList.toggle('on',!a.hidden)">⚙</button>
      <span id="adv" hidden>
        <button id="qualBtn" title="Quality. Auto adapts to your connection; Max picks the highest">Quality: Auto</button>
        <button id="protoBtn" style="display:none">HLS</button>
        <button id="gpuBtn" title="Improve the picture">Enhance</button>
        <button id="srBtn" title="Sharpen to your screen's full detail">Sharpen</button>
      </span>
      <span class="dot" id="dot" style="display:none">●</span>
      <span class="tag" id="state" style="display:none">idle</span>
      <button id="fsBtn" title="Fullscreen (f)">⛶</button>
    </div>
    <div id="stage">
      <!-- video.js upgrades this <video>. playsinline = no iOS takeover; the engine
           hands 4K to the platform's hardware decoder. -->
      <video id="player" class="video-js vjs-default-skin vjs-big-play-centered"
             playsinline controls preload="auto"></video>
      <canvas id="gpu" aria-hidden="true"></canvas>
      <div id="overlay"><div id="panel">
        <div class="spin" id="pspin"></div>
        <div class="ttl" id="ptitle">Holo Video</div>
        <div class="sub" id="pstatus">loading engine…</div>
      </div></div>
    </div>
    <div id="toast"></div>

    <!-- The pinned native video engine (video.js 8 UMD global `videojs`). -->
    <script src="./videojs/video.min.js" data-holo-shared="videojs/video.min.js"></script>
    <!-- Hologram OS WebGPU present layer: zero-copy importExternalTexture + an O(1)
         content-addressed LUT grade. Returns null where WebGPU is absent → plain video. -->
    <script src="../../_shared/holo-gpu.js" data-holo-shared="holo-gpu.js"></script>
    <!-- Share affordance + content-address provenance (#k=) + Law-L5 re-derivation. -->
    <script src="../../_shared/teleport.js" data-holo-shared="teleport.js" defer></script>
    <script type="module">
      const $ = (id) => document.getElementById(id);
      const params = new URLSearchParams(location.search);
      const bool = (v, d) => (v == null ? d : v !== "0" && v !== "false");

      let toastT;
      const toast = (m) => { const el = $("toast"); el.textContent = m; el.classList.add("show");
        clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 1800); };
      const setState = (t, cls) => { $("state").textContent = t; $("dot").className = "dot" + (cls ? " " + cls : ""); };
      const showOverlay = (ttl, sub, err) => { const o = $("overlay"); o.classList.remove("hidden");
        $("ptitle").textContent = ttl; $("pstatus").textContent = sub; $("panel").classList.toggle("err", !!err); };
      const hideOverlay = () => $("overlay").classList.add("hidden");
      const extType = (u) => /\.m3u8(\?|$)/i.test(u) ? "application/x-mpegURL"
        : /\.mpd(\?|$)/i.test(u) ? "application/dash+xml"
        : /\.webm(\?|$)/i.test(u) ? "video/webm" : "video/mp4";

      // ── what to play ─────────────────────────────────────────────────────────
      // Interop contract (so ANY holospace can hand this player a video):
      //   ?src=<url|holo://κ/path>   the resolvable media (HLS/DASH/MP4/WebM)
      //   ?k=/?id=/?addr=/?v=<κ>     the content address to DISPLAY + VERIFY (Law L5)
      //   ?type= ?poster= ?autoplay= ?muted= ?loop= ?live=
      // No params → the bundled CMAF ladder (one content-addressed fMP4 segment set
      // served as BOTH HLS and DASH; ?proto=dash plays the SAME segments via the MPD).
      const kparam = params.get("k") || params.get("id") || params.get("addr") || params.get("v") || "";
      // Bundled CMAF: identical κ-segments, two open-standard manifests.
      const CMAF = { hls: { src: "video/cmaf/master.m3u8", key: "cmaf/master.m3u8" },
                     dash: { src: "video/cmaf/stream.mpd", key: "cmaf/stream.mpd" } };
      const DEFAULT = CMAF[params.get("proto") === "dash" ? "dash" : "hls"];
      let source = {
        src: params.get("src") || DEFAULT.src,
        type: params.get("type") || extType(params.get("src") || DEFAULT.src),
        kappa: kparam || "",
        key: params.get("src") ? "" : DEFAULT.key,
      };

      const showKaddr = (k) => { $("kaddr").textContent = k ? (k.startsWith("holo://") ? k : "holo://" + k) : "holo://local"; };

      // ── the engine ───────────────────────────────────────────────────────────
      // VHS tuned for fast start + adaptive quality up to the source maximum (4K/8K):
      //   enableLowInitialPlaylist  → start on the lowest rendition = first frame ASAP
      //   limitRenditionByPlayerDimensions / useDevicePixelRatio → never fetch more
      //     pixels than the device shows (efficiency), but allow up to native on 4K
      //   useNetworkInformationApi / useBandwidthFromLocalStorage → smarter ABR
      //   liveui + handlePartialData → Low-Latency HLS (partial segments) for live
      // SEAMLESS FALLBACK: video.js ships as a κ-pinned shared bundle (/.holo/sha256/…). If it isn't served
      // (a κ not in this host's pin set), `videojs` is undefined — instead of leaving a dead <video>, drive
      // the NATIVE <video> through a minimal videojs-shaped shim, so progressive media (mp4/webm/ogg) plays
      // anywhere with zero dependency. HLS/DASH (MSE) still want the real videojs; native HLS works on Safari.
      function nativePlayer(el) {
        el.controls = true; el.playsInline = true; el.setAttribute("playsinline", "");
        const p = {
          ready(cb) { Promise.resolve().then(cb); return p; },
          src(o) { const s = typeof o === "string" ? o : (o && o.src) || ""; if (s) el.src = s; },
          on(ev, cb) { el.addEventListener(ev, cb); }, one(ev, cb) { el.addEventListener(ev, cb, { once: true }); },
          off(ev, cb) { try { el.removeEventListener(ev, cb); } catch {} },
          play() { return el.play(); }, pause() { el.pause(); }, paused() { return el.paused; },
          muted(v) { if (v === undefined) return el.muted; el.muted = v; },
          volume(v) { if (v === undefined) return el.volume; el.volume = v; },
          loop(v) { if (v === undefined) return el.loop; el.loop = !!v; },
          poster(v) { if (v === undefined) return el.poster; if (v) el.poster = v; },
          currentTime(v) { if (v === undefined) return el.currentTime; el.currentTime = v; },
          duration() { return el.duration || 0; },
          crossOrigin(v) { if (v === undefined) return el.crossOrigin; if (v) el.crossOrigin = v; else el.removeAttribute("crossorigin"); },
          videoWidth() { return el.videoWidth; }, videoHeight() { return el.videoHeight; },
          error() { return el.error; },
          audioTracks() { return { length: 0, addEventListener() {}, on() {} }; },
          tech() { return { el() { return el; }, el_: el }; },
          requestFullscreen() { return el.requestFullscreen && el.requestFullscreen(); },
          exitFullscreen() { return document.exitFullscreen && document.exitFullscreen(); },
          isFullscreen() { return !!document.fullscreenElement; },
          el() { return el; }, dispose() {},
        };
        return p;
      }
      const VJS = typeof videojs === "function";
      // video.js/VHS is built for HLS/DASH; on a raw holo:// progressive webm/mp4 it can fail SRC_NOT_SUPPORTED
      // (MediaError code 4). Play a κ/holo:// progressive source through the native <video> shim directly — it's
      // reliable, and the WebGPU super-res present still drives the SAME <video> element. HLS/DASH + http(s) keep video.js.
      const initManifest = /m3u8|mpd|mpegurl|dash/i.test((source.src || "") + " " + (source.type || ""));
      const initHoloProgressive = /^holo:\/\//i.test(source.src || "") && !initManifest;
      const player = (VJS && !initHoloProgressive) ? videojs($("player"), {
        controls: true, preload: "auto", playsinline: true, fill: true, responsive: true,
        liveui: true,
        playbackRates: [0.5, 1, 1.25, 1.5, 2],
        html5: { vhs: {
          overrideNative: true,
          enableLowInitialPlaylist: true,
          limitRenditionByPlayerDimensions: true,
          useDevicePixelRatio: true,
          useNetworkInformationApi: true,
          useBandwidthFromLocalStorage: true,
          handlePartialData: true,
        }, nativeAudioTracks: false, nativeVideoTracks: false },
      }) : nativePlayer($("player"));
      if (!VJS) console.warn("Holo Video: video.js bundle unavailable — native <video> fallback (progressive plays; HLS/DASH need the engine).");
      else if (initHoloProgressive) console.warn("Holo Video: holo:// progressive source — using native <video> (bypass video.js/VHS).");
      window.player = player;   // witness / automation handle (repo idiom)

      // A single content-addressed object (mp4/webm) may be streamed through the holo-pull swarm:
      // deadline-ordered, per-block L5-verified κ-pieces, reassembled, then played. Opt-in via ?swarm=1
      // and only for a κ-addressed single object (HLS/DASH manifests already verify per-segment via the
      // holo:// engine, so they take the direct path). Fully non-breaking: no ?swarm → byte-identical.
      const isManifest = (s) => /m3u8|mpd|x-mpegURL|dash\+xml/i.test((s.type || "") + " " + (s.src || ""));
      // Autoplay policy: unmuted autoplay requires a user gesture. Rather than stall on a dead "press play"
      // when there is no gesture (opened programmatically, embedded, or a strict autoplay policy), fall back
      // to MUTED autoplay — which is always permitted — so the stream actually starts, and invite the viewer
      // to unmute. This is the standard streaming behaviour (YouTube/Netflix): a click carries a gesture →
      // plays with sound; no gesture → plays muted, one tap to unmute. The "playing" handler clears the overlay.
      function forceMutedPlay() {
        try {
          player.muted(true);
          player.play().then(() => toast("Playing. Tap 🔊 for sound"))
            .catch(() => { setState("paused", ""); hideOverlay(); });   // clean: the centred play affordance shows; tap anywhere to start
        } catch { setState("paused", ""); hideOverlay(); }
      }
      function tryAutoplay() {
        // First try as-is (with sound when a gesture is present). play() may REJECT (NotAllowedError) or, on
        // some policies, resolve while the element stays paused — handle BOTH: if still paused shortly after,
        // fall back to muted autoplay so the stream always starts.
        try { Promise.resolve(player.play()).catch(() => {}); } catch {}
        setTimeout(() => { try { if (player.paused && player.paused()) forceMutedPlay(); } catch { forceMutedPlay(); } }, 600);
      }
      // ── SponsorBlock: skip in-video sponsor segments (the ad class that lives IN the bytes) ──────
      // Projecting the raw stream removes PLATFORM ads by construction; this removes the creator's own
      // "this video is sponsored by…", self-promo, and like/subscribe nags — client-side auto-skip, fast
      // and progressive-compatible (no re-mux). YouTube /sc/vstream sources only; fail-soft throughout
      // (a missing module or a failed fetch never breaks playback). ?sponsorblock=0 disables.
      let _sb = null, _sbSegs = [], _sbTriedImport = false;
      async function sbLoad(src) {
        _sbSegs = [];
        if (!bool(params.get("sponsorblock"), true)) return;
        if (!_sbTriedImport) { _sbTriedImport = true; try { _sb = await import("../../usr/lib/holo/holo-sponsorblock.mjs"); } catch { _sb = null; } }
        if (!_sb) return;
        let vid = null; try { vid = _sb.videoIdFromVstream(src); } catch {}
        if (!vid) return;
        try { _sbSegs = await _sb.fetchSegments(vid, {}); } catch { _sbSegs = []; }
        if (_sbSegs.length) toast("ad-free · " + _sbSegs.length + " sponsor segment" + (_sbSegs.length > 1 ? "s" : "") + " auto-skipped");
      }
      function sbMaybeSkip() {
        if (!_sb || !_sbSegs.length) return;
        try { const t = player.currentTime(); const to = _sb.skipTarget(t, _sbSegs);
          if (to != null && to > t + 0.05) { player.currentTime(to); toast("⏭ skipped sponsor"); } } catch {}
      }

      function load(s, opts = {}) {
        source = { ...source, ...s };
        showKaddr(source.kappa);
        $("ver").textContent = ""; $("ver").className = "ver";
        if (!opts._noSwarm && bool(params.get("swarm"), false) && source.kappa && !isManifest(source)) { loadViaSwarm(source, opts); return; }
        // Cross-origin streams + the native host's COEP=credentialless (kappa_scheme.cc): credentialless ADMITS
        // a cross-origin <video src> WITHOUT credentials — so PROGRESSIVE media plays plain (no crossorigin).
        // But MSE (HLS/DASH via VHS) fetches segments as XHR and needs READABLE bytes → CORS, so a cross-origin
        // MANIFEST must be crossorigin=anonymous (an opaque no-cors response is useless to MSE). Hence: CORS for
        // cross-origin manifests, plain for everything else — correct under credentialless AND require-corp.
        try { player.crossOrigin((/^https?:\/\//i.test(source.src) && isManifest(source)) ? "anonymous" : null); } catch {}
        // Instant-start: a holo:// /sc/vstream source plays through MSE (appends the growing transcode) so the
        // first frame shows in ~1s instead of after the full download. Fail-open: any MSE error restores <video src>.
        player.src({ src: source.src, type: source.type });
        if (params.get("poster") || opts.poster) player.poster(params.get("poster") || opts.poster);
        player.muted(bool(params.get("muted"), false));     // SOUND ON BY DEFAULT (host allows unmuted autoplay); ?muted=1 to start muted
        player.loop(bool(params.get("loop"), false));
        setState("loading", "");
        showOverlay("", source.live ? "Going live…" : "Streaming…");
        if (bool(params.get("autoplay") ?? opts.autoplay, true)) tryAutoplay();
        verify();   // Law L5, in parallel
        maybeDeriveKappa();   // opt-in κ discovery for an unaddressed stream (native + size-capped + fail-open)
        sbLoad(source.src);   // fetch sponsor segments to auto-skip (YouTube /sc/vstream only), in parallel
      }

      // ── derive a κ for an UNADDRESSED stream (opt-in: ?kderive=1) so verified O(1) replay can cover it ──────
      // Safe by construction: NATIVE host only (the 2nd fetch hits the network-layer κ-cache → cheap, not a
      // re-download), SIZE-CAPPED (multi-GB movies are left to that host cache — never buffered here), runs in
      // the BACKGROUND, and is FULLY FAIL-OPEN (any error → no κ, playback untouched). It has no `want`, so it
      // can never trigger the L5 refuse path. On success it sets source.kappa + re-posts status; the parent
      // (Holo Player) then learns key→κ and the NEXT play is swarm-verified, O(1), offline.
      async function maybeDeriveKappa() {
        try {
          if (source.kappa || !bool(params.get("kderive"), false)) return;          // already addressed, or not asked
          if (isManifest(source) || !/^https?:\/\//i.test(source.src)) return;        // manifests verify per-segment already
          if (!(window.HoloNative || window.HoloCDP)) return;                         // native only (κ-cache makes the fetch free)
          const CAP = 512 * 1024 * 1024;                                              // 512 MB ceiling; bigger → host κ-cache's job
          const res = await fetch(source.src, { cache: "force-cache" }); if (!res.ok) return;
          if (+(res.headers.get("content-length") || 0) > CAP) return;
          const buf = new Uint8Array(await res.arrayBuffer()); if (buf.byteLength > CAP) return;
          const k = window.HoloTeleport ? await HoloTeleport.kappaOf(buf) : await sha256(buf);
          if (k && !source.kappa) { source.kappa = k; showKaddr(k); postStatus(player.paused?.() ? "paused" : "playing"); }
        } catch {}
      }

      // ── Law L5: the played bytes re-derive to their pinned κ ───────────────────
      // For bundled content we know the pin (video-manifest.json); re-derive the
      // top-level object and show ✓. Each HLS SEGMENT is additionally verified by the
      // holo:// engine at resolve time (path→κ→bytes), so the whole stream is covered.
      async function verify() {
        try {
          let want = source.kappa;
          if (!want && source.key) {
            const man = await (await fetch("video/video-manifest.json", { cache: "no-store" })).json();

        div.addEventListener("pointermove", (e) => { if (!dragging) return; const r = cv.getBoundingClientRect(); if (r.width) { abFrac = Math.max(0.05, Math.min(0.95, (e.clientX - r.left) / r.width)); placeAB(); } });
        const endDrag = (e) => { dragging = false; try { div.releasePointerCapture(e.pointerId); } catch (_) {} };
        div.addEventListener("pointerup", endDrag); div.addEventListener("pointercancel", endDrag);
        window.addEventListener("resize", () => { if (abOn) placeAB(); });
        const dq = () => { try { const v = techVideo(); const q = v.getVideoPlaybackQuality ? v.getVideoPlaybackQuality() : {}; return (q.droppedVideoFrames || 0) + "/" + (q.totalVideoFrames || 0); } catch (e) { return "-"; } };
        const gate = () => { try { if (localStorage.getItem("holo.sr.bad")) return "BAD (blocklisted)"; if (localStorage.getItem("holo.sr.laggy")) return "laggy (sr eased)"; if (localStorage.getItem("holo.sr.ok")) return "ok"; return "untested"; } catch (e) { return "-"; } };
        function updateHUD() {
          if (!hudOn) return;
          const g = (window.holoVideo && window.holoVideo.gpu) || null;
          if (!g) { hud.textContent = "HOLO VIDEO · dev (F8)\nGPU: not attached, standard video"; return; }
          const ss = g.srcSize || [0, 0], ts = g.target || [0, 0];
          const up = ss[0] > 0 ? (ts[0] / ss[0]).toFixed(2) : "-";
          hud.textContent =
            "HOLO VIDEO · dev (F8)\n" +
            "fps " + g.winFps + "  scale " + g.scale + "  drop " + dq() + "\n" +
            "src " + ss[0] + "x" + ss[1] + " -> out " + ts[0] + "x" + ts[1] + "  (" + up + "x)\n" +
            "SR " + (g.sr ? "lanczos" : "off") + "  mode " + (window.holoVideo ? window.holoVideo.gpuMode : "?") + "\n" +
            "gpu " + ((g.adapter && (g.adapter.description || g.adapter.vendor)) || "?") + "\n" +
            "gate " + gate();
        }
        setInterval(updateHUD, 500);
        function toggleHUD() { hudOn = !hudOn; document.body.classList.toggle("hud", hudOn); updateHUD(); toast(hudOn ? "HUD on" : "HUD off"); }

          if (e.key === "\\" || e.code === "Backslash") { e.preventDefault(); toggleAB(); }
          else if (e.key === "F8") { e.preventDefault(); toggleHUD(); }
        });
        // automation/parent seam (the YouTube app can forward keys / drive these)
        window.holoVideoDev = { toggleAB, toggleHUD, setSplit: (f) => { abFrac = Math.max(0.05, Math.min(0.95, +f || 0.5)); if (abOn) placeAB(); }, get ab() { return abOn; }, get hud() { return hudOn; } };
      })();

      // ── boot ───────────────────────────────────────────────────────────────────
      // ── DASH-direct: INSTANT start, no transcode ────────────────────────────────────────────────────────
      // ?dash=<watch url> → fetch /sc/dash for the SEPARATE VP9 video + Opus audio URLs, stream each through the
      // same-origin /sc/proxy into two MSE SourceBuffers (the standard path — proven to play on this engine).
      // First frame ~1s (header + first cluster), length-independent (only fetch what plays; ~30s read-ahead).
      // Fail-open: any error falls back to the /sc/vstream complete-file path (the ?src= we were also given).
      let _dashStop = null;
      function holoDashPlay(watchUrl, h, onFail) {
        const el = $("player");
        const VM = 'video/webm; codecs="vp9"', AM = 'audio/webm; codecs="opus"';
        let failed = false; const fail = (why) => { if (failed) return; failed = true; console.warn("Holo Video: dash →", why, "→ /sc/vstream"); try { if (_dashStop) _dashStop(); } catch {} if (onFail) onFail(); };
        if (!("MediaSource" in window) || !MediaSource.isTypeSupported(VM) || !MediaSource.isTypeSupported(AM)) { fail("no-mse"); return; }
        showOverlay("Holo Video", "starting…");
        const _t0 = performance.now(); window.__dash = { resolveMs: 0, firstByteMs: 0, firstFrameMs: 0 };
        el.addEventListener("loadeddata", () => { if (!window.__dash.firstFrameMs) window.__dash.firstFrameMs = Math.round(performance.now() - _t0); }, { once: true });
        (async () => {
          let j;
          try { const r = await fetch(`holo://os/sc/dash?url=${encodeURIComponent(watchUrl)}&h=${h}`, { cache: "no-store" }); j = await r.json(); } catch (e) { return fail("resolve:" + e); }
          window.__dash.resolveMs = Math.round(performance.now() - _t0);
          if (!j || !j.video || !j.audio) return fail("no-streams");
          let aborted = false; _dashStop = () => { aborted = true; };
          const ms = new MediaSource(); el.src = URL.createObjectURL(ms);
          let vsb, asb;
          try { await new Promise((res, rej) => { ms.addEventListener("sourceopen", res, { once: true }); setTimeout(() => rej(new Error("sourceopen-timeout")), 6000); }); } catch (e) { return fail(String(e)); }
          try { URL.revokeObjectURL(el.src); vsb = ms.addSourceBuffer(VM); asb = ms.addSourceBuffer(AM); vsb.mode = "sequence"; asb.mode = "sequence"; } catch (e) { return fail("addSB:" + e); }
          const proxy = (u, mime) => `holo://os/sc/proxy?u=${encodeURIComponent(u)}&mime=${encodeURIComponent(mime)}`;
          const sleep = (ms2) => new Promise((r) => setTimeout(r, ms2));
          const appendBuf = (sb, chunk) => new Promise((res, rej) => {
            const done = () => { sb.removeEventListener("updateend", done); sb.removeEventListener("error", err); res(); };
            const err = () => { sb.removeEventListener("updateend", done); sb.removeEventListener("error", err); rej(new Error("sbErr")); };
            sb.addEventListener("updateend", done); sb.addEventListener("error", err);
            try { sb.appendBuffer(chunk); }
            catch (e) { sb.removeEventListener("updateend", done); sb.removeEventListener("error", err);
              if (e && e.name === "QuotaExceededError") { try { const c = el.currentTime; if (sb.buffered.length && c > 12) sb.remove(0, c - 8); } catch {}
                sb.addEventListener("updateend", function r2() { sb.removeEventListener("updateend", r2); try { sb.appendBuffer(chunk); sb.addEventListener("updateend", done, { once: true }); sb.addEventListener("error", err, { once: true }); } catch (e2) { rej(e2); } }, { once: true });
              } else rej(e); }
          });
          const ahead = (sb) => { try { return sb.buffered.length ? sb.buffered.end(sb.buffered.length - 1) - el.currentTime : 0; } catch { return 0; } };
          async function pump(sb, url, mime, isVideo) {
            const resp = await fetch(proxy(url, mime), { cache: "no-store" });
            if (!resp.ok || !resp.body) throw new Error("proxy:" + resp.status);
            const reader = resp.body.getReader();
            for (;;) {
              while (!aborted && ahead(sb) > 30) await sleep(200);     // read-ahead cap → length-independent memory
              if (aborted) { try { reader.cancel(); } catch {} return; }
              const { done, value } = await reader.read();
              if (done) return;
              if (value && value.length) { if (isVideo && !window.__dash.firstByteMs) window.__dash.firstByteMs = Math.round(performance.now() - _t0); await appendBuf(sb, value); }
            }
          }
          Promise.all([pump(vsb, j.video, "video/webm", true), pump(asb, j.audio, "audio/webm", false)])
            .then(() => { try { if (ms.readyState === "open") ms.endOfStream(); } catch {} })
            .catch((e) => fail("pump:" + e));
          el.muted = bool(params.get("muted"), false);
          try { Promise.resolve(el.play()).catch(() => { el.muted = true; el.play().catch(() => {}); }); } catch {}
          el.addEventListener("playing", hideOverlay, { once: true });
        })();
      }

      player.ready(() => {
        const dash = params.get("dash");
        if (dash) {
          holoDashPlay(decodeURIComponent(dash), +params.get("h") || 1080, () => load(source, { autoplay: bool(params.get("autoplay"), true) }));
        } else {
          load(source, { autoplay: bool(params.get("autoplay"), true) });
        }
        initGpu();
        try { parent !== window && parent.postMessage({ type: "holo-video-ready" }, "*"); } catch {}
      });
    </script>
