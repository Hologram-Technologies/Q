<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Your Space — HOLOGRAM</title>
  <meta name="description" content="A whole world in one link. Tap to step inside — then make it yours in one tap. No signup, no app, no server." />
  <meta property="og:title" content="Your Space — HOLOGRAM" />
  <meta property="og:description" content="A whole world in one link. Step inside, then make it yours in one tap." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <style>
    /* ── YOUR SPACE — familiar profile skin (MAYA), radical substrate underneath. ─────────
       One column, mobile-first, zero framework: first paint is pure CSS + the pre-paint
       script below (boot-ground pattern — the wallpaper and name land BEFORE the module). */
    :root {
      color-scheme: dark;
      --accent: #7c6cf0;
      --ink: #eceaf4; --dim: rgba(236,234,244,.62); --faint: rgba(236,234,244,.38);
      --card: rgba(16,13,26,.58); --line: rgba(255,255,255,.11);
      --r: 10px; --rl: 16px; --pill: 999px;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; margin: 0; }
    body { color: var(--ink); font: 1rem/1.55 var(--sans); background: #060410; overflow-x: hidden; }

    /* ── wallpaper: full-bleed, mood-keyed pure-CSS presets (fast, zero assets) ─────────── */
    #wall { position: fixed; inset: 0; z-index: 0; background: #060410 center/cover no-repeat; transition: opacity .8s ease; opacity: 0; }
    #wall.on { opacity: 1; }
    #wall::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(4,2,10,.25) 0%, rgba(4,2,10,.55) 68%, rgba(4,2,10,.82) 100%); }
    .wp-cosmic    { background-image: radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.9) 50%, transparent 51%), radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,.7) 50%, transparent 51%), radial-gradient(1.5px 1.5px at 62% 70%, rgba(255,255,255,.8) 50%, transparent 51%), radial-gradient(1px 1px at 30% 82%, rgba(255,255,255,.6) 50%, transparent 51%), radial-gradient(1px 1px at 88% 52%, rgba(255,255,255,.75) 50%, transparent 51%), radial-gradient(ellipse 90% 60% at 50% 30%, #241a4d 0%, #120c28 55%, #05030d 100%) !important; }
    .wp-vaporwave { background-image: linear-gradient(160deg, #ff71ce22 0%, transparent 40%), linear-gradient(200deg, #01cdfe22 10%, transparent 55%), linear-gradient(180deg, #2b1055 0%, #7597de44 140%), linear-gradient(180deg, #1a0b33 0%, #0d0619 100%) !important; }
    .wp-cozy      { background-image: radial-gradient(ellipse 100% 80% at 50% 20%, #4a2e1a 0%, #2a1810 55%, #120a06 100%) !important; }
    .wp-neon      { background-image: radial-gradient(ellipse 60% 40% at 20% 30%, #16f7a422 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 80% 70%, #f716c922 0%, transparent 70%), linear-gradient(#07060d, #07060d) !important; }
    .wp-noir      { background-image: radial-gradient(ellipse 120% 90% at 50% 0%, #1c1c20 0%, #0c0c0e 60%, #050506 100%) !important; }
    .wp-sunset    { background-image: linear-gradient(180deg, #3d1635 0%, #7a2b3d 40%, #c96f3f66 78%, #1a0d18 100%) !important; }
    .wp-forest    { background-image: radial-gradient(ellipse 110% 80% at 50% 10%, #14351f 0%, #0a1f12 55%, #04100a 100%) !important; }
    .wp-ocean     { background-image: radial-gradient(ellipse 110% 80% at 50% 100%, #0a3a4a 0%, #072433 55%, #030d16 100%) !important; }
    .wp-chaos     { background-image: conic-gradient(from 210deg at 50% 40%, #2b1055, #4a1a3d, #1a3a4a, #3d2b10, #2b1055) !important; }

    /* ── the page: one centred column, a profile everyone already knows how to read ─────── */
    #page { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: max(4.5vh, 2rem) 1.1rem 7.5rem; animation: rise .5s cubic-bezier(.2,.8,.2,1); }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    /* via-lineage credit — the road back up the fork chain */
    #via { display: none; align-items: center; gap: .4rem; font-size: .82rem; color: var(--faint); margin-bottom: 1rem; }
    #via.on { display: inline-flex; } #via a { color: var(--dim); cursor: pointer; text-decoration: none; border-bottom: 1px dotted var(--faint); }

    /* head: avatar · name · bio · mood + κ */
    #avatar { width: 104px; height: 104px; border-radius: 28%; display: grid; place-items: center; font-size: 3.2rem; user-select: none;
      background: color-mix(in srgb, var(--accent) 20%, rgba(255,255,255,.04)); border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line));
      box-shadow: 0 8px 40px -8px color-mix(in srgb, var(--accent) 55%, transparent); overflow: hidden; }
    #avatar img { width: 100%; height: 100%; object-fit: cover; }
    #name { font-size: 2rem; font-weight: 800; letter-spacing: -.02em; margin: 1rem 0 .1rem; min-height: 1.2em; outline: none; }
    #bio { color: var(--dim); margin: 0 0 .8rem; white-space: pre-wrap; outline: none; }
    #name:empty::before, #bio:empty::before { content: attr(data-ph); color: var(--faint); }
    .chips { display: flex; flex-wrap: wrap; gap: .45rem; align-items: center; }
    .chip { display: inline-flex; align-items: center; gap: .4rem; font-size: .8rem; padding: .28rem .7rem; border-radius: var(--pill);
      border: 1px solid var(--line); color: var(--dim); background: var(--card); backdrop-filter: blur(8px); }
    #kap { font-family: var(--mono); cursor: pointer; max-width: 15ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #kap.ok { color: #34d399; border-color: #34d39966; }

    /* sections read like the page everyone grew up on: song, top friends, wall */
    .sec { margin-top: 1.6rem; }
    .sec h2 { font-size: .78rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--faint); margin: 0 0 .6rem; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--rl); backdrop-filter: blur(12px); }

    /* the profile song — MySpace's most-loved feature, reborn as a κ-findable track */
    #song { display: none; align-items: center; gap: .8rem; padding: .7rem .8rem; cursor: pointer; }
    #song.on { display: flex; }
    #songart { width: 52px; height: 52px; border-radius: var(--r); background: color-mix(in srgb, var(--accent) 25%, #111) center/cover; display: grid; place-items: center; font-size: 1.4rem; flex: none; }
    #songmeta { min-width: 0; flex: 1; } #songmeta b { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #songmeta span { font-size: .84rem; color: var(--dim); }
    #songbtn { width: 44px; height: 44px; flex: none; border-radius: 50%; border: 0; cursor: pointer; font-size: 1.05rem; color: #fff;
      background: var(--accent); display: grid; place-items: center; box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 60%, transparent); animation: pulse 2.4s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 45%, transparent); } 70% { box-shadow: 0 0 0 14px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
    #song.playing #songbtn { animation: none; }

    /* Top 8 — doors into other worlds */
    #top { display: none; grid-template-columns: repeat(4, 1fr); gap: .55rem; }
    #top.on { display: grid; }
    .door { display: flex; flex-direction: column; align-items: center; gap: .35rem; padding: .7rem .3rem .55rem; text-align: center; cursor: pointer;
      background: var(--card); border: 1px solid var(--line); border-radius: var(--rl); backdrop-filter: blur(8px); position: relative;
      transition: transform .15s cubic-bezier(.2,.8,.2,1), border-color .15s; }
    .door:hover { transform: translateY(-2px); border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); }
    .door .face { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; font-size: 1.25rem; font-weight: 700;
      background: color-mix(in srgb, var(--accent) 18%, rgba(255,255,255,.05)); border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line)); }
    .door small { font-size: .72rem; color: var(--dim); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .door .rm { display: none; position: absolute; top: -7px; right: -7px; width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--line);
      background: #1c1626; color: var(--dim); font-size: .8rem; line-height: 1; cursor: pointer; place-items: center; }
    body.edit .door .rm { display: grid; }
    .door.add { border-style: dashed; color: var(--faint); display: none; }
    body.edit .door.add { display: flex; }

    #wallbtn { display: none; width: 100%; padding: .8rem; text-align: center; cursor: pointer; color: var(--ink); font-weight: 600; }
    #wallbtn.on { display: block; }

    /* ── the sticky CTA — the whole viral loop is these two buttons ──────────────────────── */
    #cta { position: fixed; z-index: 5; left: 0; right: 0; bottom: 0; padding: .8rem 1.1rem calc(.8rem + env(safe-area-inset-bottom));
      display: flex; gap: .6rem; justify-content: center; background: linear-gradient(transparent, rgba(4,2,10,.88) 40%); }
    .btn { flex: 1; max-width: 270px; padding: .85rem 1.1rem; font: 600 1rem var(--sans); border-radius: 14px; border: 1px solid var(--line);
      color: var(--ink); background: rgba(22,17,34,.85); backdrop-filter: blur(12px); cursor: pointer; transition: transform .12s, filter .12s; }
    .btn:active { transform: scale(.97); }
    .btn.go { background: var(--accent); border-color: transparent; color: #fff; box-shadow: 0 6px 30px -6px color-mix(in srgb, var(--accent) 70%, transparent); }
    .btn.go:hover { filter: brightness(1.08); }

    /* ── EDIT — Playground law: every element is editable directly, in place ─────────────── */
    body.edit [data-edit] { outline: 1.5px dashed color-mix(in srgb, var(--accent) 55%, transparent); outline-offset: 4px; border-radius: 6px; cursor: text; }
    body.edit #avatar, body.edit .door.add, body.edit #songpick { cursor: pointer; }
    .row { display: none; flex-wrap: wrap; gap: .45rem; margin-top: .7rem; }
    body.edit .row { display: flex; }
    .sw { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .sw.on { border-color: #fff; }
    .mood { font-size: .8rem; padding: .3rem .75rem; border-radius: var(--pill); border: 1px solid var(--line); background: var(--card); color: var(--dim); cursor: pointer; }
    .mood.on { color: #fff; background: color-mix(in srgb, var(--accent) 45%, transparent); border-color: transparent; }
    #picker { display: none; position: fixed; z-index: 9; left: 50%; bottom: 90px; transform: translateX(-50%); width: min(92vw, 380px);
      padding: .8rem; border-radius: var(--rl); background: #171126; border: 1px solid var(--line); box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    #picker.on { display: block; }
    #picker .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: .3rem; }
    #picker .grid button { font-size: 1.35rem; padding: .3rem 0; background: none; border: 0; border-radius: 8px; cursor: pointer; }
    #picker .grid button:hover { background: rgba(255,255,255,.08); }
    #picker input, #srch input, #doorform input { width: 100%; margin-top: .55rem; padding: .6rem .7rem; font: inherit; color: var(--ink);
      background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: var(--r); outline: none; }
    #srch { display: none; padding: .8rem; } body.edit #srch { display: block; }
    #srch .res { display: flex; align-items: center; gap: .6rem; padding: .45rem .3rem; cursor: pointer; border-radius: var(--r); }
    #srch .res:hover { background: rgba(255,255,255,.06); }
    #srch .res img { width: 38px; height: 38px; border-radius: 8px; }
    #srch .res small { color: var(--dim); }
    #doorform { display: none; padding: .8rem; } #doorform.on { display: block; }

    /* toast + hint */
    #toast { position: fixed; z-index: 10; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none;
      background: #171126; border: 1px solid var(--line); color: var(--ink); padding: .6rem 1rem; border-radius: var(--pill); font-size: .9rem;
      transition: all .25s; max-width: 88vw; text-align: center; }
    #toast.on { opacity: 1; transform: translateX(-50%); }
    #hint { display: none; margin: 0 0 1.2rem; padding: .7rem .9rem; font-size: .9rem; border-radius: var(--rl);
      background: color-mix(in srgb, var(--accent) 14%, rgba(10,7,20,.6)); border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--line)); }
    #hint.on { display: block; }
    footer { position: relative; z-index: 1; text-align: center; padding: 0 1rem 8.5rem; color: var(--faint); font-size: .78rem; }
    footer a { color: var(--dim); cursor: pointer; text-decoration: none; border-bottom: 1px dotted var(--faint); }
    @media (min-width: 700px) { #page { padding-top: 9vh; } }
  </style>
</head>
<body>
  <div id="wall"></div>
  <main id="page">
    <div id="hint"></div>
    <span id="via">forked via <a id="vialink"></a></span>
    <div id="avatar" data-edit-tap>🪐</div>
    <h1 id="name" data-ph="Name your space"></h1>
    <p id="bio" data-ph="Say something. This is your corner of the universe."></p>
    <div class="chips">
      <span class="chip" id="moodchip" style="display:none"></span>
      <span class="chip" id="kap" title="This space's content address — tap to verify + copy">κ…</span>
    </div>
    <div class="row" id="accents"></div>
    <div class="row" id="moods"></div>

    <section class="sec" id="songsec">
      <h2>Profile song</h2>
      <div class="card" id="song">
        <div id="songart">♪</div>
        <div id="songmeta"><b id="songt"></b><span id="songa"></span></div>
        <button id="songbtn" aria-label="Play">▶</button>
      </div>
      <div class="card" id="srch">
        <input id="srchin" placeholder="Search any song — this plays when someone enters" autocomplete="off" />
        <div id="srchres"></div>
      </div>
    </section>

    <section class="sec">
      <h2 id="toph">Top 8</h2>
      <div id="top"></div>
      <div class="card" id="doorform">
        <input id="doorlink" placeholder="Paste a friend's space link (or any link)" autocomplete="off" />
        <input id="doorname" placeholder="Name this door" autocomplete="off" />
        <div class="row" style="display:flex;margin-top:.6rem"><button class="btn go" id="dooradd" style="max-width:none">Add door</button></div>
      </div>
    </section>

    <section class="sec">
      <div class="card"><div id="wallbtn">💬 Leave a note on my wall</div></div>
    </section>
  </main>
  <footer>
    your space is one link — no account, no app, no server · <a id="newspace">start a blank space</a><br/>
    <span style="opacity:.7">HOLOGRAM · the κ re-derives from the link itself</span>
  </footer>

  <div id="cta"></div>
  <div id="picker"><div class="grid" id="emojis"></div><input id="avurl" placeholder="…or paste an image URL" autocomplete="off" /></div>
  <div id="toast"></div>
  <audio id="audio"></audio>

  <script>
    /* pre-paint (boot-ground): land wallpaper + name from the link BEFORE the module loads,
       so the teleport chorus is identical and instant on every click. Decode only — no hash,
       no trust decisions here; the module re-derives κ and owns all behaviour. */
    (function () {
      try {
        var m = location.hash.match(/#p=v2\.([A-Za-z0-9_-]+)/);
        var p = m ? JSON.parse(atob(m[1].replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(m[1].length / 4) * 4, "="))) : null;
        if (p && p.kind === "profile") {
          if (p.accent) document.documentElement.style.setProperty("--accent", p.accent);
          var w = document.getElementById("wall"), wp = String(p.wallpaper || "");
          if (/^https:\/\//.test(wp)) w.style.backgroundImage = "url('" + wp.replace(/'/g, "%27") + "')";
          else w.className = "wp-" + ((wp.match(/^preset:(\w+)/) || [])[1] || p.mood || "cosmic");
          document.getElementById("name").textContent = p.name || "";
        } else { document.getElementById("wall").className = "wp-cosmic"; }
      } catch (e) { document.getElementById("wall").className = "wp-cosmic"; }
      requestAnimationFrame(function () { document.getElementById("wall").classList.add("on"); });
    })();
  </script>

  <script type="module">
    import * as YS from "./holo-yourspace.mjs";

    /* ── Q's Space — the Tom Anderson seed: everyone's first friend, everyone's first fork ── */
    const OS_HOME = "https://hologram-technologies.github.io/Q";
    const SEED = YS.identity({
      name: "Q", bio: "I live inside HOLOGRAM — a whole operating system that unfolds from one link.\nThis page is my space. Make yours in one tap. I'll be your first friend.",
      avatar: "🪐", accent: "#7c6cf0", mood: "cosmic", wallpaper: "preset:cosmic",
      song: { title: "Space Oddity", artist: "David Bowie", query: "david bowie space oddity", art: "", preview: "" },
      top: [{ name: "Q", link: OS_HOME }, { name: "HOLOGRAM", link: "https://hologram-technologies.github.io/" }],
      wall: "", via: null,
    });

    const $ = (id) => document.getElementById(id);
    const ME_KEY = "holo-yourspace.me.v2";
    const ACCENTS = ["#7c6cf0", "#2dd4bf", "#f472b6", "#f59e0b", "#22c55e", "#38bdf8", "#ef4444", "#e2e8f0"];
    const EMOJIS = ["🙂","😎","🛰️","🪐","🌸","🔥","🌊","🌙","⚡","🎧","🎮","🐉","🦋","🌵","👾","✨"];
    let doc = null, mode = "view", myLink = "", curLink = "", curKappa = "";

    const me = () => { try { return JSON.parse(localStorage.getItem(ME_KEY)); } catch (e) { return null; } };
    const saveMe = (d, l) => localStorage.setItem(ME_KEY, JSON.stringify({ payload: YS.encode(d), link: l }));
    const toast = (msg, ms = 2600) => { const t = $("toast"); t.textContent = msg; t.classList.add("on"); clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("on"), ms); };

    /* ── boot: the hash IS the state. no hash → my space, or Q's seed for a cold stranger. ── */
    function boot() {
      const payload = YS.parseLink(location.hash);
      if (payload) { const p = YS.decode(payload); if (p) return show(p, "view"); }
      const m = me();
      if (m && m.payload) { const p = YS.decode(m.payload); if (p) { history.replaceState(null, "", "#p=v2." + m.payload); return show(p, "view"); } }
      history.replaceState(null, "", location.pathname + location.search);
      show(SEED, "view", true);
    }
    addEventListener("hashchange", boot);   // doors between spaces teleport in place — no reload

    /* ── render — one function, view and edit are the same page (Playground law) ─────────── */
    async function show(p, m, isSeed = false) {
      doc = YS.identity(p); mode = m;
      curLink = location.hash.includes("#p=v2.") ? location.origin + location.pathname + "#p=v2." + YS.encode(doc) : "";
      document.body.classList.toggle("edit", mode === "edit");
      document.documentElement.style.setProperty("--accent", doc.accent || "#7c6cf0");

      // wallpaper (κ | https | preset | mood default) — pre-paint already landed it on cold load
      const w = $("wall"); const wp = doc.wallpaper; const kx = YS.hexOf(wp);
      w.style.backgroundImage = ""; w.className = "on";
      if (kx) w.style.backgroundImage = `url('/.holo/blake3/${kx}')`;
      else if (/^https:\/\//.test(wp)) w.style.backgroundImage = `url('${wp.replace(/'/g, "%27")}')`;
      else w.classList.add("wp-" + ((wp.match(/^preset:(\w+)/) || [])[1] || doc.mood || "cosmic"));

      // head
      $("avatar").innerHTML = /^https:\/\//.test(doc.avatar) ? `<img src="${doc.avatar}" alt="">` : (doc.avatar || (mode === "edit" ? "＋" : "🪐"));
      $("name").textContent = doc.name; $("bio").textContent = doc.bio;
      $("name").contentEditable = $("bio").contentEditable = mode === "edit" ? "plaintext-only" : "false";
      $("name").toggleAttribute("data-edit", mode === "edit"); $("bio").toggleAttribute("data-edit", mode === "edit");
      $("moodchip").style.display = doc.mood ? "" : "none"; $("moodchip").textContent = "· " + doc.mood + " ·";
      $("via").classList.toggle("on", !!doc.via);
      if (doc.via) { $("vialink").textContent = doc.via.name || "κ·" + doc.via.k.slice(0, 8); $("vialink").onclick = () => history.back(); }

      // κ badge — re-derives live; tap = verify + copy (the trust signature)
      $("kap").textContent = "κ…";
      try { curKappa = await YS.kappa(doc); $("kap").textContent = "κ·" + YS.hexOf(curKappa).slice(0, 10); } catch (e) { $("kap").textContent = "κ offline"; }

      // song
      const s = doc.song; $("song").classList.toggle("on", !!s);
      if (s) { $("songt").textContent = s.title; $("songa").textContent = s.artist;
        $("songart").style.backgroundImage = s.art ? `url('${s.art}')` : ""; $("songart").textContent = s.art ? "" : "♪"; }

      // top doors
      const top = $("top"); top.innerHTML = ""; top.classList.toggle("on", doc.top.length > 0 || mode === "edit");
      $("toph").textContent = doc.top.length ? `Top ${Math.min(doc.top.length, 8)}` : "Top 8";
      doc.top.forEach((d, i) => {
        const el = document.createElement("div"); el.className = "door";
        const isSpace = !!YS.parseLink(d.link);
        el.innerHTML = `<div class="face">${isSpace ? "🌐" : (d.name || "•")[0].toUpperCase()}</div><small>${d.name || "door"}</small><button class="rm" aria-label="remove">×</button>`;
        el.onclick = (ev) => { if (ev.target.className === "rm") return commit(YS.removeDoor(doc, i));
          if (isSpace || d.link.startsWith(location.origin)) location.assign(d.link); else window.open(d.link, "_blank", "noopener"); };
        top.appendChild(el);
      });
      const add = document.createElement("div"); add.className = "door add"; add.innerHTML = `<div class="face">＋</div><small>add door</small>`;
      add.onclick = () => $("doorform").classList.toggle("on"); top.appendChild(add);

      // wall
      $("wallbtn").classList.toggle("on", !!doc.wall);
      $("wallbtn").onclick = () => doc.wall && window.open(doc.wall, "_blank", "noopener");

      // hint (the seed sells the fork; a fresh fork sells the share)
      const hint = $("hint"); hint.classList.toggle("on", isSeed);
      if (isSeed) hint.innerHTML = "👋 This is <b>Q's space</b> — a whole world living in one link. <b>Make it yours in one tap</b> ↓";

      // CTA — the loop: visitor → [Make It Mine · Share] · owner → [Edit · Share] · edit → [Done]
      const owner = !!(me() && me().payload === YS.encode(doc));
      const cta = $("cta"); cta.innerHTML = "";
      const btn = (label, cls, fn) => { const b = document.createElement("button"); b.className = "btn " + cls; b.textContent = label; b.onclick = fn; cta.appendChild(b); };
      if (mode === "edit") btn("Done — mint my link", "go", finish);
      else if (owner) { btn("Edit my space", "", () => show(doc, "edit")); btn("Share", "go", share); }
      else { btn("✨ Make It Mine", "go", makeItMine); btn("Share", "", share); }

      renderEditRows();
    }

    /* ── the viral gesture ────────────────────────────────────────────────────────────────── */
    async function makeItMine() {
      let mine;
      try { mine = await YS.fork(doc, curLink || location.href); }
      catch (e) { mine = YS.withFields(doc, { name: "", bio: "", avatar: "", wall: "", via: { k: "", name: doc.name } }); }
      toast("It's yours. Decorate, then mint your link ✨");
      show(mine, "edit");
    }

    function commit(next) { doc = next; show(doc, mode); }   // every edit re-renders from the doc — the doc IS the page

    async function finish() {
      // pull the two contenteditables, mint, save, land on MY link, open the share sheet
      doc = YS.withFields(doc, { name: $("name").textContent.trim(), bio: $("bio").textContent.trim() });
      const payload = YS.encode(doc);
      myLink = location.origin + location.pathname + "#p=v2." + payload;
      saveMe(doc, myLink);
      history.replaceState(null, "", "#p=v2." + payload);
      await show(doc, "view");
      toast("Minted. This link IS your space — post it anywhere.");
      share();
    }

    async function share() {
      const url = location.href;
      const title = (doc.name ? doc.name + "'s" : "my") + " space";
      try { if (navigator.share) return await navigator.share({ title, text: "step into " + title, url }); } catch (e) { if (e.name === "AbortError") return; }
      try { await navigator.clipboard.writeText(url); toast("Link copied — drop it in any chat 💫"); }
      catch (e) { prompt("Copy your space link:", url); }
    }

    /* ── edit affordances: accents · moods · avatar · song search · doors ─────────────────── */
    function renderEditRows() {
      const ac = $("accents"); ac.innerHTML = "";
      ACCENTS.forEach((c) => { const b = document.createElement("button"); b.className = "sw" + (doc.accent === c ? " on" : "");
        b.style.background = c; b.onclick = () => commit(YS.withFields(grab(), { accent: c })); ac.appendChild(b); });
      const md = $("moods"); md.innerHTML = "";
      YS.MOODS.forEach((m) => { const b = document.createElement("button"); b.className = "mood" + (doc.mood === m ? " on" : ""); b.textContent = m;
        b.onclick = () => commit(YS.withFields(grab(), { mood: m, wallpaper: (!doc.wallpaper || doc.wallpaper.startsWith("preset:")) ? "preset:" + m : doc.wallpaper })); md.appendChild(b); });
    }
    const grab = () => YS.withFields(doc, { name: $("name").textContent.trim(), bio: $("bio").textContent.trim() });   // keep in-flight typing across re-renders

    $("avatar").onclick = () => { if (mode !== "edit") return; const p = $("picker"); p.classList.toggle("on");
      const g = $("emojis"); if (!g.childElementCount) EMOJIS.forEach((e) => { const b = document.createElement("button"); b.textContent = e;
        b.onclick = () => { p.classList.remove("on"); commit(YS.withFields(grab(), { avatar: e })); }; g.appendChild(b); }); };
    $("avurl").onchange = () => { $("picker").classList.remove("on"); commit(YS.withFields(grab(), { avatar: $("avurl").value.trim() })); };

    // song search — client-direct iTunes (existing holo-imusic pattern), zero servers of ours
    let srchT = null;
    $("srchin").oninput = () => { clearTimeout(srchT); srchT = setTimeout(async () => {
      const q = $("srchin").value.trim(); const box = $("srchres"); if (!q) { box.innerHTML = ""; return; }
      try {
        const r = await fetch(`https://itunes.apple.com/search?media=music&limit=5&term=${encodeURIComponent(q)}`);
        const js = await r.json(); box.innerHTML = "";
        (js.results || []).forEach((t) => { const d = document.createElement("div"); d.className = "res";
          d.innerHTML = `<img src="${t.artworkUrl100 || ""}" alt=""><div><b>${t.trackName}</b><br/><small>${t.artistName}</small></div>`;
          d.onclick = () => { commit(YS.withFields(grab(), { song: { title: t.trackName, artist: t.artistName, art: t.artworkUrl100 || "", query: `${t.artistName} ${t.trackName}`, preview: t.previewUrl || "" } })); toast("Song set 🎧"); };
          box.appendChild(d); });
      } catch (e) { box.innerHTML = `<small style="color:var(--dim)">search unreachable — paste on again later</small>`; }
    }, 350); };

    $("dooradd").onclick = () => { const l = $("doorlink").value.trim(), n = $("doorname").value.trim();
      if (!l) return toast("Paste a link first");
      commit(YS.addDoor(grab(), { name: n || "door", link: l })); $("doorlink").value = $("doorname").value = ""; $("doorform").classList.remove("on"); };

    /* ── the song plays: in-OS full track via the holo-music-ctl bus, else the 30s preview ── */
    $("song").onclick = async (ev) => {
      if (ev.target.id === "songbtn" || ev.currentTarget.contains(ev.target)) {
        const s = doc.song; if (!s) return;
        const el = $("song"), a = $("audio");
        if (el.classList.contains("playing")) { a.pause(); el.classList.remove("playing"); $("songbtn").textContent = "▶"; try { busCmd("pause"); } catch (e) {} return; }
        if (await busCmd("play", [s.query || `${s.artist} ${s.title}`])) { el.classList.add("playing"); $("songbtn").textContent = "❚❚"; toast("Playing in Holo Music 🎶"); return; }
        let src = s.preview;
        if (!src && (s.query || s.title)) { try {
          const r = await fetch(`https://itunes.apple.com/search?media=music&limit=1&term=${encodeURIComponent(s.query || s.artist + " " + s.title)}`);
          src = ((await r.json()).results || [])[0]?.previewUrl || ""; } catch (e) {} }
        if (!src) return toast("Song not reachable right now");
        a.src = src; try { await a.play(); el.classList.add("playing"); $("songbtn").textContent = "❚❚"; } catch (e) { toast("Tap again to play"); }
        a.onended = () => { el.classList.remove("playing"); $("songbtn").textContent = "▶"; };
      }
    };
    function busCmd(cmd, args = []) {   // same-origin Holo Music tab answers in ≤800ms, else fall through
      return new Promise((res) => { let done = false;
        try { const ch = new BroadcastChannel("holo-music-ctl"); const id = Math.random().toString(36).slice(2);
          ch.onmessage = (e) => { if (e.data && e.data.re === id) { done = true; ch.close(); res(!!e.data.ok); } };
          ch.postMessage({ id, cmd, args }); setTimeout(() => { if (!done) { ch.close(); res(false); } }, 800);
        } catch (e) { res(false); } });
    }

    /* κ badge: tap → re-derive (L5) + copy. Green flash = the page you see IS the κ you share. */
    $("kap").onclick = async () => { try {
      const ok = await YS.verify(doc, curKappa);
      $("kap").classList.toggle("ok", ok); setTimeout(() => $("kap").classList.remove("ok"), 1600);
      await navigator.clipboard.writeText(curKappa); toast(ok ? "re-derived ✓ · κ copied" : "κ MISMATCH — refused");
    } catch (e) { toast("κ unavailable here"); } };

    $("newspace").onclick = () => show(YS.identity({ mood: "cosmic", wallpaper: "preset:cosmic", accent: "#7c6cf0" }), "edit");
    document.addEventListener("click", (e) => { if (!$("picker").contains(e.target) && e.target !== $("avatar")) $("picker").classList.remove("on"); });

    boot();
  </script>
</body>
</html>
