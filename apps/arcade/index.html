<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Holo Arcade</title>
<!--
  Holo Arcade — the serverless games floor. A curated set of freely-redistributable Game Boy
  homebrew (gbdev Homebrew Hub) that PLAYS INSTANTLY on the static /Q site with zero infra:
  ROMs are same-origin, the emulator + WebGPU projector run on-device (play.html), the console
  skin materializes on tap. No server, no proxy, no account. Grows by dropping ROMs + arcade.json.
-->
<style>
  :root { color-scheme: dark; --bg:#07080b; --panel:#0f1218; --line:#1a1e26; --text:#e8ecf4;
    --muted:#8b93a7; --accent:#6c8cff; --gb:#9bbc0f; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:
    radial-gradient(120% 80% at 50% -10%, #14171f 0%, #0a0c10 55%, var(--bg) 100%);
    color:var(--text); font:15px/1.5 Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased; }
  header { display:flex; align-items:center; gap:14px; padding:26px clamp(18px,4vw,52px) 8px; }
  .mark { width:34px; height:34px; border-radius:9px; background:linear-gradient(140deg,var(--accent),#9bbcff);
    display:grid; place-items:center; font-size:19px; box-shadow:0 6px 18px #6c8cff44; }
  h1 { font-size:clamp(22px,3vw,30px); font-weight:750; letter-spacing:-.02em; margin:0; }
  .sub { color:var(--muted); font-size:13.5px; margin:2px 0 0; }
  #grid { display:grid; gap:20px 16px; padding:22px clamp(18px,4vw,52px) 60px;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }
  .tile { cursor:pointer; border:0; background:none; padding:0; text-align:left; outline:none; font:inherit; color:inherit; }
  .box { position:relative; aspect-ratio:.72; border-radius:13px; overflow:hidden;
    background:linear-gradient(158deg,#232a1c,#12160d); border:1px solid var(--line);
    display:grid; place-items:center; box-shadow:0 16px 34px -16px #000c;
    transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s, border-color .2s; }
  .box .dot { width:56%; aspect-ratio:1; border-radius:14px; background:
    radial-gradient(120% 120% at 30% 20%, #b6d84a, var(--gb) 60%, #7a9c0c);
    box-shadow:inset 0 2px 6px #ffffff55, inset 0 -4px 10px #00000055, 0 4px 10px #0006;
    display:grid; place-items:center; font-weight:800; font-size:26px; color:#2b3a0a; }
  .tile:hover .box, .tile:focus-visible .box { transform:translateY(-5px) scale(1.05);
    border-color:var(--accent); box-shadow:0 26px 46px -16px #000e, 0 0 0 2px var(--accent); }
  .nm { margin-top:9px; font-weight:650; font-size:13.5px; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .dev { color:var(--muted); font-size:11.5px; margin-top:2px; }
  .badge { display:inline-block; margin-left:8px; padding:3px 9px; border-radius:999px; font-size:11px;
    font-weight:600; color:#bcd35a; background:#9bbc0f1c; border:1px solid #9bbc0f33; vertical-align:middle; }
  /* full-bleed play overlay — the console materializes over the arcade */
  #stage { position:fixed; inset:0; z-index:50; display:none; background:#000; }
  #stage.on { display:block; }
  #stage iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  #stage .x { position:absolute; top:16px; right:20px; z-index:2; width:40px; height:40px; border-radius:50%;
    border:1px solid #ffffff22; background:#000000aa; color:#fff; font-size:16px; cursor:pointer;
    opacity:0; transition:opacity .25s; }
  #stage:hover .x, #stage .x:focus-visible { opacity:1; }
  footer { color:var(--muted); font-size:12px; padding:0 clamp(18px,4vw,52px) 40px; }
  footer a { color:var(--accent); text-decoration:none; }
</style>

<header>
  <div class="mark">🎮</div>
  <div>
    <h1>Holo Arcade <span class="badge">plays instantly</span></h1>
    <p class="sub">Freely-shared Game Boy homebrew — running on your device, no server, no account.</p>
  </div>
</header>
<div id="grid"></div>
<footer>Every game is free to share (gbdev Homebrew Hub). It runs on-device via WebGPU — Hologram never hosts a game server. <a href="https://hh.gbdev.io" target="_blank" rel="noopener">Source</a></footer>

<div id="stage"><iframe allow="autoplay; fullscreen; gamepad"></iframe><button class="x" title="Back (Esc)">✕</button></div>

<script type="module">
  const grid = document.getElementById("grid");
  const stage = document.getElementById("stage");
  const frame = stage.querySelector("iframe");
  const closeStage = () => { stage.classList.remove("on"); frame.src = "about:blank"; };
  stage.querySelector(".x").onclick = closeStage;
  addEventListener("keydown", (e) => { if (e.key === "Escape" && stage.classList.contains("on")) { e.preventDefault(); closeStage(); } });

  const play = (g) => {
    frame.src = "play.html?rom=" + encodeURIComponent(g.rom) + "&sys=" + encodeURIComponent(g.sys || "Nintendo - Game Boy") + "&title=" + encodeURIComponent(g.title);
    stage.classList.add("on");
  };

  try {
    const { games } = await (await fetch("./arcade.json")).json();
    for (const g of games) {
      const b = document.createElement("button"); b.className = "tile";
      const initial = (g.title || "?").replace(/[^A-Za-z0-9]/, "").charAt(0).toUpperCase() || "▸";
      b.innerHTML = `<div class="box"><div class="dot">${initial}</div></div><div class="nm"></div><div class="dev"></div>`;
      b.querySelector(".nm").textContent = g.title;
      b.querySelector(".dev").textContent = g.developer || "homebrew";
      b.onclick = () => play(g);
      grid.appendChild(b);
    }
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--muted)">Arcade catalog unavailable.</p>';
  }
</script>
