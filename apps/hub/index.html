<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1">
<title>Holo Hub</title><link rel=icon href=hologram.svg><style>
/* ── golden-ratio system: Fibonacci spacing (5 8 13 21 34 55 89) + φ type scale (13 → 21 → 34) ── */
:root{color-scheme:dark;
  --s1:5px;--s2:8px;--s3:13px;--s4:21px;--s5:34px;--s6:55px;--s7:89px;
  --bg:#0a0d14;--panel:#10141d;--panel2:#141926;--line:#1b2130;--line2:#28304a;
  --tx:#e2e8f5;--tx2:#98a2bc;--tx3:#5b6479;
  --blue:#7aa5f8;--green:#41ba83;--gold:#e8c66a;--red:#f38ba8}
*{box-sizing:border-box}
body{margin:0;font:13px/1.618 "Segoe UI Variable Text","Segoe UI",ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-optical-sizing:auto}
.nm,.hname,.htitle,.bt,button{font-family:"Segoe UI Variable Display","Segoe UI Variable Text","Segoe UI",ui-sans-serif,system-ui,sans-serif}
.foot,.hstats,#count,.kv,.pub{font-variant-numeric:tabular-nums}
a{color:var(--blue)} .hint{color:var(--tx3);font-size:13px} .mut{color:var(--tx3)}
::selection{background:#7aa5f855}
header{position:sticky;top:0;z-index:5;height:var(--s6);padding:0 var(--s5);border-bottom:1px solid var(--line);background:#0a0d14e8;backdrop-filter:blur(13px);display:flex;gap:var(--s4);align-items:center}
.brand{display:flex;gap:var(--s3);align-items:center;cursor:pointer;flex:0 0 auto}
.hlogo{position:relative;width:var(--s5);height:var(--s5);border-radius:var(--s2);display:flex;align-items:center;justify-content:center;
  background:#0d1119;border:1px solid #28304a;overflow:hidden;box-shadow:0 0 21px #7a8df626}
.hlogo img{width:26px;height:26px;display:block}
.hlogo::after{content:'';position:absolute;inset:-40%;background:linear-gradient(115deg,transparent 43%,#ffffff2b 50%,transparent 57%);
  transform:translateX(-100%);animation:sheen 5.5s ease-in-out infinite}
@keyframes sheen{0%,62%{transform:translateX(-100%)}88%,100%{transform:translateX(100%)}}
.bt{font-weight:700;font-size:16px;letter-spacing:.1px}
#count{color:var(--tx3);font-size:13px;white-space:nowrap}
#count::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:7px;
  box-shadow:0 0 0 0 #41ba8366;animation:pulse 2.6s ease-out infinite;vertical-align:1px}
@keyframes pulse{0%{box-shadow:0 0 0 0 #41ba8366}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}
input{background:var(--panel);border:1px solid var(--line2);color:var(--tx);border-radius:var(--s3);padding:var(--s2) var(--s3);font:inherit;outline:none;transition:border-color .15s}
input:focus{border-color:var(--blue)}
#search{flex:1;max-width:610px;height:var(--s5);padding:0 var(--s4);font-size:13px}
#image{width:233px} #cmd{width:190px} #port{width:76px}
button{background:var(--blue);color:#0a0d14;border:0;border-radius:var(--s3);padding:var(--s2) var(--s4);font:inherit;font-weight:700;cursor:pointer;transition:filter .15s}
button:hover{filter:brightness(1.1)}
button.ghost{background:var(--panel2);color:var(--tx)}
button.big{padding:var(--s3) var(--s5);font-size:16px;border-radius:var(--s3)}
button:disabled{opacity:.5;cursor:default}
select{background:var(--panel);border:1px solid var(--line2);color:var(--tx2);border-radius:var(--s3);padding:var(--s2) var(--s3);font:inherit;height:var(--s5);outline:none}
#status{color:var(--green)} #status.err{color:var(--red)}
/* category rail */
.tabswrap{position:relative;padding:var(--s4) var(--s5) 0;flex:0 0 auto}
.tabs{display:flex;gap:var(--s2);overflow-x:auto;scrollbar-width:none;scroll-behavior:smooth}
.tabs::-webkit-scrollbar{display:none}
.tabswrap::before,.tabswrap::after{content:'';position:absolute;top:var(--s4);bottom:0;width:var(--s6);pointer-events:none;opacity:0;transition:opacity .2s;z-index:1}
.tabswrap::before{left:var(--s5);background:linear-gradient(90deg,var(--bg),transparent)}
.tabswrap::after{right:var(--s5);background:linear-gradient(270deg,var(--bg),transparent)}
.tabswrap.l::before{opacity:1} .tabswrap.r::after{opacity:1}
.tnav{position:absolute;top:var(--s4);z-index:2;width:29px;height:29px;padding:0;border-radius:50%;display:none;align-items:center;justify-content:center;
  background:var(--panel2);color:var(--tx2);border:1px solid var(--line2);font-size:15px;line-height:1}
.tnav:hover{color:var(--tx);border-color:var(--blue)}
#tprev{left:calc(var(--s5) - 13px)} #tnext{right:calc(var(--s5) - 13px)}
.tabswrap.l #tprev{display:flex} .tabswrap.r #tnext{display:flex}
.tab{flex:0 0 auto;background:transparent;border:1px solid var(--line2);color:var(--tx2);border-radius:21px;padding:var(--s1) var(--s3);font-size:13px;cursor:pointer;transition:.15s;user-select:none}
.tab:hover{color:var(--tx);border-color:var(--blue)}
.tab.on{background:var(--blue);border-color:var(--blue);color:#0a0d14;font-weight:700}
/* index grid */
#browse{display:flex;flex-direction:column;height:calc(100vh - 55px)}
.gridwrap{overflow-y:auto;padding:var(--s4) var(--s5) var(--s6);flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:var(--s4);max-width:1597px;margin:0 auto}
/* spotlight */
#hero{max-width:1597px;margin:0 auto var(--s4);position:relative;border-radius:var(--s4);overflow:hidden;border:1px solid var(--line);background:var(--panel);cursor:pointer;display:none}
#hero.on{display:block}
.hbg{position:absolute;inset:-34px;background-size:cover;background-position:center;filter:blur(89px) saturate(1.5);opacity:.30;transition:background-image .5s}
.hgrad{position:absolute;inset:0;background:linear-gradient(100deg,#0a0d14d9 34%,transparent 89%)}
.hinner{position:relative;display:flex;gap:var(--s5);align-items:center;padding:var(--s5);min-height:144px;transition:opacity .3s}
.hinner.swap{opacity:0}
.hic2{width:var(--s7);height:var(--s7);flex:0 0 auto;background:#fff;border-radius:var(--s4);padding:var(--s3);display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden;box-shadow:0 21px 55px #0008}
.hic2 img{width:100%;height:100%;object-fit:contain}
.hkicker{font-size:11px;font-weight:800;letter-spacing:1.6px;color:var(--tx3);text-transform:uppercase;margin-bottom:var(--s1)}
.hname{font-size:34px;font-weight:750;line-height:1.15;letter-spacing:-.5px}
.hdesc{color:var(--tx2);font-size:14px;max-width:610px;margin-top:var(--s1);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hstats{display:flex;gap:var(--s4);color:var(--tx2);font-size:13px;margin-top:var(--s2)}
.hstats span{display:flex;gap:var(--s1);align-items:center}
.hdots{position:absolute;right:var(--s4);bottom:var(--s3);display:flex;gap:var(--s2)}
.hdot{width:8px;height:8px;border-radius:50%;background:#ffffff2b;transition:.2s}
.hdot.on{background:#fff;box-shadow:0 0 8px #fff8}
/* holographic cards */
.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--s3);padding:var(--s4);cursor:pointer;
  display:flex;flex-direction:column;gap:var(--s3);transition:border-color .2s,box-shadow .2s,transform .12s;transform:perspective(800px)}
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;transition:opacity .25s;
  background:radial-gradient(233px circle at var(--mx,50%) var(--my,0%),#ffffff12,transparent 62%)}
.card:hover{border-color:color-mix(in srgb,var(--tint,#7aa5f8) 50%,var(--line2));
  box-shadow:0 13px 34px #000a,0 0 34px color-mix(in srgb,var(--tint,#7aa5f8) 13%,transparent)}
.card:hover::before{opacity:1}
.chead{display:flex;gap:var(--s3);align-items:center;min-width:0}
.ic{width:var(--s6);height:var(--s6);flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:var(--s3);padding:var(--s2);font-size:26px;overflow:hidden}
.ic img{width:100%;height:100%;object-fit:contain}
.meta{min-width:0;display:flex;flex-direction:column;gap:2px}
.nm{font-weight:650;font-size:15px;letter-spacing:-.1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx)}
.pub{display:flex;gap:var(--s1);align-items:center;font-size:13px;white-space:nowrap;overflow:hidden}
.pub svg{flex:0 0 auto}
.pub.off{color:var(--green)} .pub.ver{color:var(--blue)} .pub.comm{color:var(--tx3)}
.tierb{display:inline-flex;gap:4px;align-items:center;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;border:1px solid;white-space:nowrap;width:fit-content;margin-top:3px}
.srcg{display:inline-flex;gap:2px;align-items:center;font-size:12px;letter-spacing:1px} .srcg b{font-weight:800}
.why{color:var(--tx2);font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:39px}
.foot{display:flex;gap:var(--s4);color:var(--tx3);font-size:13px;margin-top:auto;align-items:center}
.foot span{display:flex;gap:var(--s1);align-items:center}
.foot svg{opacity:.7}
.sk{background:linear-gradient(100deg,var(--panel) 40%,var(--panel2) 50%,var(--panel) 60%);background-size:200% 100%;animation:shm 1.1s infinite linear;border-radius:var(--s2)}
@keyframes shm{to{background-position:-200% 0}}
#sentinel{height:1px}
/* image page */
#detail{display:none;padding:var(--s5);overflow:auto;height:calc(100vh - 55px);position:relative}
#detail.on{display:block}
.dback{position:fixed;left:0;right:0;top:55px;bottom:0;background-size:cover;background-position:center;filter:blur(89px) saturate(1.4);opacity:.21;pointer-events:none}
.dwrap{max-width:987px;margin:0 auto;position:relative}
.hero{display:flex;gap:var(--s4);align-items:center;flex-wrap:wrap}
.hic{width:var(--s7);height:var(--s7);flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:var(--s4);padding:var(--s3);font-size:44px;overflow:hidden}
.hic img{width:100%;height:100%;object-fit:contain}
.htitle{font-size:34px;font-weight:750;line-height:1.2;letter-spacing:-.5px;display:flex;gap:var(--s3);align-items:center;flex-wrap:wrap}
.hwhy{font-size:16px;color:var(--tx2);margin-top:var(--s1);max-width:610px}
.cols{display:grid;grid-template-columns:1.618fr 1fr;gap:var(--s4);margin-top:var(--s5)}
@media(max-width:760px){.cols{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--s3);padding:var(--s4)}
.panel h3{margin:0 0 var(--s3);font-size:13px;color:var(--blue);text-transform:uppercase;letter-spacing:.5px}
.panel p{margin:0 0 var(--s3);color:var(--tx2);font-size:13px;line-height:1.618}
.kv{display:grid;grid-template-columns:auto 1fr;gap:var(--s2) var(--s4);font-size:13px}
.kv .k{color:var(--tx3)} .kv .v{color:var(--tx);text-align:right;word-break:break-word}
.cmd{margin-top:var(--s3);background:var(--bg);border:1px solid var(--line);border-radius:var(--s2);padding:var(--s2) var(--s3);font-family:ui-monospace,monospace;font-size:13px;color:var(--green);display:flex;justify-content:space-between;gap:var(--s2);align-items:center}
/* portal */
#portal{display:none;grid-template-rows:auto 1fr;height:calc(100vh - 55px)}
#portal.on{display:grid}
.toolbar{display:flex;gap:var(--s3);align-items:center;flex-wrap:wrap;padding:var(--s3) var(--s5);border-bottom:1px solid var(--line)}
main{display:grid;grid-template-columns:1.618fr 1fr;min-height:0}
#frame{border:0;width:100%;height:100%;background:#fff}
.logwrap{display:flex;flex-direction:column;border-left:1px solid var(--line);min-width:0}
.logbar{display:flex;gap:var(--s2);align-items:center;padding:var(--s2) var(--s3);border-bottom:1px solid var(--line);font-size:13px;color:var(--tx3)}
#log{margin:0;padding:var(--s2) var(--s3);flex:1;overflow:auto;white-space:pre-wrap;word-break:break-word;color:var(--tx2);font-family:ui-monospace,monospace;font-size:11.5px}
#log .t{color:var(--tx3)} #log .e{color:var(--red)} #log .k{color:var(--green)} #log .p{color:var(--gold)}
.copied{color:var(--green)}
html,body{overflow:hidden;height:100%}
.gridwrap::-webkit-scrollbar,#detail::-webkit-scrollbar,#log::-webkit-scrollbar{width:10px}
.gridwrap::-webkit-scrollbar-thumb,#detail::-webkit-scrollbar-thumb,#log::-webkit-scrollbar-thumb{background:#232a3d;border-radius:8px;border:3px solid var(--bg)}
.gridwrap::-webkit-scrollbar-track,#detail::-webkit-scrollbar-track,#log::-webkit-scrollbar-track{background:transparent}
@media(max-width:960px){#count{display:none}}
@media(max-width:760px){#sort{display:none}.bt{display:none}header{padding:0 var(--s4)}.tabswrap{padding:var(--s3) var(--s4) 0}
  .tabswrap::before{left:var(--s4)}.tabswrap::after{right:var(--s4)}#tprev{left:calc(var(--s4) - 13px)}#tnext{right:calc(var(--s4) - 13px)}
  .gridwrap{padding:var(--s3) var(--s4) var(--s6)}#detail{padding:var(--s4)}main{grid-template-columns:1fr}.logwrap{display:none}}
@media(max-width:640px){.hic2{display:none}.hname{font-size:21px}.hinner{gap:var(--s4);padding:var(--s4)}.hinner button{display:none}}
</style></head><body>
<header>
  <span class=brand id=home><span class=hlogo><img src=hologram.svg alt=Hologram></span><span class=bt>Holo Hub</span></span>
  <button class=ghost id=back style="display:none">←</button>
  <input id=search placeholder="Search Docker Hub…">
  <select id=sort><option value=pull_count>Most pulled</option><option value=updated_at>Recently updated</option></select>
  <span id=count></span>
</header>
<div id=browse><div class=tabswrap id=tabswrap><button class=tnav id=tprev>‹</button><div class=tabs id=tabs></div><button class=tnav id=tnext>›</button></div>
  <div class=gridwrap><div id=hero></div><div class=grid id=grid></div><div id=sentinel></div></div></div>
<div id=detail></div>
<div id=portal>
  <div class=toolbar><input id=image placeholder="any image, e.g. nginx:alpine"><input id=port placeholder=port><input id=cmd placeholder="command (optional)">
    <button id=runbtn>Stream</button><span id=status>idle</span></div>
  <main><iframe id=frame title="the live app"></iframe>
    <div class=logwrap><div class=logbar><span>runtime log</span>
      <button class=ghost id=copy style="margin-left:auto">Copy</button><button class=ghost id=clear>Clear</button></div><div id=log></div></div>
  </main>
</div>
<script type=module>
import { blake3hex } from './holo-blake3.mjs';
const $=s=>document.querySelector(s), statusEl=$('#status'), logEl=$('#log'), frame=$('#frame'), runBtn=$('#runbtn');
// canonical JSON (byte-identical to adapt.mjs) → the unified κ re-derives here (L5 verify-before-render).
const jcs=v=>Array.isArray(v)?'['+v.map(jcs).join(',')+']':(v&&typeof v==='object')?'{'+Object.keys(v).sort().map(k=>JSON.stringify(k)+':'+jcs(v[k])).join(',')+'}':JSON.stringify(v);
const setStatus=(s,err=false)=>{statusEl.textContent=s;statusEl.className=err?'err':''};
const esc=s=>String(s||'').replace(/</g,'&lt;');
const fmtN=n=>n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(0)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':(n||'0');
function ago(iso){ if(!iso)return ''; const s=(Date.now()-new Date(iso))/1000; const u=[[31536000,'yr'],[2592000,'mo'],[86400,'d'],[3600,'h'],[60,'m']]; for(const[sec,l]of u){ if(s>=sec)return Math.floor(s/sec)+l+' ago'; } return 'just now'; }
const I={
 clock:'<svg width=13 height=13 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round><circle cx=12 cy=12 r=9></circle><path d="M12 7v5l3 3"></path></svg>',
 dl:'<svg width=13 height=13 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round><path d="M12 4v11m0 0l-4-4m4 4l4-4M4 20h16"></path></svg>',
 star:'<svg width=13 height=13 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linejoin=round><path d="M12 3.5l2.6 5.4 5.9.8-4.3 4.1 1 5.9-5.2-2.8-5.2 2.8 1-5.9L3.5 9.7l5.9-.8z"></path></svg>',
 rosette:'<svg width=14 height=14 viewBox="0 0 24 24"><circle cx=12 cy=12 r=10 fill=currentColor opacity=.18></circle><path d="M7.5 12.5l3 3 6-7" stroke=currentColor stroke-width=2.2 fill=none stroke-linecap=round stroke-linejoin=round></path></svg>',
 check:'<svg width=14 height=14 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2.2 stroke-linecap=round stroke-linejoin=round><path d="M5 13l4 4L19 7"></path></svg>'};
function show(v){ ['browse','detail','portal'].forEach(x=>$('#'+x).classList.toggle('on', x===v)); $('#browse').style.display=v==='browse'?'':'none'; $('#back').style.display=v==='browse'?'none':''; }
$('#home').onclick=()=>show('browse');
$('#back').onclick=()=>{ if($('#portal').classList.contains('on') && curApp) detail(curApp); else show('browse'); };

// ── the baked snapshot: fresh Docker Hub index with original artwork inlined. 100% serverless —
// the whole index ships in this app, zero network, no CORS, no proxy. A scheduled Action re-bakes it.
let CAT=null, curCat='', curKind='', curQ='', curApp=null, epoch=0, view=[], SHOWN=0, VERIFIED=false;
const SIZE=28;
async function boot(){
  try{ CAT=await (await fetch('catalog.json',{cache:'force-cache'})).json(); }
  catch(e){ $('#grid').innerHTML='<div class=hint style="padding:21px">could not load the index: '+esc(e)+'</div>'; return; }
  // κ-verify the unified catalog before render (L5) — every source shard is Merkle-committed by this κ.
  try{ if(CAT.kappa){ const kinds={}; (CAT.kinds||[]).forEach(k=>kinds[k.kind]=k);
    const re='did:holo:blake3:'+blake3hex(new TextEncoder().encode(jcs({built:CAT.baked_at,kinds,images:CAT.images})));
    VERIFIED = re===CAT.kappa; if(!VERIFIED) console.warn('unified κ mismatch',re,CAT.kappa); } }catch(e){ console.warn('verify skipped',e); }
  CAT.__verified=VERIFIED; window.__CAT=CAT; window.__openDetail=(a)=>detail(a); window.__dbg={get VERIFIED(){return VERIFIED}};   // witness hooks
  loadCats(); refresh();
}
const SRCG={ dockerhub:'🐳', docker:'🐳', github:'⚡', 'github-repo':'⚡', producthunt:'🚀', hackernews:'🔥', reddit:'👽' };
const TIERM={ S:{i:'⚡',l:'Stream now',c:'#41ba83'}, B:{i:'🧊',l:'Bake-once',c:'#e8c66a'}, K:{i:'🅺',l:'κ-native',c:'#7aa5f8'}, V:{i:'↗',l:'View',c:'#5b6479'} };
function hostOf(u){ try{ return new URL(u).host.replace(/^www\./,''); }catch{ return ''; } }
// tier badge (web entries carry a.tier; docker/repo run via their own door and show none)
function tierBadge(a){ const t=TIERM[a.tier]; if(!t) return ''; const via=(a.tier==='S'&&a.framable===false)?' · via browser':'';
  return '<span class=tierb style="color:'+t.c+';border-color:'+t.c+'55;background:'+t.c+'19">'+t.i+' '+t.l+via+'</span>'; }
// source glyphs — the L7 "many spellings, one app" tell; buzz>1 = trending across sources
function srcGlyphs(a){ const s=a.sources||[]; if(!s.length) return ''; const g=s.map(x=>SRCG[x.src]||'•').join('');
  return '<span class=srcg title="'+esc(s.map(x=>x.src).join(' · '))+'">'+g+(a.buzz>1?' <b style="color:var(--gold)">×'+a.buzz+'</b>':'')+'</span>'; }
function pubLine(a){ if(a.official) return '<div class="pub off">'+I.rosette+'Docker Official Image</div>';
  if(a.verified) return '<div class="pub ver">'+I.check+'Verified Publisher</div>';
  if(a.site) return '<div class="pub comm">'+esc(hostOf(a.site))+'</div>';
  return '<div class="pub comm">'+esc(String(a.id||'').replace(/^[a-z]+:/,'').split('/')[0])+'</div>'; }
function logoEl(a){ if(!a.art) return '📦'; return '<img src="'+a.art+'" alt="">'; }
function loadCats(){ const el=$('#tabs'); el.innerHTML='';
  const mkCat=(label,slug)=>{ const b=document.createElement('span'); b.className='tab'+(slug===curCat?' on':''); b.textContent=label;
    b.onclick=()=>{ curCat=slug; loadCats(); refresh(); b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'}); }; el.appendChild(b); };
  // KIND facet leads the rail — one delightful surface, filterable by where an app RUNS (its runtime door).
  const mkKind=(label,kind)=>{ const b=document.createElement('span'); b.className='tab kind'+(kind===curKind?' on':''); b.textContent=label;
    b.onclick=()=>{ curKind=kind; loadCats(); refresh(); b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'}); }; el.appendChild(b); };
  mkKind('All',''); (CAT.kinds||[]).forEach(k=>mkKind(k.icon+' '+k.label+' '+k.count.toLocaleString(),k.kind));
  const sep=document.createElement('span'); sep.style.cssText='flex:0 0 auto;width:1px;align-self:center;height:21px;background:var(--line2);margin:0 4px'; el.appendChild(sep);
  mkCat('All','',true); (CAT.categories||[]).forEach(c=>mkCat(c.name,c.slug)); railFades(); }
function railFades(){ const tb=$('#tabs'), tw=$('#tabswrap'); const max=tb.scrollWidth-tb.clientWidth;

// client-side resolve over the baked set: instant, no network.
function query(){ const catName=(CAT.categories.find(c=>c.slug===curCat)||{}).name;
  let list=CAT.images.filter(a=>(!curKind||a.kind===curKind)&&(!curCat||(a.cats||[]).includes(catName))&&(!curQ||(a.name+' '+a.why+' '+a.id).toLowerCase().includes(curQ.toLowerCase())));
  const sort=$('#sort').value;

  else { const rank=new Map(CAT.top_ids.map((id,i)=>[id,i])); list.sort((a,b)=>((b.buzz||1)-(a.buzz||1))||((rank.has(a.id)?rank.get(a.id):1e9)-(rank.has(b.id)?rank.get(b.id):1e9))||(b.stars-a.stars)); }
  return list; }
function mineTint(img,el,a){ try{ const cv=document.createElement('canvas'); cv.width=cv.height=8;
  const cx=cv.getContext('2d',{willReadFrequently:true}); cx.drawImage(img,0,0,8,8);
  const d=cx.getImageData(0,0,8,8).data; let r=0,g=0,b=0,n=0;
  for(let i=0;i<d.length;i+=4){ if(d[i+3]<64) continue; const R=d[i],G=d[i+1],B=d[i+2]; if(Math.min(R,G,B)>225) continue; r+=R;g+=G;b+=B;n++; }
  if(n<4) return; const m=(r+g+b)/(3*n), boost=v=>Math.max(0,Math.min(255,Math.round(m+(v/n-m)*1.3)));
  a.tint='rgb('+boost(r)+','+boost(g)+','+boost(b)+')'; el.style.setProperty('--tint',a.tint); }catch(_){}}
function hookTint(c,a){ const im=c.querySelector('.ic img'); if(!im) return;
  if(a.tint){ c.style.setProperty('--tint',a.tint); return; }

function card(a){ const c=document.createElement('div'); c.className='card';

// runtime doors — every entry streams in the holospace runtime as a κ-addressable object, dispatched by kind:
//   docker  → holo-run prepares the image into the κ fabric → resumes in-tab (κ container pack)
//   repo    → the animate ladder compiles/boots the repo → a κ .holo, runs in-tab
const RUNTIME_NOTE={ stream:'Opens live in this tab on the holospaces runtime — no install, no account, no server. The image is prepared into the κ fabric and resumed in-browser; every κ-object is verified before use.',
  animate:'Compiles the original source in this tab and runs it live — sealed as a κ .holo, verified before render. No install, no account, no server. Built once per planet; anyone you share the κ with resumes it instantly.',
  web:'Projects the live app in this tab (mount → derive → project). In the OS it streams through the Holo browser egress on a node — the whole fetch graph, rendered as you, verified — with no install and no account.',
  view:'An app-store or native product — not streamable in a tab. Opens its launch page so you can grab it where it lives.' };
const doorOf=a=>(a.action&&a.action.door)||'stream';
// the animate app deep-link (a sibling app on the same origin) — ?run=<owner/repo> auto-runs it in-tab.
function animateURL(slug){ return '../animate/?run='+encodeURIComponent(slug); }
// image page
function detail(a){ curApp=a; show('detail'); const door=doorOf(a);
  const cmd = door==='animate'?('holo animate '+a.image) : door==='web'?('holo open '+(a.site||a.action.target)) : door==='view'?'' : ('holo run '+a.image);
  const btn = door==='view'?'↗ View launch' : (TIERM[a.tier]?(TIERM[a.tier].i+' '+(a.tier==='B'?'Prepare & stream':a.tier==='V'?'View':'Stream it')):'⚡ Stream it');
  const sub = a.site?esc(hostOf(a.site)) : esc(String(a.id||'').replace(/^[a-z]+:/,''));

   '<div class=dwrap><div class=hero><div class=hic>'+logoEl(a)+'</div>'+
     '<div style="flex:1;min-width:233px"><div class=htitle>'+esc(a.name)+' '+tierBadge(a)+'</div>'+pubLine(a)+
       '<div class=hwhy>'+esc(a.why)+'</div><div class=hint style="margin-top:8px">'+sub+(a.archs&&a.archs.length?' · '+esc(a.archs.join(', ')):'')+'</div></div>'+
     '<button class=big id=stream>'+btn+'</button></div>'+
   '<div class=cols><div class=panel><h3>'+(door==='view'?'Where it lives':'Runs right here')+'</h3>'+
       '<p>'+(RUNTIME_NOTE[door]||RUNTIME_NOTE.stream)+'</p>'+
       (door==='web'&&a.framable===false?'<p class=mut>This site blocks bare embedding, so it streams through the Holo browser egress on a node — the whole fetch graph, rendered as you, verified.</p>':'')+
       (cmd?'<div class=cmd><span>'+esc(cmd)+'</span><button class=ghost id=ccmd>copy</button></div>':'')+'</div>'+
     '<div class=panel><h3>Details</h3><div class=kv>'+
       (a.tier?'<span class=k>Tier</span><span class=v>'+TIERM[a.tier].i+' '+TIERM[a.tier].l+'</span>':'')+
       (a.site?'<span class=k>Site</span><span class=v>'+esc(hostOf(a.site))+'</span>':'')+
       (a.pulls?'<span class=k>Pulls</span><span class=v>⬇ '+esc(a.pulls)+'</span>':'')+
       (a.stars?'<span class=k>Stars</span><span class=v>★ '+fmtN(a.stars)+'</span>':'')+
       (a.updated?'<span class=k>'+(a.tier?'Launched':'Updated')+'</span><span class=v>'+ago(a.updated)+'</span>':'')+
       (a.sources&&a.sources.length?'<span class=k>Sources</span><span class=v>'+esc(a.sources.map(s=>s.src).join(', '))+(a.buzz>1?' · trending ×'+a.buzz:'')+'</span>':'')+
       (a.cats&&a.cats.length?'<span class=k>Categories</span><span class=v>'+esc(a.cats.join(', '))+'</span>':'')+
       (!a.tier?'<span class=k>Publisher</span><span class=v>'+(a.official?'Docker Official':esc(String(a.id||'').split('/')[0]))+'</span>':'')+

}
// ── streaming via the holospaces runtime. A Hologram node (holo-serve, or an OS peer) prepares the

const RUNTIME = (window.HOLO_RUNTIME!==undefined ? window.HOLO_RUNTIME : ''); // '' = same origin; null = none
const base = p => (RUNTIME||'')+p;
function launch(a){ const d=doorOf(a);
  if(d==='animate') return launchAnimate(a);
  if(d==='view') return void window.open((a.sources&&a.sources[0]&&a.sources[0].url)||a.site||a.action.target,'_blank','noopener');
  if(d==='web') return launchWeb(a);

// web door: project the live app in-tab (mount→derive). In the OS, hand to the Holo browser egress; on a
// bare static deploy, iframe framable sites directly and say so honestly when a site blocks embedding.
function launchWeb(a){ const url=a.action.target||a.site;
  const holo=(()=>{ try{ return window.HoloResolve||(window.parent&&window.parent!==window&&window.parent.HoloResolve)||null; }catch(_){ return null; } })();

  frame.onload=()=>{ done=true; setStatus('live in the portal'); log('live · verified projection','k'); };

function webBlocked(a,url){ setStatus('embedding blocked',true);

// repo door: stream the app via the animate ladder (a κ .holo), rendered in the SAME portal iframe → same feel.
function launchAnimate(a){ show('portal'); $('#image').value=a.image; $('#port').value=''; $('#cmd').value=''; runBtn.disabled=false;

const LINES=[]; let seenSrv=0;
function stamp(){ const d=new Date(); return d.toTimeString().slice(0,8)+'.'+String(d.getMilliseconds()).padStart(3,'0'); }
function log(msg,cls){ LINES.push('['+stamp()+'] '+msg); const div=document.createElement('div');
  div.innerHTML='<span class=t>['+stamp()+']</span> <span'+(cls?(' class='+cls):'')+'>'+String(msg).replace(/</g,'&lt;')+'</span>';
  logEl.appendChild(div); logEl.scrollTop=logEl.scrollHeight; }
$('#copy').onclick=async()=>{ try{await navigator.clipboard.writeText(LINES.join('\n')); $('#copy').textContent='Copied!'; setTimeout(()=>$('#copy').textContent='Copy',1200);}catch(_){}};
$('#clear').onclick=()=>{ LINES.length=0; logEl.textContent=''; };
addEventListener('message',e=>{ const d=e.data; if(!d||d.ho===undefined) return;
  if(d.ho==='phase') log('portal · '+d.msg,'p');
  else if(d.ho==='paint') log('portal · FIRST FRAME at '+d.ms+'ms — instant-paint','k');
  else if(d.ho==='live') log('portal · LIVE at '+d.ms+'ms  {resume '+(d.p&&d.p.resumeMs)+'ms}','k');
  else if(d.ho==='served') log('portal · guest served '+d.method+' '+d.path+' → '+d.status);
  else if(d.ho==='error') log('portal · ERROR: '+d.msg,'e'); });
async function run(){ const image=$('#image').value.trim(); if(!image)return;
  const port=$('#port').value.trim(), cmd=$('#cmd').value.trim();
  runBtn.disabled=true; frame.removeAttribute('src'); setStatus('starting…'); seenSrv=0;
  log('── STREAM '+image+(port?(' :'+port):'')+' ──','k');
  if(RUNTIME===null){ streamlessNote(image); return; }
  let r; try{ r=await fetch(base('/run'),{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({image,port,cmd})}); }
  catch(e){ return streamlessNote(image); }
  if(!r.ok){ return streamlessNote(image); }
  const j=await r.json(); if(j.error){ log('runtime: '+j.error,'e'); setStatus('error',true); runBtn.disabled=false; return; }
  const id=j.id; log('job '+id+' started on the holospaces runtime…');
  const poll=setInterval(async()=>{ let s; try{ s=await (await fetch(base('/job/'+id))).json(); }catch(e){ return; }
    setStatus(s.status, s.status==='error');
    const srv=s.log||[]; for(;seenSrv<srv.length;seenSrv++){ const l=srv[seenSrv]; log('holo-run · '+l, /error|fail|panic|refus/i.test(l)?'e':(/cached|resumed|is live|published|resolved/i.test(l)?'k':null)); }
    if(s.status==='ready'){ clearInterval(poll); runBtn.disabled=false; setStatus('live in the portal');
      const q=s.pack?('holo-app.html?pack='+encodeURIComponent(s.pack.pack)+'&mz='+encodeURIComponent(s.pack.manifestZ)+'&idx='+encodeURIComponent(s.pack.idx)+(s.pack.idxZ?('&idxz='+encodeURIComponent(s.pack.idxZ)):'')+(s.pack.lazy?'&lazy=1':'')+'&port='+(s.port||80)+(s.resp?('&resp='+encodeURIComponent(s.resp)):''))
                        :('holo-app.html?k='+encodeURIComponent(s.holo)+'&port='+(s.port||80)+(s.resp?('&resp='+encodeURIComponent(s.resp)):''));

  },700);
}
function streamlessNote(image){ runBtn.disabled=false; setStatus('needs a Hologram node',true);

  log('To stream '+image+' 100% in-browser: run it on a Hologram node (holo-serve, or a Hologram OS peer)','p');
  log('which prepares it into the κ fabric — then this tab resumes it on the vendored holospaces wasm.','p');
  log('The browse + discover experience above is fully serverless; streaming needs one κ-fabric source.','k');
  frame.srcdoc='<body style="margin:0;display:grid;place-items:center;height:100vh;background:#0a0d14;color:#98a2bc;font:14px system-ui;text-align:center"><div><div style="font-size:34px">⚡</div><p><b style="color:#e2e8f5">'+esc(image)+'</b> streams on a Hologram node.<br>Browse is serverless; streaming resumes from the κ fabric.</p></div></body>';
}
runBtn.onclick=run; $('#image').addEventListener('keydown',e=>{if(e.key==='Enter')run()});
